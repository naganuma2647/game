<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>コリドール</title>
<style>
:root{--bg:#0E1E2A;--felt:#123040;--txt:#EDE6D6;--sub:#8FA6B2;--gold:#C9A227;--cell:#2c5a7a;--gap:#0a1620;--wall:#d4a04a;--wallg:#5a3a18;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:radial-gradient(ellipse at 50% 30%,#16384c,#0E1E2A);color:var(--txt);font-family:"Hiragino Sans","Yu Gothic UI",sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:14px 8px 28px;user-select:none}
h1{font-family:"Hiragino Mincho ProN",serif;font-size:22px;letter-spacing:.15em;margin:2px 0}
.sub{font-size:10px;color:var(--sub);letter-spacing:.2em;margin-bottom:8px}
.row{display:flex;gap:7px;justify-content:center;align-items:center;flex-wrap:wrap;margin-bottom:6px}
.row .lab{font-size:11px;color:var(--sub);margin-right:2px}
.row button{background:transparent;border:1px solid #3a5a6a;color:var(--sub);padding:5px 12px;border-radius:16px;font-size:12px;cursor:pointer;font-family:inherit}
.row button.on{border-color:var(--gold);color:var(--gold)}
.turn{font-size:13px;color:var(--gold);min-height:20px;margin:4px 0}
.actbar{display:flex;gap:6px;justify-content:center;margin-bottom:6px}
.actbar button{background:rgba(0,0,0,.3);border:1px solid #3a5a6a;color:var(--txt);padding:6px 14px;border-radius:6px;font-size:12.5px;cursor:pointer;font-family:inherit}
.actbar button.on{background:var(--gold);color:#123040;border-color:var(--gold);font-weight:700}
.actbar button:disabled{opacity:.4;cursor:default}
.bwrap{padding:8px;border-radius:10px;background:var(--felt);box-shadow:0 8px 24px rgba(0,0,0,.5)}
svg{display:block;width:min(95vw,440px);height:auto}
.cell{fill:var(--cell);cursor:pointer}
.cell.dest{fill:var(--gold);opacity:.65}
.wallhit{fill:transparent;cursor:pointer}
.wallhit:hover{fill:rgba(212,160,74,.55)}
.wall{fill:var(--wall);stroke:var(--wallg);stroke-width:.5}
.stock{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:6px 0;font-size:12px}
.stock .s{background:rgba(0,0,0,.25);padding:4px 9px;border-radius:5px}
.msg{min-height:20px;font-size:12.5px;color:var(--gold);margin:6px 0;text-align:center}
.rule{width:min(94vw,420px);margin-top:10px;font-size:11px;line-height:1.7;color:var(--sub);border-top:1px solid #1c4a64;padding-top:8px}
.rule b{color:var(--txt)}
.over{position:fixed;inset:0;background:rgba(8,16,22,.86);display:none;align-items:center;justify-content:center;z-index:30}
.over.show{display:flex}
.over .c{background:#123040;border:1px solid var(--gold);border-radius:10px;padding:24px 36px;text-align:center}
.over .t{font-size:22px;color:var(--gold);font-family:"Hiragino Mincho ProN",serif;margin-bottom:14px}
.over button{background:var(--gold);border:none;color:#123040;font-weight:700;padding:9px 22px;border-radius:7px;cursor:pointer;font-size:14px;font-family:inherit}
.hidden{display:none!important}
</style></head>
<body>
<a href="../index.html" style="position:fixed;top:10px;left:10px;z-index:99999;background:rgba(0,0,0,0.55);color:#fff;text-decoration:none;font:600 13px/1 'Segoe UI',sans-serif;padding:8px 13px;border-radius:999px;border:1px solid rgba(255,255,255,0.25)">← 一覧に戻る</a>
<h1>コリドール</h1><div class="sub">QUORIDOR — 進むか、阻むか</div>
<div class="row" id="np"><span class="lab">人数:</span><button data-np="2" class="on">2人</button><button data-np="4">4人</button></div>
<div class="row" id="mode"><span class="lab">対戦:</span><button data-m="cpu" class="on">CPU対戦</button><button data-m="pvp">人対人</button></div>
<div class="row" id="lv"><span class="lab">CPU強さ:</span><button data-lv="1">弱</button><button data-lv="2" class="on">普通</button><button data-lv="3">強</button></div>
<div class="turn" id="turn"></div>
<div class="actbar"><button data-a="move" class="on" id="abMove">駒を進める</button><button data-a="wall" id="abWall">壁を置く</button></div>
<div class="bwrap"><svg id="bd"></svg></div>
<div class="stock" id="stock"></div>
<div class="msg" id="msg"></div>
<div class="rule">
<b>ルール:</b> 自分の手番に「駒を1マス進める」か「壁を1枚置く」を選択。駒の前に相手駒があれば飛び越え可（直線が塞がっていれば斜めへ）。壁は誰かのゴール経路を完全に塞ぐ位置には置けない。先に対面の端へ到達した人が勝ち。<br>
<b>ゴール:</b> 2人=対面の辺 / 4人=自分と向かい合う辺。壁は2人モード10枚、4人モード5枚ずつ。
</div>
<div style="display:flex;gap:8px;justify-content:center;margin-top:8px"><button id="undo" style="background:transparent;border:1px solid #3a5a6a;color:#EDE6D6;font-weight:700;padding:7px 16px;border-radius:6px;font-size:12.5px;cursor:pointer;font-family:inherit">待った</button><button id="reset" style="background:transparent;border:1px solid #3a5a6a;color:#EDE6D6;font-weight:700;padding:7px 16px;border-radius:6px;font-size:12.5px;cursor:pointer;font-family:inherit">最初から</button></div>
<div class="over" id="over"><div class="c"><div class="t" id="ovt">勝利</div><button id="again">もう一度</button></div></div>
<script>
const N=9, NS='http://www.w3.org/2000/svg';
const COLORS=[
  {nm:'青',c:'#3e87d6'},
  {nm:'赤',c:'#e0473a'},
  {nm:'緑',c:'#4ec05e'},
  {nm:'黄',c:'#e0c34a'}
];
const SETUPS={
  2:{starts:[[8,4],[0,4]], goals:['r0','r8'], walls:10},
  4:{starts:[[8,4],[0,4],[4,0],[4,8]], goals:['r0','r8','c8','c0'], walls:5}
};
let np=2, mode='cpu';
let pawns, walls, turn, over, winners, wallsLeft, action='move', hist=[];
function snapQ(){return JSON.stringify({pawns,walls,turn,over,winners,wallsLeft,action});}
function restoreQ(s){const o=JSON.parse(s);pawns=o.pawns;walls=o.walls;turn=o.turn;over=o.over;winners=o.winners;wallsLeft=o.wallsLeft;action=o.action;}
let ONLINE=false,MYSEAT=0,roomSend=null;
function myTurn(){return !ONLINE||turn===MYSEAT;}
const svg=document.getElementById('bd');

function init(){
  const su=SETUPS[np];
  pawns=su.starts.map(p=>({r:p[0],c:p[1]}));
  walls=[]; turn=0; over=false; winners=[]; hist=[];
  wallsLeft=new Array(np).fill(su.walls);
  action='move';
  document.getElementById('over').classList.remove('show');
  document.getElementById('msg').textContent='';
  setActionUI();
  render(); updateTurn(); updateStock();
  if(!isHuman()) setTimeout(cpuMove, 600);
}
function isCpuSeat(){return ONLINE&&window.OnlineRoom&&OnlineRoom.isCpu(turn);}
function isHuman(){if(ONLINE){if(isCpuSeat())return false;return turn===MYSEAT;}return mode==='pvp'||turn===0;}
function shouldRunCpu(){if(over)return false;if(ONLINE)return isCpuSeat()&&OnlineRoom.isHost();return !isHuman();}
function setActionUI(){
  document.getElementById('abMove').classList.toggle('on',action==='move');
  document.getElementById('abWall').classList.toggle('on',action==='wall');
  document.getElementById('abWall').disabled = !!wallsLeft && wallsLeft[turn]<=0;
}
function updateTurn(){
  const t=document.getElementById('turn');
  if(over){t.textContent='対局終了';return;}
  const nm=COLORS[turn].nm;
  if(ONLINE)t.textContent=(turn===MYSEAT?'★ あなた':'相手')+'('+nm+')の番';
  else t.textContent = mode==='pvp' ? (nm+'の番') : (turn===0 ? 'あなた('+nm+')の番' : 'CPU('+nm+')の番');
}
function updateStock(){
  const s=document.getElementById('stock'); s.innerHTML='';
  for(let p=0;p<np;p++){
    const e=document.createElement('span');e.className='s';e.style.color=COLORS[p].c;
    e.textContent=COLORS[p].nm+': 壁'+wallsLeft[p];
    s.appendChild(e);
  }
}

function hasWallBetween(r1,c1,r2,c2){
  if(r1===r2){
    const c=Math.min(c1,c2), r=r1;
    return walls.some(w=>w.d==='v' && w.c===c && (w.r===r-1||w.r===r));
  }
  if(c1===c2){
    const r=Math.min(r1,r2), c=c1;
    return walls.some(w=>w.d==='h' && w.r===r && (w.c===c-1||w.c===c));
  }
  return false;
}
function inBoard(r,c){return r>=0&&r<N&&c>=0&&c<N;}
function pawnAt(r,c){return pawns.findIndex((p,i)=>!winners.includes(i) && p.r===r && p.c===c);}

function pawnMoves(p){
  const {r,c}=pawns[p]; const res=[];
  for(const [dr,dc] of [[-1,0],[1,0],[0,-1],[0,1]]){
    const nr=r+dr, nc=c+dc;
    if(!inBoard(nr,nc)) continue;
    if(hasWallBetween(r,c,nr,nc)) continue;
    const op=pawnAt(nr,nc);
    if(op<0){res.push([nr,nc]); continue;}
    const jr=nr+dr, jc=nc+dc;
    if(inBoard(jr,jc) && !hasWallBetween(nr,nc,jr,jc) && pawnAt(jr,jc)<0){
      res.push([jr,jc]);
    } else {
      const perps=dr===0?[[-1,0],[1,0]]:[[0,-1],[0,1]];
      for(const [pr,pc] of perps){
        const d2r=nr+pr, d2c=nc+pc;
        if(inBoard(d2r,d2c) && !hasWallBetween(nr,nc,d2r,d2c) && pawnAt(d2r,d2c)<0){
          res.push([d2r,d2c]);
        }
      }
    }
  }
  // dedup
  const seen=new Set();return res.filter(([r,c])=>{const k=r*N+c;if(seen.has(k))return false;seen.add(k);return true;});
}

function isGoal(p, r, c){
  const g=SETUPS[np].goals[p];
  return (g==='r0'&&r===0)||(g==='r8'&&r===8)||(g==='c0'&&c===0)||(g==='c8'&&c===8);
}
function distFrom(p, sr, sc){
  const seen=new Set([sr*N+sc]); const q=[[sr,sc,0]];
  while(q.length){
    const[r,c,d]=q.shift();
    if(isGoal(p,r,c))return d;
    for(const[dr,dc] of [[-1,0],[1,0],[0,-1],[0,1]]){
      const nr=r+dr,nc=c+dc;
      if(!inBoard(nr,nc))continue;
      if(hasWallBetween(r,c,nr,nc))continue;
      const k=nr*N+nc;if(seen.has(k))continue;
      seen.add(k);q.push([nr,nc,d+1]);
    }
  }
  return Infinity;
}
function hasPath(p){return distFrom(p,pawns[p].r,pawns[p].c)!==Infinity;}

function canPlaceWall(r,c,d){
  if(r<0||r>=N-1||c<0||c>=N-1) return false;
  for(const w of walls){
    if(w.d===d){
      if(d==='h' && w.r===r && Math.abs(w.c-c)<=1) return false;
      if(d==='v' && w.c===c && Math.abs(w.r-r)<=1) return false;
    } else if(w.r===r && w.c===c) return false;
  }
  walls.push({r,c,d});
  let ok=true;
  for(let p=0;p<np;p++){if(!winners.includes(p) && !hasPath(p)){ok=false;break;}}
  walls.pop();
  return ok;
}

function render(){
  const CELL=38, GAP=4, PAD=10;
  const S=N*CELL + (N-1)*GAP;
  const W=S+PAD*2;
  svg.setAttribute('viewBox',`0 0 ${W} ${W}`);
  const cxy=(r,c)=>[PAD+c*(CELL+GAP), PAD+r*(CELL+GAP)];
  let html='';
  const myMoves = (!over && isHuman() && action==='move') ? pawnMoves(turn) : [];
  const destSet=new Set(myMoves.map(m=>m[0]*N+m[1]));
  for(let r=0;r<N;r++)for(let c=0;c<N;c++){
    const [x,y]=cxy(r,c);
    const isDest = destSet.has(r*N+c);
    html += `<rect x="${x}" y="${y}" width="${CELL}" height="${CELL}" rx="4" class="cell${isDest?' dest':''}" data-mc="${r},${c}"/>`;
  }
  for(const w of walls){
    const [x,y]=cxy(w.r, w.c);
    if(w.d==='h'){
      html += `<rect x="${x}" y="${y+CELL+GAP/2-2}" width="${CELL*2+GAP}" height="4" rx="2" class="wall"/>`;
    } else {
      html += `<rect x="${x+CELL+GAP/2-2}" y="${y}" width="4" height="${CELL*2+GAP}" rx="2" class="wall"/>`;
    }
  }
  if(!over && isHuman() && action==='wall' && wallsLeft[turn]>0){
    for(let r=0;r<N-1;r++)for(let c=0;c<N-1;c++){
      const [x,y]=cxy(r,c);
      if(canPlaceWall(r,c,'h'))
        html += `<rect x="${x}" y="${y+CELL+GAP/2-3}" width="${CELL*2+GAP}" height="6" class="wallhit" data-wh="${r},${c}"/>`;
      if(canPlaceWall(r,c,'v'))
        html += `<rect x="${x+CELL+GAP/2-3}" y="${y}" width="6" height="${CELL*2+GAP}" class="wallhit" data-wv="${r},${c}"/>`;
    }
  }
  for(let p=0;p<np;p++){
    if(winners.includes(p))continue;
    const [x,y]=cxy(pawns[p].r,pawns[p].c);
    html += `<circle cx="${x+CELL/2}" cy="${y+CELL/2}" r="${CELL*0.34}" fill="${COLORS[p].c}" stroke="#fff" stroke-width="1.5"/>`;
  }
  svg.innerHTML=html;
  svg.querySelectorAll('[data-mc]').forEach(el=>{const[r,c]=el.dataset.mc.split(',').map(Number); el.addEventListener('click',()=>onCellClick(r,c));});
  svg.querySelectorAll('[data-wh]').forEach(el=>{const[r,c]=el.dataset.wh.split(',').map(Number); el.addEventListener('click',()=>onWallClick(r,c,'h'));});
  svg.querySelectorAll('[data-wv]').forEach(el=>{const[r,c]=el.dataset.wv.split(',').map(Number); el.addEventListener('click',()=>onWallClick(r,c,'v'));});
}

function onCellClick(r,c){
  if(over||!isHuman()||action!=='move') return;
  const moves=pawnMoves(turn);
  if(moves.some(m=>m[0]===r&&m[1]===c))emit({k:'move',r,c});
}
function onWallClick(r,c,d){
  if(over||!isHuman()||action!=='wall') return;
  if(wallsLeft[turn]<=0) return;
  if(!canPlaceWall(r,c,d)) return;
  emit({k:'wall',r,c,d});
}
function emit(a){if(ONLINE)roomSend(a);else doAction(a);}
function doAction(a){
  if(over)return;
  if(a.k==='move'){
    const moves=pawnMoves(turn);
    if(!moves.some(m=>m[0]===a.r&&m[1]===a.c))return;
    if(!ONLINE)hist.push(snapQ());
    pawns[turn]={r:a.r,c:a.c};finishTurn();
  } else if(a.k==='wall'){
    if(wallsLeft[turn]<=0)return;
    if(!canPlaceWall(a.r,a.c,a.d))return;
    if(!ONLINE)hist.push(snapQ());
    walls.push({r:a.r,c:a.c,d:a.d});wallsLeft[turn]--;finishTurn();
  }
}
function finishTurn(){
  if(isGoal(turn, pawns[turn].r, pawns[turn].c)){
    winners.push(turn); over=true; render(); finish(); return;
  }
  nextTurn();
  action='move';
  setActionUI();
  render(); updateTurn(); updateStock();
  if(shouldRunCpu()) setTimeout(cpuMove, 600);
  else if(!ONLINE && !over && !isHuman()) setTimeout(cpuMove, 600);
}
function nextTurn(){let n=turn;for(let k=0;k<np;k++){n=(n+1)%np;if(!winners.includes(n)){turn=n;return;}}}

function cpuMove(){
  if(over)return;
  if(ONLINE&&(!OnlineRoom.isHost()||!isCpuSeat()))return;
  const p=turn;
  const myMoves=pawnMoves(p);
  for(const [r,c] of myMoves){if(isGoal(p,r,c)){emit({k:'move',r,c});return;}}
  // 弱: ランダム移動のみ（壁を置かない）
  if(cpuLv===1&&myMoves.length){
    const[r,c]=myMoves[Math.floor(Math.random()*myMoves.length)];
    emit({k:'move',r,c});return;
  }
  const myDist=distFrom(p,pawns[p].r,pawns[p].c);
  let bestMove=null, bestMoveDist=Infinity;
  for(const [r,c] of myMoves){
    const dnew=distFrom(p,r,c);
    if(dnew<bestMoveDist){bestMoveDist=dnew; bestMove=[r,c];}
  }
  let bestWall=null, bestWallScore=-Infinity;
  if(wallsLeft[p]>0&&cpuLv===3){
    let leader=-1, leaderDist=999;
    for(let q=0;q<np;q++){if(q===p||winners.includes(q))continue;const d=distFrom(q,pawns[q].r,pawns[q].c);if(d<leaderDist){leaderDist=d;leader=q;}}
    if(leader>=0 && leaderDist<=myDist+1){
      for(let r=0;r<N-1;r++)for(let c=0;c<N-1;c++){
        for(const d of ['h','v']){
          if(!canPlaceWall(r,c,d))continue;
          walls.push({r,c,d});
          const dn=distFrom(leader,pawns[leader].r,pawns[leader].c);
          const dnme=distFrom(p,pawns[p].r,pawns[p].c);
          walls.pop();
          if(dn===Infinity)continue;
          const score=(dn-leaderDist)*2 - Math.max(0,dnme-myDist)*2;
          if(score>bestWallScore){bestWallScore=score; bestWall={r,c,d};}
        }
      }
    }
  }
  if(bestWall && bestWallScore>=3){emit({k:'wall',r:bestWall.r,c:bestWall.c,d:bestWall.d});return;}
  if(bestMove){emit({k:'move',r:bestMove[0],c:bestMove[1]});return;}
  if(myMoves.length){const[r,c]=myMoves[0];emit({k:'move',r,c});return;}
  nextTurn(); render(); updateTurn(); if(shouldRunCpu())setTimeout(cpuMove,600); else if(!ONLINE&&!over&&!isHuman())setTimeout(cpuMove,600);
}

function finish(){
  const nm=COLORS[winners[0]].nm;
  const t = mode==='pvp' ? (nm+'の勝ち！') : (winners[0]===0 ? 'あなた('+nm+')の勝ち！🎉' : 'CPU('+nm+')の勝ち');
  document.getElementById('ovt').textContent=t;
  document.getElementById('over').classList.add('show');
}

document.getElementById('np').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;np=+b.dataset.np;document.querySelectorAll('#np button').forEach(x=>x.classList.remove('on'));b.classList.add('on');init();});
document.getElementById('mode').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;mode=b.dataset.m;document.querySelectorAll('#mode button').forEach(x=>x.classList.remove('on'));b.classList.add('on');init();});
let cpuLv=2;
document.getElementById('lv').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;cpuLv=+b.dataset.lv;document.querySelectorAll('#lv button').forEach(x=>x.classList.remove('on'));b.classList.add('on');});
document.querySelector('.actbar').addEventListener('click',e=>{const b=e.target.closest('button');if(!b||b.disabled)return;action=b.dataset.a;setActionUI();render();});
document.getElementById('again').addEventListener('click',init);
document.getElementById('reset').addEventListener('click',init);
document.getElementById('undo').addEventListener('click',()=>{if(!hist.length||ONLINE)return;let s=hist.pop();if(mode==='cpu'){while(hist.length&&JSON.parse(s).turn!==0)s=hist.pop();}restoreQ(s);setActionUI();document.getElementById('over').classList.remove('show');render();updateTurn();updateStock();});
init();

function startOnline(seat,n,send){ONLINE=true;MYSEAT=seat;roomSend=send;np=n;
  document.getElementById('np').classList.add('hidden');
  document.getElementById('mode').classList.add('hidden');
  init();
  if(shouldRunCpu())setTimeout(cpuMove,600);}
</script>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script src="../shared/lobby.js?v=6"></script>
<script src="../shared/online-room.js?v=8"></script>
<script>
OnlineRoom.init({gameId:'quoridor',minPlayers:2,maxPlayers:4,note:'駒を進めるか壁を置く。先に対面の辺へ。',
  onStart:(seat,n,send)=>startOnline(seat,n,send),
  onMessage:(from,msg)=>doAction(msg)});
</script>
</body></html>
