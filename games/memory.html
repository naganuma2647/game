<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>神経衰弱</title><style>
:root{--bg:#15120E;--txt:#EDE6D6;--sub:#9A8F7B;--gold:#C9A227;--line:#352C20;--back:#2C5A3C;--back2:#234a30;--face:#F4EFE3;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--txt);font-family:"Hiragino Sans","Yu Gothic UI",sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:16px 10px 30px;user-select:none}
h1{font-family:"Hiragino Mincho ProN",serif;font-size:26px;letter-spacing:.2em;text-indent:.2em;margin:2px 0}
.sub{font-size:11px;color:var(--sub);letter-spacing:.2em;margin-bottom:12px}
.row{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;justify-content:center}
.row button{background:transparent;border:1px solid #3a3326;color:var(--sub);padding:7px 13px;border-radius:18px;font-size:12.5px;cursor:pointer;font-family:inherit;transition:all .2s}
.row button.on{border-color:var(--gold);color:var(--gold)}
.status{font-size:14px;min-height:24px;margin-bottom:10px;letter-spacing:.05em;text-align:center}
.status b{color:var(--gold)}
#bd{display:grid;gap:8px;width:min(94vw,440px)}
.card{aspect-ratio:3/4;border-radius:9px;cursor:pointer;position:relative;transform-style:preserve-3d;transition:transform .3s}
.card.flip{transform:rotateY(180deg)}
.face,.back{position:absolute;inset:0;backface-visibility:hidden;border-radius:9px;display:flex;align-items:center;justify-content:center}
.back{background:linear-gradient(145deg,var(--back),var(--back2));border:1px solid #0d3320;font-size:20px;color:rgba(255,255,255,.25)}
.face{background:var(--face);border:1px solid #C9BFA8;transform:rotateY(180deg);font-size:min(8vw,34px)}
.card.done{opacity:.35;cursor:default}
.foot{margin-top:16px}
.foot button{background:var(--gold);border:none;color:#15120E;font-weight:700;padding:9px 22px;border-radius:8px;cursor:pointer;font-size:14px;font-family:inherit}
</style></head><body>
<a href="../index.html" style="position:fixed;top:10px;left:10px;z-index:99999;background:rgba(0,0,0,0.55);color:#fff;text-decoration:none;font:600 13px/1 'Segoe UI',sans-serif;padding:8px 13px;border-radius:999px;border:1px solid rgba(255,255,255,0.25)">← 一覧に戻る</a>
<h1>神経衰弱</h1><div class="sub">MEMORY</div>
<div class="row" id="mode"><button data-m="solo" class="on">ひとり</button><button data-m="pvp">2人対戦</button></div>
<div class="row" id="size"><button data-n="12" class="on">12枚</button><button data-n="16">16枚</button><button data-n="20">20枚</button></div>
<div class="status" id="status"></div>
<div id="bd"></div>
<div class="foot"><button id="reset">配り直し</button></div>
<script>
const EMO=['🍎','🍌','🍇','🍓','🍑','🍊','🍉','🥝','🍒','🦁','🐰','🐼','🐸','🐧','🦊','🐶','⭐','🌙','🌸','🍀'];
let N=12,deck,flipped,matched,busy,mode='solo',moves,turn,score;
const bd=document.getElementById('bd');
function init(){const pairs=N/2;const pool=EMO.slice(0,pairs);deck=[];pool.forEach((e,i)=>{deck.push({e,id:i},{e,id:i});});for(let i=deck.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[deck[i],deck[j]]=[deck[j],deck[i]];}
flipped=[];matched=new Set();busy=false;moves=0;turn=0;score=[0,0];
const cols=N<=12?4:N<=16?4:5;bd.style.gridTemplateColumns='repeat('+cols+',1fr)';
bd.innerHTML='';deck.forEach((c,i)=>{const el=document.createElement('div');el.className='card';el.innerHTML='<div class="back">?</div><div class="face">'+c.e+'</div>';el.addEventListener('click',()=>tap(i));bd.appendChild(el);});
setStatus();}
function setStatus(){const s=document.getElementById('status');if(mode==='solo')s.innerHTML='めくった回数: <b>'+moves+'</b>　そろえた: <b>'+matched.size/2+'/'+(N/2)+'</b>';else s.innerHTML='<b>プレイヤー'+(turn+1)+'</b>の番　（P1: '+score[0]+' / P2: '+score[1]+'）';}
function cardEl(i){return bd.children[i];}
function tap(i){if(busy||matched.has(i)||flipped.includes(i))return;cardEl(i).classList.add('flip');flipped.push(i);if(flipped.length===2){busy=true;moves++;const[a,b]=flipped;if(deck[a].e===deck[b].e){matched.add(a);matched.add(b);if(mode==='pvp')score[turn]++;setTimeout(()=>{cardEl(a).classList.add('done');cardEl(b).classList.add('done');flipped=[];busy=false;setStatus();checkEnd();},420);}else{setTimeout(()=>{cardEl(a).classList.remove('flip');cardEl(b).classList.remove('flip');flipped=[];busy=false;if(mode==='pvp'){turn=1-turn;}setStatus();},820);}}else{setStatus();}}
function checkEnd(){if(matched.size===N){const s=document.getElementById('status');if(mode==='solo')s.innerHTML='クリア！ <b>'+moves+'回</b>でそろえました 🎉';else{const r=score[0]>score[1]?'プレイヤー1の勝ち！':score[1]>score[0]?'プレイヤー2の勝ち！':'引き分け';s.innerHTML='<b>'+r+'</b>（'+score[0]+' - '+score[1]+'）';}}}
document.getElementById('reset').addEventListener('click',init);
document.getElementById('mode').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;mode=b.dataset.m;document.querySelectorAll('#mode button').forEach(x=>x.classList.remove('on'));b.classList.add('on');init();});
document.getElementById('size').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;N=+b.dataset.n;document.querySelectorAll('#size button').forEach(x=>x.classList.remove('on'));b.classList.add('on');init();});
init();
</script></body></html>
