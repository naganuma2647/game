<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>チンチロ</title>
<style>
:root{--bg:#0E2A1C;--felt:#13402A;--txt:#EDE6D6;--sub:#8FB29C;--gold:#C9A227;--die:#F4EFE2;--pip:#222;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:radial-gradient(ellipse at 50% 30%,#164a30,#0E2A1C);color:var(--txt);font-family:"Hiragino Sans","Yu Gothic UI",sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:14px 10px 28px;user-select:none}
h1{font-family:"Hiragino Mincho ProN",serif;font-size:25px;letter-spacing:.18em;margin:2px 0}
.sub{font-size:10px;color:var(--sub);letter-spacing:.2em;margin-bottom:10px}
.row{display:flex;gap:7px;justify-content:center;align-items:center;flex-wrap:wrap;margin-bottom:8px}
.row .lab{font-size:11px;color:var(--sub);margin-right:2px}
.row button{background:transparent;border:1px solid #2c5a40;color:var(--sub);padding:6px 13px;border-radius:18px;font-size:12px;cursor:pointer;font-family:inherit;transition:all .2s}
.row button.on{border-color:var(--gold);color:var(--gold)}
.chips{display:flex;gap:14px;align-items:center;margin-bottom:8px;font-size:14px}
.chips .b{background:rgba(0,0,0,.28);border-radius:7px;padding:5px 14px}
.chips b{color:var(--gold)}
.area{width:min(94vw,420px);margin:6px 0;text-align:center}
.lab{font-size:11px;color:var(--sub);letter-spacing:.12em;margin-bottom:6px}
.bowl{background:rgba(0,0,0,.22);border:2px solid #1c5e3c;border-radius:60px;padding:16px;display:flex;gap:12px;justify-content:center;min-height:78px;align-items:center}
.die{width:46px;height:46px;border-radius:9px;background:var(--die);position:relative;box-shadow:0 3px 7px rgba(0,0,0,.45)}
.die.roll{animation:sh .4s ease}
@keyframes sh{0%,100%{transform:translateY(0) rotate(0)}25%{transform:translateY(-8px) rotate(-12deg)}75%{transform:translateY(-4px) rotate(12deg)}}
.die .pip{position:absolute;width:8px;height:8px;border-radius:50%;background:var(--pip);transform:translate(-50%,-50%)}
.role{font-size:17px;font-weight:700;color:var(--gold);min-height:24px;margin-top:6px;letter-spacing:.06em}
.role.bad{color:#e0533e}
.bet{display:flex;gap:8px;align-items:center;justify-content:center;margin:8px 0;flex-wrap:wrap}
.bet button{background:#13402A;border:1px solid #2c5a40;color:var(--txt);padding:8px 13px;border-radius:8px;cursor:pointer;font-family:inherit;font-size:13px}
.bet button:hover{border-color:var(--gold)}
.bet .betv{font-size:15px;color:var(--gold);font-weight:700;min-width:60px}
.msg{min-height:24px;font-size:15px;font-weight:700;color:var(--gold);margin:8px 0;text-align:center;letter-spacing:.05em}
.actions{display:flex;gap:10px;margin-top:4px;justify-content:center}
.actions button{background:var(--gold);border:none;color:#13402A;font-weight:700;padding:11px 26px;border-radius:8px;cursor:pointer;font-size:15px;font-family:inherit}
.actions button:disabled{opacity:.4}
.actions button.alt{background:transparent;border:1px solid #2c5a40;color:var(--txt)}
/* multi */
.mboard{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;width:min(96vw,460px);margin:4px 0 8px}
.pcard{background:rgba(0,0,0,.25);border:1px solid #1c5e3c;border-radius:10px;padding:8px 10px;min-width:96px;text-align:center}
.pcard.active{border-color:var(--gold);box-shadow:0 0 0 2px rgba(201,162,39,.4)}
.pcard.me .pn{color:#7fd6a0}
.pcard.win{background:rgba(201,162,39,.14)}
.pcard .pn{font-size:12px;color:var(--txt);margin-bottom:3px}
.pcard .sc{font-size:18px;font-weight:800;color:var(--gold)}
.pcard .pr{font-size:11px;color:var(--sub);min-height:15px;margin-top:2px}
.minidice{display:flex;gap:3px;justify-content:center;margin-top:4px;min-height:20px}
.minidice .md{width:18px;height:18px;border-radius:3px;background:var(--die);position:relative}
.minidice .md .pip{position:absolute;width:3.4px;height:3.4px;border-radius:50%;background:var(--pip);transform:translate(-50%,-50%)}
.rule{width:min(94vw,420px);margin-top:14px;font-size:11px;line-height:1.7;color:var(--sub);border-top:1px solid #1c5e3c;padding-top:10px}
.rule b{color:var(--txt)}
.hidden{display:none!important}
</style>
</head>
<body>
<a href="../index.html" style="position:fixed;top:10px;left:10px;z-index:99999;background:rgba(0,0,0,0.55);color:#fff;text-decoration:none;font:600 13px/1 'Segoe UI',sans-serif;padding:8px 13px;border-radius:999px;border:1px solid rgba(255,255,255,0.25)">← 一覧に戻る</a>
<h1>チンチロ</h1><div class="sub">CHINCHIRO — サイコロ3個の出目勝負</div>

<div class="row" id="mode"><span class="lab">対戦:</span>
  <button data-m="solo" class="on">1人（CPU）</button>
  <button data-m="multi">複数人</button>
</div>
<div class="row hidden" id="nprow"><span class="lab">人数:</span>
  <button data-np="2" class="on">2人</button>
  <button data-np="3">3人</button>
  <button data-np="4">4人</button>
</div>

<!-- SOLO -->
<div id="solo-area">
  <div class="chips"><span class="b">チップ <b id="chips">1000</b></span><span class="b">賭け <b id="betv2">100</b></span></div>
  <div class="area"><div class="lab">親（CPU）</div><div class="bowl" id="cpu-bowl"></div><div class="role" id="cpu-role"></div></div>
  <div class="area"><div class="lab">あなた（子）</div><div class="bowl" id="me-bowl"></div><div class="role" id="me-role"></div></div>
  <div class="bet" id="betrow">
    <button data-b="-50">−50</button>
    <span class="betv" id="betv">100</span>
    <button data-b="50">+50</button>
    <button data-b="100">+100</button>
    <button data-b="max">MAX</button>
  </div>
</div>

<!-- MULTI -->
<div id="multi-area" class="hidden">
  <div class="mboard" id="mboard"></div>
  <div class="area"><div class="lab" id="m-turnlab"></div><div class="bowl" id="m-bowl"></div><div class="role" id="m-role"></div></div>
  <div class="bet" id="m-betrow" style="display:none">
    <button data-b="-50">−50</button>
    <span class="betv">賭け <span id="m-betv">100</span></span>
    <button data-b="50">+50</button>
    <button data-b="100">+100</button>
    <button data-b="max">MAX</button>
    <button id="m-betok" style="background:var(--gold);color:#13402A;font-weight:700;border:none;padding:8px 16px;border-radius:8px;cursor:pointer;font-family:inherit;font-size:13px">この額で賭ける</button>
  </div>
</div>

<div class="msg" id="msg">賭けを決めて「振る」</div>
<div class="actions">
  <button id="roll">振る</button>
  <button id="m-next" class="hidden">次のゲーム</button>
  <button id="mreset" class="alt hidden">最初から</button>
</div>
<div class="rule" id="rule"></div>
<script>
const PIPS={1:[[50,50]],2:[[28,28],[72,72]],3:[[26,26],[50,50],[74,74]],4:[[28,28],[72,28],[28,72],[72,72]],5:[[28,28],[72,28],[50,50],[28,72],[72,72]],6:[[28,26],[72,26],[28,50],[72,50],[28,74],[72,74]]};
function dieHtml(v,roll){return `<div class="die${roll?' roll':''}">${PIPS[v].map(([x,y])=>`<span class="pip" style="left:${x}%;top:${y}%"></span>`).join('')}</div>`;}
function miniDice(d){return `<div class="minidice">${d?d.map(v=>`<div class="md">${PIPS[v].map(([x,y])=>`<span class="pip" style="left:${x}%;top:${y}%"></span>`).join('')}</div>`).join(''):''}</div>`;}
function showDice(sel,dice,roll){document.getElementById(sel).innerHTML=dice.map(v=>dieHtml(v,roll)).join('');}
function rollDice(){return[1,2,3].map(()=>1+Math.floor(Math.random()*6));}
// 役判定: {rank,mult,name,bad}  rankが大きいほど強い
function judge(d){const s=d.slice().sort((a,b)=>a-b);const[a,b,c]=s;
  if(a===1&&b===1&&c===1)return{rank:100,mult:5,name:'ピンゾロ！'};
  if(a===b&&b===c)return{rank:90+a,mult:3,name:a+'のゾロ目'};
  if(a===4&&b===5&&c===6)return{rank:80,mult:2,name:'シゴロ(456)'};
  if(a===1&&b===2&&c===3)return{rank:0,mult:2,name:'ヒフミ(123)',bad:true};
  let eye=null;if(a===b)eye=c;else if(b===c)eye=a;else if(a===c)eye=b;
  if(eye!==null)return{rank:10+eye,mult:1,name:eye+'の目'};
  return{rank:5,mult:0,name:'役なし',none:true};}
function isFinalRole(r){return !r.none;} // 目を含め何か役が出たら確定。役なしのみ最大3投まで振り直し
function rollUntilRole(){let res,dice;for(let i=0;i<3;i++){dice=rollDice();res=judge(dice);if(isFinalRole(res)||i===2)break;}return{dice,res};}
function oneThrow(){const dice=rollDice();return {dice,res:judge(dice)};} // 1投だけ振る
function wait(ms){return new Promise(r=>setTimeout(r,ms));}
function msg(s){document.getElementById('msg').textContent=s;}

let mode='solo',np=2;
let ONLINE=false,MYSEAT=0,roomSend=null;
function myTurn(){return !ONLINE||curPlayer===MYSEAT;}

/* ============ SOLO (vs CPU) ============ */
let chips=+(localStorage.getItem('chinchip')||1000),bet=100,busy=false;
function saveChips(){localStorage.setItem('chinchip',chips);}
function setBet(){document.getElementById('betv').textContent=bet;document.getElementById('betv2').textContent=bet;}
let soloPhase='bet',meThrows=0,meRes=null;
function startSoloHand(){soloPhase='me';meThrows=0;meRes=null;
  document.getElementById('cpu-role').textContent='';document.getElementById('cpu-role').className='role';
  document.getElementById('me-role').textContent='';document.getElementById('me-role').className='role';
  showDice('cpu-bowl',[1,1,1]);showDice('me-bowl',[1,1,1]);}
function playSolo(){ // 1回の「振る」＝1投
  if(busy)return;
  if(soloPhase==='over')return;
  if(soloPhase==='bet'){if(bet<=0){msg('賭けを決めて「振る」');return;}startSoloHand();}
  if(soloPhase!=='me')return;
  meThrows++;
  const {dice,res}=oneThrow();
  showDice('me-bowl',dice,true);
  const me=document.getElementById('me-role');me.textContent='あなた '+meThrows+'投目: '+res.name;me.className='role'+(res.bad?' bad':'');
  if(isFinalRole(res)||meThrows>=3){meRes=res;soloPhase='cpu';busy=true;document.getElementById('roll').disabled=true;setTimeout(cpuRollSolo,650);}
  else{msg('役なし。もう一度「振る」（'+meThrows+'/3）');}
}
async function cpuRollSolo(){
  msg('親（CPU）が振っています…');
  let r;
  for(let i=1;i<=3;i++){r=oneThrow();showDice('cpu-bowl',r.dice,true);
    const cr=document.getElementById('cpu-role');cr.textContent='親 '+i+'投目: '+r.res.name;cr.className='role'+(r.res.bad?' bad':'');
    await wait(650);if(isFinalRole(r.res))break;}
  document.getElementById('cpu-role').textContent=r.res.name;
  await wait(350);
  settleSolo(r.res,meRes);busy=false;
}
function settleSolo(cpuR,meR){
  soloPhase='over';
  let delta=0,text;
  if(meR.rank>cpuR.rank){const m=meR.mult||1;delta=bet*m;text='あなたの勝ち！ +'+delta+(m>1?'（'+m+'倍）':'');}
  else if(meR.rank<cpuR.rank){const m=cpuR.mult||1;delta=-bet*m;text='親の勝ち… '+delta+(m>1?'（'+m+'倍）':'');}
  else{text='引き分け（賭け返却）';}
  chips+=delta;saveChips();document.getElementById('chips').textContent=chips;msg(text);
  setTimeout(()=>{document.getElementById('roll').disabled=false;soloPhase='bet';
    if(chips<=0){chips=1000;saveChips();document.getElementById('chips').textContent=chips;msg('チップが尽きたので1000補充。賭けて「振る」');}
    else msg('次の勝負へ。賭けを決めて「振る」');
    bet=Math.min(bet,chips);setBet();},1300);
}

/* ============ MULTI: 親（交代）vs 子・チップ制 ============ */
let players=[],dealer=0,curPlayer=0,mPhase='bet',roundNo=1,pendBet=100;
let betSeq=[],betIdx=0,rollSeq=[],rollIdx=0,throws=0;
const PCOL=['#e0473a','#3e87d6','#4ec05e','#e0c34a']; // P1赤 P2青 P3緑 P4黄
function pname(i){return (ONLINE&&i===MYSEAT)?'あなた(P'+(i+1)+')':'P'+(i+1);}
function turnName(i){return (ONLINE?(i===MYSEAT?'★あなた':'相手(P'+(i+1)+')'):'プレイヤー'+(i+1));}
function myAct(){return !ONLINE||curPlayer===MYSEAT;}
function initMulti(){
  players=[];for(let i=0;i<np;i++)players.push({chips:1000,bet:0,roll:null,last:''});
  dealer=Math.floor(Math.random()*np);roundNo=1;startBetPhase(); // 親ランダム
}
function startBetPhase(){
  mPhase='bet';
  players.forEach(p=>{p.bet=0;p.roll=null;p.last='';});
  betSeq=[];for(let k=1;k<np;k++)betSeq.push((dealer+k)%np);
  betIdx=0;curPlayer=betSeq[0];pendBet=Math.min(100,players[curPlayer].chips);
  showDice('m-bowl',[1,1,1]);document.getElementById('m-role').textContent='';document.getElementById('m-role').className='role';
  renderMulti();updateMultiControls();
  msg('R'+roundNo+'：親はP'+(dealer+1)+'。'+turnName(curPlayer)+'が賭けます');autoKick();
}
function _placeBet(amt){
  if(mPhase!=='bet')return;
  const p=players[curPlayer];p.bet=Math.max(1,Math.min(p.chips,amt));
  betIdx++;
  if(betIdx<betSeq.length){curPlayer=betSeq[betIdx];pendBet=Math.min(100,players[curPlayer].chips);renderMulti();updateMultiControls();msg(turnName(curPlayer)+'が賭けます');autoKick();}
  else startRollPhase();
}
function startRollPhase(){
  mPhase='roll';
  rollSeq=[dealer];for(let k=1;k<np;k++)rollSeq.push((dealer+k)%np);
  rollIdx=0;curPlayer=dealer;throws=0;
  renderMulti();updateMultiControls();
  msg('親 P'+(dealer+1)+' が振ります。「振る」をタップ');autoKick();
}
function _roll(){ // 1回の「振る」＝1投
  if(mPhase!=='roll'||players[curPlayer].roll)return;
  throws++;
  const {dice,res}=oneThrow();
  showDice('m-bowl',dice,true);
  const rl=document.getElementById('m-role');rl.textContent=pname(curPlayer)+' '+throws+'投目: '+res.name;rl.className='role'+(res.bad?' bad':'');
  if(!isFinalRole(res)&&throws<3){renderMulti();updateMultiControls();msg(pname(curPlayer)+'：役なし、もう一度「振る」（'+throws+'/3）');autoKick();return;}
  players[curPlayer].roll={dice,res};
  rollIdx++;throws=0;
  if(rollIdx>=np){renderMulti();settleRound();return;}
  curPlayer=rollSeq[rollIdx];
  renderMulti();updateMultiControls();
  msg((curPlayer===dealer?'親 ':'')+turnName(curPlayer)+' が振ります。「振る」をタップ');autoKick();
}
function settleRound(){
  mPhase='over';
  const dr=players[dealer].roll.res;let parts=[];
  for(let i=0;i<np;i++){
    if(i===dealer){players[i].last='';continue;}
    const cr=players[i].roll.res;let delta=0;
    if(cr.rank>dr.rank)delta=players[i].bet*(cr.mult||1);
    else if(cr.rank<dr.rank)delta=-players[i].bet*(dr.mult||1);
    players[i].chips+=delta;players[dealer].chips-=delta;
    players[i].last=delta>0?'+'+delta:delta<0?''+delta:'±0';
    parts.push(pname(i)+' '+players[i].last);
  }
  renderMulti();updateMultiControls();
  msg('清算（親P'+(dealer+1)+'：'+dr.name+'）→ '+(parts.join(' / ')||'—'));
}
function _next(){
  players.forEach(p=>{if(p.chips<=0)p.chips=1000;});
  dealer=(dealer+1)%np;roundNo++;startBetPhase();
}
// CPU席・退出席の代理（ホストが送信）: チンチロは運ゲーなのでCPUも適当ベット＋ロール
function isAutoSeat(s){return ONLINE&&window.OnlineRoom&&((OnlineRoom.isCpu&&OnlineRoom.isCpu(s))||(OnlineRoom.isGone&&OnlineRoom.isGone(s)));}
function autoKick(){
  if(!ONLINE||!OnlineRoom.isHost())return;
  const a=curPlayer;if(!isAutoSeat(a))return;
  const cpu=OnlineRoom.isCpu&&OnlineRoom.isCpu(a);
  if(mPhase==='bet'){const amt=cpu?Math.max(1,Math.min(50,Math.ceil(players[a].chips*0.1))):Math.max(1,Math.min(50,players[a].chips));setTimeout(()=>{if(ONLINE&&OnlineRoom.isHost()&&mPhase==='bet'&&curPlayer===a&&isAutoSeat(a))OnlineRoom.send({k:'bet',amt});},700);}
  else if(mPhase==='roll'){setTimeout(()=>{if(ONLINE&&OnlineRoom.isHost()&&mPhase==='roll'&&curPlayer===a&&isAutoSeat(a))OnlineRoom.send({k:'roll'});},700);}
}
function renderMulti(){
  const bd=document.getElementById('mboard');bd.innerHTML='';
  for(let i=0;i<np;i++){
    const p=players[i],r=p.roll;
    const active=(i===curPlayer&&mPhase!=='over');
    const c=document.createElement('div');
    c.className='pcard'+(active?' active':'')+(ONLINE&&i===MYSEAT?' me':'')+(i===dealer?' win':'');
    const lastHtml=(p.last&&mPhase==='over')?'<div class="pr" style="color:'+(p.last[0]==='+'?'#6CC56C':p.last[0]==='-'?'#e0533e':'var(--sub)')+'">'+p.last+'</div>':'';
    c.innerHTML='<div class="pn" style="color:'+PCOL[i]+';font-weight:800">'+pname(i)+(i===dealer?' 👑親':'')+'</div>'+
      '<div class="sc">'+p.chips+'</div>'+
      '<div class="pr" style="color:var(--sub);min-height:14px">'+(i!==dealer&&p.bet?'賭 '+p.bet:'')+'</div>'+
      miniDice(r?r.dice:null)+
      '<div class="pr" style="'+(r&&r.res.bad?'color:#e0533e':'')+'">'+(r?r.res.name:'—')+'</div>'+lastHtml;
    bd.appendChild(c);
  }
  const tl=document.getElementById('m-turnlab');
  tl.textContent=mPhase==='bet'?'賭けフェーズ（R'+roundNo+'）':mPhase==='roll'?('親P'+(dealer+1)+' / '+turnName(curPlayer)+'の番'):('清算 R'+roundNo);
  tl.style.color=(mPhase==='roll'||mPhase==='bet')?PCOL[curPlayer]:'var(--gold)';tl.style.fontWeight='800';
  if(ONLINE&&window.OnlineRoom&&OnlineRoom.setTurn)OnlineRoom.setTurn(curPlayer===MYSEAT&&mPhase!=='over');
}
function updateMultiControls(){
  const betShow=mPhase==='bet'&&myAct();
  const rollShow=mPhase==='roll'&&myAct()&&!players[curPlayer].roll;
  const nextShow=mPhase==='over'&&(!ONLINE||MYSEAT===0);
  document.getElementById('m-betrow').style.display=betShow?'flex':'none';
  document.getElementById('roll').classList.toggle('hidden',!rollShow);
  document.getElementById('m-next').classList.toggle('hidden',!nextShow);
  if(betShow){pendBet=Math.min(pendBet||100,players[curPlayer].chips);document.getElementById('m-betv').textContent=pendBet;}
}
// 入力 → 中継
function emit(a){if(ONLINE){if(a.k==='next'){if(MYSEAT!==0)return;}else if(curPlayer!==MYSEAT)return;roomSend(a);}else doAction(a);}
function doAction(a){if(a.k==='bet')_placeBet(a.amt);else if(a.k==='roll')_roll();else if(a.k==='next')_next();}

/* ============ shared controls ============ */
function rollClick(){if(mode==='solo'){playSolo();return;}if(mPhase==='roll')emit({k:'roll'});}
const RULE_SOLO='親(CPU)と勝負。3個振って<b>役（目を含む）が出たらそこで止め</b>、出なければ最大3回まで振り直し。出目の強さで賭けを清算。倍率: ピンゾロ=5 / ゾロ目=3 / シゴロ=2 / 目=1 / ヒフミ=負け2倍。';
const RULE_MULTI='<b>親（順番に交代）vs 子</b>。子がチップを賭け→親→子の順に振る（役が出たら止め・最大3投）。ターン後に出目の強さで清算（子が勝てば賭け×倍率を獲得、負ければ親に没収）。倍率: ピンゾロ=5 / ゾロ目=3 / シゴロ=2 / 目=1 / ヒフミ=負け2倍。';
function setMode(m){
  mode=m;
  document.querySelectorAll('#mode button').forEach(x=>x.classList.toggle('on',x.dataset.m===m));
  document.getElementById('nprow').classList.toggle('hidden',m!=='multi');
  document.getElementById('solo-area').classList.toggle('hidden',m!=='solo');
  document.getElementById('multi-area').classList.toggle('hidden',m!=='multi');
  document.getElementById('betrow').classList.toggle('hidden',m!=='solo');
  document.getElementById('mreset').classList.toggle('hidden',m!=='multi');
  document.getElementById('rule').innerHTML=m==='solo'?RULE_SOLO:RULE_MULTI;
  if(m==='solo'){document.getElementById('roll').classList.remove('hidden');document.getElementById('m-next').classList.add('hidden');document.getElementById('m-betrow').style.display='none';document.getElementById('roll').disabled=false;showDice('cpu-bowl',[1,1,1]);showDice('me-bowl',[1,1,1]);setBet();msg('賭けを決めて「振る」');}
  else initMulti();
}
document.getElementById('mode').addEventListener('click',e=>{const b=e.target.closest('button');if(!b||ONLINE)return;setMode(b.dataset.m);});
document.getElementById('nprow').addEventListener('click',e=>{const b=e.target.closest('button');if(!b||ONLINE)return;np=+b.dataset.np;document.querySelectorAll('#nprow button').forEach(x=>x.classList.toggle('on',x===b));initMulti();});
document.getElementById('betrow').addEventListener('click',e=>{const b=e.target.closest('button');if(!b||busy||soloPhase!=='bet')return;const v=b.dataset.b;if(v==='max')bet=chips;else bet=Math.max(50,Math.min(chips,bet+ +v));setBet();});
document.getElementById('m-betrow').addEventListener('click',e=>{const b=e.target.closest('button');if(!b||!b.dataset.b)return;if(mode!=='multi'||mPhase!=='bet'||!myAct())return;const mx=players[curPlayer].chips,v=b.dataset.b;if(v==='max')pendBet=mx;else pendBet=Math.max(Math.min(50,mx),Math.min(mx,pendBet+ +v));document.getElementById('m-betv').textContent=pendBet;});
document.getElementById('m-betok').addEventListener('click',()=>{if(mode!=='multi'||mPhase!=='bet'||!myAct())return;emit({k:'bet',amt:pendBet});});
document.getElementById('m-next').addEventListener('click',()=>{if(mode!=='multi')return;if(ONLINE&&MYSEAT!==0)return;emit({k:'next'});});
document.getElementById('roll').addEventListener('click',rollClick);
document.getElementById('mreset').addEventListener('click',()=>{if(ONLINE)return;initMulti();});
// init solo view
showDice('cpu-bowl',[1,1,1]);showDice('me-bowl',[1,1,1]);setBet();
document.getElementById('chips').textContent=chips;
document.getElementById('rule').innerHTML=RULE_SOLO;

function startOnline(seat,n,send){ONLINE=true;MYSEAT=seat;roomSend=send;np=n;
  document.getElementById('mode').classList.add('hidden');
  document.getElementById('nprow').classList.add('hidden');
  setMode('multi');
}
// 再接続: 現在状態の書き出し/復元
function getState(){return {players,dealer,curPlayer,mPhase,roundNo,betSeq,betIdx,rollSeq,rollIdx,throws,pendBet};}
function applyState(o){ONLINE=true;MYSEAT=o.seat;roomSend=o.send;np=o.n;mode='multi';
  document.getElementById('mode').classList.add('hidden');
  document.getElementById('nprow').classList.add('hidden');
  document.getElementById('solo-area').classList.add('hidden');
  document.getElementById('multi-area').classList.remove('hidden');
  document.getElementById('betrow').classList.add('hidden');
  document.getElementById('mreset').classList.add('hidden');
  document.getElementById('rule').innerHTML=RULE_MULTI;
  const s=o.state;players=s.players;dealer=s.dealer;curPlayer=s.curPlayer;mPhase=s.mPhase;roundNo=s.roundNo;betSeq=s.betSeq;betIdx=s.betIdx;rollSeq=s.rollSeq;rollIdx=s.rollIdx;throws=s.throws;pendBet=s.pendBet;
  showDice('m-bowl',[1,1,1]);document.getElementById('m-role').textContent='';
  renderMulti();updateMultiControls();autoKick();}
</script>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script src="../shared/lobby.js?v=7"></script>
<script src="../shared/online-room.js?v=8"></script>
<script>
OnlineRoom.init({gameId:'chinchiro',minPlayers:2,maxPlayers:4,note:'全員で振って役の強さを競います。',
  onStart:(seat,n,send)=>startOnline(seat,n,send),
  onMessage:(from,msg)=>doAction(msg),
  onLeft:(seat)=>{if(mode==='multi')autoKick();},
  getState,applyState});
</script>
