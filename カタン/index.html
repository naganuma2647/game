// ============ Self-play training (evolutionary) ============
let trainingActive = false;
const TRAIN = { gen: 0, totalGames: 0, targetGames: 170, evalGames: 16, champ: null, champScore: 0, baseScore: 0, accepted: 0 };

function simulateOneGame(weightsArr) {
  const savedState = state, savedBoard = board, wasSim = SIMULATING, savedTW = trainingWeights;
  SIMULATING = true;
  trainingWeights = weightsArr;
  initGame({ count: weightsArr.length, types: weightsArr.map(() => 'ai') });
  let guard = 0;
  while (state.phase !== 'win' && guard < 40000) { aiStep(); guard++; }
  const winner = state.winner;
  SIMULATING = wasSim; trainingWeights = savedTW;
  state = savedState; board = savedBoard;
  return winner;
}

function mutateWeights(base) {
  const w = { ...base };
  for (const k of WEIGHT_KEYS) {
    if (Math.random() < 0.6) {
      const b = WEIGHT_BOUNDS[k], span = b[1] - b[0];
      w[k] = Math.max(b[0], Math.min(b[1], w[k] + (Math.random() * 2 - 1) * span * 0.25));
    }
  }
  return w;
}

// Head-to-head: 2 seats champion, 2 seats challenger (seating alternated). Returns wins.
function duel(champion, challenger, games) {
  let champWins = 0, chalWins = 0;
  for (let g = 0; g < games; g++) {
    const seats = (g % 2 === 0)
      ? [champion, challenger, champion, challenger]
      : [challenger, champion, challenger, champion];
    const winner = simulateOneGame(seats);
    if (winner == null) continue;
    if (seats[winner] === champion) champWins++; else chalWins++;
  }
  return { champWins, chalWins };
}

// Win rate of a weight set against the fixed baseline (default) AI
function winrateVsDefault(weights, games) {
  const r = duel({ ...DEFAULT_WEIGHTS }, weights, games);  // chalWins = weights' wins
  TRAIN.totalGames += games;
  return r.chalWins / ((r.champWins + r.chalWins) || 1);
}

function startTraining() {
  if (trainingActive) return;
  trainingActive = true;
  TRAIN.gen = 0; TRAIN.totalGames = 0; TRAIN.accepted = 0;
  TRAIN.champ = { ...ACTIVE_WEIGHTS };
  document.getElementById('startScreen').classList.add('show');
  renderTrainingUI(0);
  setTimeout(() => {
    // baseline score of the starting champion vs the default AI
    TRAIN.champScore = winrateVsDefault(TRAIN.champ, TRAIN.evalGames);
    TRAIN.baseScore = TRAIN.champScore;
    setTimeout(trainStep, 0);
  }, 30);
}

function trainStep() {
  if (TRAIN.totalGames >= TRAIN.targetGames) { finishTraining(); return; }
  TRAIN.gen++;
  const challenger = mutateWeights(TRAIN.champ);
  const s = winrateVsDefault(challenger, TRAIN.evalGames);
  // accept only a clear improvement (margin guards against self-play noise)
  if (s > TRAIN.champScore + 0.02) { TRAIN.champ = challenger; TRAIN.champScore = s; TRAIN.accepted++; }
  renderTrainingUI(Math.min(99, Math.round(TRAIN.totalGames / TRAIN.targetGames * 100)));
  setTimeout(trainStep, 0);
}

function finishTraining() {
  // Honest final validation over a larger sample; never save a weaker AI.
  const finalWR = winrateVsDefault(TRAIN.champ, 80);
  const pct = Math.round(finalWR * 100);
  const improved = finalWR >= 0.52;
  if (improved) { ACTIVE_WEIGHTS = { ...TRAIN.champ }; saveWeights(ACTIVE_WEIGHTS); }
  trainingActive = false;
  renderTrainingDone(pct, improved);
}

function resetTraining() {
  try { if (typeof localStorage !== 'undefined') localStorage.removeItem('catanAIWeights'); } catch (e) {}
  ACTIVE_WEIGHTS = { ...DEFAULT_WEIGHTS };
  renderStartScreen();
}

function renderTrainingUI(pct) {
  const card = document.getElementById('startCard');
  card.innerHTML = `
    <h1>学習中…</h1>
    <div class="tag">AI 自己対戦による強化</div>
    <div class="train-bar"><div class="train-fill" style="width:${pct}%"></div></div>
    <div class="train-stat">対戦数 <b>${TRAIN.totalGames}</b> / ${TRAIN.targetGames}　世代 <b>${TRAIN.gen}</b>　改善採用 <b>${TRAIN.accepted}</b> 回</div>
    <div class="train-note">数百局を自己対戦し、勝率の高いパラメータを選抜しています…</div>`;
}

function renderTrainingDone(winRate, improved) {
  const card = document.getElementById('startCard');
  card.innerHTML = `

    <div class="tag">${improved ? '強化AIを保存しました' : '今回は据え置き'}</div>
    <div class="train-result">

    </div>
    <div class="train-note">${improved
      ? '標準AIに明確に勝ち越したため、この強化結果を保存し以降のAIへ自動適用します（4人対戦のうち2席が強化AIで勝率を測定）。'
      : '今回は明確な改善（勝率52%以上）に届かなかったため、AIは強くしませんでした。もう一度「強化する」で再試行できます。'}</div>
    <button class="start-btn" onclick="renderStartScreen()">設定に戻る</button>`;
}

// ============ Rendering ============
function render() {
  if (SIMULATING) return;          // headless self-play: skip all DOM work
  renderBoard(); renderSidebar(); renderControls(); renderStickyBar(); maybeScheduleAI();
}

// Always-visible primary action (roll / end-turn) pinned at the bottom of the sidebar
function renderStickyBar() {
  const bar = document.getElementById('stickyBar');
  if (!bar) return;
  bar.innerHTML = '';
  if (!state || state.phase === 'win') return;
  if (!humanActing() || state.tradeCompose) return;   // AI/autopilot turn or composing → no pinned buttons
  if (state.phase === 'roll') {
    const b = document.createElement('button'); b.className = 'roll';
    b.textContent = '🎲 サイコロを振る'; b.onclick = rollDice; bar.appendChild(b);
  } else if (state.phase === 'build' && !state.pendingFreeRoads && !state.pendingPlenty && !state.pendingMonopoly) {
    const b = document.createElement('button'); b.className = 'endturn';
    b.textContent = 'ターンを終了'; b.onclick = endTurn; bar.appendChild(b);
  }
  if (state.phase === 'roll' || state.phase === 'build') {
    const a = document.createElement('button'); a.className = 'auto';
    a.textContent = '🤖 AIに任せて休憩'; a.onclick = toggleAutopilot; bar.appendChild(a);
  }
}

      svg.appendChild(rt);

      circ.addEventListener('click', () => doBuildSettlement(v.id));
      svg.appendChild(circ);
    }
  }

  drawBoardOverlays(svg);
}

  const rt = svgEl('text', { x: -376, y: -430, 'font-size': 16, 'font-weight': '700', 'text-anchor': 'middle', fill: '#e8c477', 'pointer-events': 'none' });
  rt.textContent = '🔄 ' + rlabel;
  svg.appendChild(rt);
}

function renderSidebar() {
  const pi = document.getElementById('phaseInfo');
  const p = currentP();
  let phaseText = '', bg = p.color;
  if (state.phase === 'win') { phaseText = `🏆 ${state.players[state.winner].name} の勝利！`; bg = '#48bb78'; }
  else if (state.tradeCompose) {
    const c = state.players[state.tradeCompose.composer];
    phaseText = (state.tradeCompose.composer !== state.currentPlayer)
      ? `🔁 ${c.name}：逆オファーを作成中` : `🤝 ${c.name}：交渉を作成中`;
    bg = c.color;
  }
  else if (state.phase === 'setup1') phaseText = `初期配置1巡目 — ${p.name}（${state.setupStep === 'settlement' ? '開拓地' : '道'}）`;
  else if (state.phase === 'setup2') phaseText = `初期配置2巡目 — ${p.name}（${state.setupStep === 'settlement' ? '開拓地' : '道'}）`;
  else if (state.phase === 'roll')   phaseText = `${p.name} の番：サイコロを振る`;
  else if (state.phase === 'discard') {
    const dq = state.discardQueue[0];
    phaseText = `🎲7! ${state.players[dq.player].name} 捨札選択（${dq.count}枚）`;
    bg = state.players[dq.player].color;
  }
  else if (state.phase === 'robber') phaseText = `${p.name}：盗賊を移動するヘックスを選択`;
  else if (state.phase === 'steal')  phaseText = `${p.name}：誰から盗む？`;
  else if (state.phase === 'trade-respond' && state.tradeOffer) {
    if (state.tradeOffer.broadcast) {
      phaseText = `📢 ${state.players[state.tradeOffer.from].name}：全員へ交渉（相手を選択）`;
      bg = state.players[state.tradeOffer.from].color;
    } else {
      phaseText = `📨 ${state.players[state.tradeOffer.target].name}：交渉への返答`;
      bg = state.players[state.tradeOffer.target].color;
    }
  }
  else if (state.phase === 'build') {
    if (state.pendingFreeRoads > 0) phaseText = `${p.name}：街道建設（残り${state.pendingFreeRoads}本）`;
    else if (state.pendingPlenty > 0) phaseText = `${p.name}：発見で資源を2つ選択`;
    else if (state.pendingMonopoly) phaseText = `${p.name}：独占する資源を選択`;
    else phaseText = `${p.name} の番：建設・取引・終了`;
  }
  pi.textContent = phaseText;
  pi.style.background = bg;
  pi.style.color = (bg === '#edf2f7' && state.phase !== 'win') ? '#000' : '#fff';

  const d = state.dice;
  const roundTxt = (state.phase === 'setup1' || state.phase === 'setup2')
    ? 'セットアップ' : `第 ${Math.floor((state.turnCount || 0) / state.numPlayers) + 1} 週目`;
  const hasAI = state.players.some(pp => pp.isAI);
  const cpuTxt = hasAI ? ` ・ CPU Lv${state.difficulty}` : '';
  const diceTxt = d[0] ? `🎲 ${d[0]} + ${d[1]} = ${d[0] + d[1]}` : '🎲 -';
  document.getElementById('dice').innerHTML =
    `<div style="font-size:13px;color:#e8c477;letter-spacing:1px;font-family:'Noto Sans JP',sans-serif;margin-bottom:5px">🔄 ${roundTxt}${cpuTxt}</div>${diceTxt}`;

  const actor = actorOf();
  const pdiv = document.getElementById('players');
  pdiv.innerHTML = '';
  for (const pl of state.players) {
    const card = document.createElement('div');
    card.className = 'player-card' + (pl.id === state.currentPlayer ? ' current' : '');
    card.style.setProperty('--pcolor', pl.color === '#000000' ? '#3a3a3a' : pl.color);
    const total = totalRes(pl);
    const nameColor = (pl.color === '#edf2f7' || pl.color === '#000000') ? '#fff' : pl.color;
    // Reveal own hand only to the human actor; everything on win; or via 全公開 toggle
    const reveal = state.revealAll || state.phase === 'win' || (actor != null && pl.id === actor && !pl.isAI);

    const showVp = reveal ? totalVp(pl) : pl.vp;           // hide secret VP cards from opponents
    const hidden = (reveal && pl.hiddenVp > 0) ? ` <span class="badge">+${pl.hiddenVp}隠VP</span>` : '';
    const brainTag = (pl.isAI && pl.brainName) ? `<span class="who-tag brain">🧠 ${pl.brainName}</span>` : '';
    const whoTag = (pl.isAI ? `<span class="who-tag ai">🤖 AI</span>` : `<span class="who-tag human">🧑 人間</span>`) + brainTag;

    // Resources
    let resHtml;
    if (reveal) {
      resHtml = RESOURCES.map(r => `<span class="resource-chip">${RESOURCE_EMOJI[r]}${pl.resources[r]}</span>`).join('')
        + `<span class="resource-chip">計${total}</span>`;
    } else {
      resHtml = `<span class="cardback">🎴 手札 ${total} 枚</span>`;
    }

    // Three default stats: dev-card count / army (played knights) / longest road
    const devCount = pl.devCards.length;
    const lrLen = longestRoadFor(pl.id);
    const armyBadge = state.largestArmy.player === pl.id ? ' <span class="mini-badge">👑最大騎士</span>' : '';
    const roadBadge = state.longestRoad.player === pl.id ? ' <span class="mini-badge">👑最長交易路</span>' : '';
    const statRow = `<div class="stat-row">
      <span>🎴 発展カード <b>${devCount}</b></span>
      <span>⚔️ 騎士力 <b>${pl.playedKnights}</b>${armyBadge}</span>
      <span>🛣️ 最長交易路 <b>${lrLen}</b>${roadBadge}</span>
    </div>`;

    // Revealed dev-card breakdown (types) only when revealed
    let devStr = '';
    if (reveal && pl.devCards.length) {
      devStr = '内訳: ' + pl.devCards.map(c => c.justBought ? `<span style="opacity:0.5">${DEV_NAMES[c.type]}(新)</span>` : DEV_NAMES[c.type]).join(' / ');
    }
    const devLine = devStr ? `<div class="dev-line">${devStr}</div>` : '';

    const portsArr = Array.from(pl.ports);
    const portStr = portsArr.length ? `<div class="dev-line">港: ${portsArr.map(p => PORT_LABEL[p]).join(' ')}</div>` : '';

    card.innerHTML = `
      <div class="player-name" style="color:${nameColor}">${pl.name} ${whoTag} — VP ${showVp}/10${hidden}</div>
      <div class="player-stats">${resHtml}</div>
      ${statRow}
      ${portStr}
      ${devLine}
    `;
    pdiv.appendChild(card);
  }

  const adiv = document.getElementById('actions');
  adiv.innerHTML = '';

  if (state.phase !== 'win' && actorIsAI()) {
    renderAIStatus(adiv);
  } else if (state.tradeCompose) {
    renderTradeComposeUI(adiv);                 // compose / counter-offer (any phase)
  } else if (state.phase === 'roll') {
    const btn = document.createElement('button');
    btn.textContent = '🎲 サイコロを振る';
    btn.onclick = rollDice;
    adiv.appendChild(btn);
    // a Knight may be played BEFORE rolling
    const playable = playableDevs(p);
    const knightIdx = playable.findIndex(c => c.type === 'knight');
    if (!state.devCardPlayedThisTurn && knightIdx >= 0) {
      const kb = document.createElement('button');
      kb.innerHTML = '🛡️ 騎士カードを使う <span class="cost-hint">（サイコロを振る前）</span>';
      kb.onclick = () => playDevCard(knightIdx);
      adiv.appendChild(kb);
    } else if (state.devCardPlayedThisTurn) {
      const note = document.createElement('div');
      note.style.cssText = 'font-size:10px;color:#a0aec0;padding:2px';
      note.textContent = '※ このターンは発展カードを使用済み';
      adiv.appendChild(note);
    }
  } else if (state.phase === 'discard') {
    renderDiscardUI(adiv);
  } else if (state.phase === 'steal') {
    const h = document.createElement('h3'); h.textContent = '盗む相手を選択'; adiv.appendChild(h);
    for (const pid of state.stealOptions) {
      const b = document.createElement('button');
      b.textContent = `${state.players[pid].name} から盗む（手札${totalRes(state.players[pid])}）`;
      b.onclick = () => chooseSteal(pid);
      adiv.appendChild(b);
    }
  } else if (state.phase === 'trade-respond') {
    renderTradeRespondUI(adiv);
  } else if (state.phase === 'build') {
    if (state.pendingPlenty > 0) renderPlentyUI(adiv);
    else if (state.pendingMonopoly) renderMonopolyUI(adiv);
    else renderBuildUI(adiv);
  } else if (state.phase === 'win') {
    const div = document.createElement('div');
    div.style.fontSize = '14px'; div.style.padding = '8px'; div.style.textAlign = 'center';
    div.textContent = `${state.players[state.winner].name} が${totalVp(state.players[state.winner])}点で勝利`;
    adiv.appendChild(div);
    const nb = document.createElement('button');
    nb.textContent = '⟲ 新しいゲーム（設定へ）';
    nb.className = 'end';
    nb.onclick = showStartScreen;
    adiv.appendChild(nb);
  }

  const ldiv = document.getElementById('log');
  ldiv.innerHTML = state.log.map(l => `<div class="log-line">${l}</div>`).join('');

  renderDiceStats();
  updateClock();
}

function toggleDiceStats() {
  if (!state) return;
  state.diceStatsOpen = !state.diceStatsOpen;
  renderDiceStats();
}

function renderDiceStats() {
  const el = document.getElementById('diceStats');
  if (!el) return;
  const counts = state.diceCounts;
  const total = Object.keys(counts).reduce((s, k) => s + counts[k], 0);
  const open = !!state.diceStatsOpen;
  let html = `<div class="dstat-head clickable" onclick="toggleDiceStats()">
    <span>${open ? '▾' : '▸'} 🎲 出目の分布</span>
    <span class="dstat-count">計 ${total} 回</span>
  </div>`;
  if (open) {
    let maxC = 1;
    for (let n = 2; n <= 12; n++) maxC = Math.max(maxC, counts[n] || 0);
    for (let n = 2; n <= 12; n++) {
      const c = counts[n] || 0;
      const w = Math.round((c / maxC) * 100);
      const pct = total ? Math.round((c / total) * 100) : 0;
      const cls = n === 7 ? 'seven' : (c === maxC && c > 0 ? 'hot' : '');
      html += `<div class="dstat-row">
        <span class="dn ${n === 7 ? 'seven' : ''}">${n}</span>
        <div class="dbar-track"><div class="dbar ${cls}" style="width:${w}%"></div></div>
        <span class="dc">${c}<small> ${pct}%</small></span>
      </div>`;
    }
  }
  el.innerHTML = html;
}

  }[state.phase] || '思考';

    <div class="sub">${state.aiPaused ? '⏸ 一時停止中 — 「1手」または「AI再開」' : '自動進行中'}</div>`;
  adiv.appendChild(div);
  if (state.aiPaused) {
    const sb = document.createElement('button');

function renderDiscardUI(adiv) {
  const dq = state.discardQueue[0];
  const dp = state.players[dq.player];
  const totalSel = RESOURCES.reduce((s,r)=>s+dq.selected[r],0);
  const h = document.createElement('h3');

  adiv.appendChild(h);
  for (const r of RESOURCES) {

    row.className = 'disc-row';
    row.innerHTML = `
      <span class="label">${RESOURCE_EMOJI[r]} ${RESOURCE_NAMES[r]}</span>
      <button data-act="minus">−</button>
      <span class="count">${dq.selected[r]}</span>
      <button data-act="plus">＋</button>
      <span style="font-size:11px;color:#a0aec0">手札${dp.resources[r]}</span>
    `;
    row.querySelector('[data-act="minus"]').onclick = () => discardAdjust(r, -1);

function renderTradeComposeUI(adiv) {
  const t = state.tradeCompose;
  const composer = state.players[t.composer];
  const isCounter = t.composer !== state.currentPlayer;
  const h = document.createElement('h3');
  h.textContent = isCounter ? `🔁 ${composer.name} の逆オファー（再交渉）` : '🤝 プレイヤー交渉';
  adiv.appendChild(h);

  const tgtLabel = document.createElement('div');
  tgtLabel.style.cssText = 'font-size:12px;margin:4px 0 2px';
  tgtLabel.textContent = '相手:';
  adiv.appendChild(tgtLabel);
  if (isCounter) {
    // a counter-offer can only go back to the player who sent the original offer
    const fixed = document.createElement('div');
    fixed.style.cssText = 'padding:7px 10px;background:#15131e;border:1px solid var(--line);border-radius:9px;font-size:12px;font-weight:700';
    fixed.textContent = `${state.players[t.target].name}（提案してきた相手）`;
    adiv.appendChild(fixed);
  } else {
    const sel = document.createElement('select');
    const allOpt = document.createElement('option');   // broadcast option for a fresh offer
    allOpt.value = 'all'; allOpt.textContent = '📢 全員に提案';
    if (t.target === 'all') allOpt.selected = true;
    sel.appendChild(allOpt);
    for (const other of state.players) {
      if (other.id === composer.id) continue;
      const opt = document.createElement('option');
      opt.value = other.id; opt.textContent = `${other.name}（手札${totalRes(other)}）`;
      if (other.id === t.target) opt.selected = true;
      sel.appendChild(opt);
    }
    sel.onchange = (e) => tradeComposeTarget(e.target.value);
    adiv.appendChild(sel);
  }

  // build a horizontal 5-resource control row
  function buildRow(side, labelText, cls, showHold) {
    const lab = document.createElement('div');
    lab.className = 'trade2-label ' + cls;
    lab.textContent = labelText;
    adiv.appendChild(lab);
    const row = document.createElement('div');
    row.className = 'trade2-row';
    for (const r of RESOURCES) {
      const cell = document.createElement('div');
      cell.className = 'trade2-cell';
      const hold = showHold ? `<div class="hold">手${composer.resources[r]}</div>` : `<div class="hold">&nbsp;</div>`;
      cell.innerHTML = `<div class="emo">${RESOURCE_EMOJI[r]}</div>
        <div class="ctl"><button data-a="m">−</button><span class="v">${t[side][r]}</span><button data-a="p">＋</button></div>
        ${hold}`;
      cell.querySelector('[data-a="m"]').onclick = () => tradeComposeAdjust(side, r, -1);
      cell.querySelector('[data-a="p"]').onclick = () => tradeComposeAdjust(side, r, 1);
      row.appendChild(cell);
    }
    adiv.appendChild(row);
  }

  // top row = もらう（受け取る）= requesting ／ bottom row = 出す（わたす）= offering
  buildRow('requesting', '⬆ もらう（受け取る）', 'recv', false);
  buildRow('offering', '⬇ 出す（わたす）', 'give', true);

  const sendBtn = document.createElement('button');
  sendBtn.textContent = isCounter ? '🔁 逆オファーを送る' : '送信';
  sendBtn.className = 'end';
  sendBtn.onclick = tradeComposeSend;
  adiv.appendChild(sendBtn);

  const cb = document.createElement('button');
  cb.textContent = 'キャンセル'; cb.className = 'cancel';
  cb.onclick = tradeComposeCancel;
  adiv.appendChild(cb);
}

function renderTradeRespondUI(adiv) {
  const o = state.tradeOffer;
  const from = state.players[o.from];

  // ---- Broadcast: the proposer chooses a willing partner ----
  if (o.broadcast) {
    const h = document.createElement('h3'); h.textContent = `📢 ${from.name} の全員交渉`; adiv.appendChild(h);
    const recvDesc = Object.entries(o.requesting).filter(([_,n])=>n>0).map(([r,n])=>`${RESOURCE_EMOJI[r]}×${n}`).join(' ') || '(なし)';
    const giveDesc = Object.entries(o.offering).filter(([_,n])=>n>0).map(([r,n])=>`${RESOURCE_EMOJI[r]}×${n}`).join(' ') || '(なし)';
    const box = document.createElement('div'); box.className = 'offer-box';
    box.innerHTML = `<div class="offer-line recv">⬆ もらう（${from.name}受取）: <b>${recvDesc}</b></div>
                     <div class="offer-line give">⬇ 出す（${from.name}渡す）: <b>${giveDesc}</b></div>`;
    adiv.appendChild(box);
    const sub = document.createElement('div'); sub.style.cssText = 'font-size:11px;color:#a0aec0;margin:4px 0';
    sub.textContent = '成立させる相手を選んでください:'; adiv.appendChild(sub);
    for (const other of state.players) {
      if (other.id === o.from) continue;
      const canAfford = RESOURCES.every(r => other.resources[r] >= o.requesting[r]);
      const aiWilling = other.isAI ? wouldAcceptTrade(o.offering, o.requesting, other.id) : null;
      const b = document.createElement('button');
      let suffix = !canAfford ? '（資源不足）' : (other.isAI ? (aiWilling ? '（🤖承諾OK）' : '（🤖拒否）') : '');
      b.textContent = `${other.name} と成立${suffix}`;
      b.disabled = !canAfford || (other.isAI && !aiWilling);
      if (!b.disabled) b.className = 'end';
      b.onclick = () => tradeBroadcastComplete(other.id);
      adiv.appendChild(b);
    }
    const cancel = document.createElement('button'); cancel.textContent = '取りやめ'; cancel.className = 'danger';
    cancel.onclick = tradeDecline; adiv.appendChild(cancel);
    return;
  }

  // ---- Single target ----
  const target = state.players[o.target];
  const h = document.createElement('h3'); h.textContent = `📨 ${from.name} → ${target.name} の交渉`; adiv.appendChild(h);
  // shown from the RESPONDER (target)'s perspective: 上=もらう / 下=出す
  const recvDesc = Object.entries(o.offering).filter(([_,n])=>n>0).map(([r,n])=>`${RESOURCE_EMOJI[r]}×${n}`).join(' ') || '(なし)';
  const giveDesc = Object.entries(o.requesting).filter(([_,n])=>n>0).map(([r,n])=>`${RESOURCE_EMOJI[r]}×${n}`).join(' ') || '(なし)';
  const box = document.createElement('div');
  box.className = 'offer-box';
  box.innerHTML = `<div class="offer-line recv">⬆ もらう（${target.name}受取）: <b>${recvDesc}</b></div>
                   <div class="offer-line give">⬇ 出す（${target.name}渡す）: <b>${giveDesc}</b></div>`;
  adiv.appendChild(box);
  if (state.tradeDeadline) {
    const cd = document.createElement('div');
    cd.id = 'tradeCountdown';
    cd.style.cssText = 'text-align:center;font-weight:700;font-size:12px;color:#e8c477;margin:2px 0 4px';
    const remain = Math.max(0, Math.ceil((state.tradeDeadline - Date.now()) / 1000));
    cd.textContent = `⏱ 残り ${remain} 秒で自動拒否`;
    adiv.appendChild(cd);
  }
  const canAccept = RESOURCES.every(r => target.resources[r] >= o.requesting[r]);
  const note = document.createElement('div');
  note.style.fontSize = '11px'; note.style.color = canAccept ? '#48bb78' : '#e53e3e';
  note.textContent = canAccept ? `${target.name} は承諾可能` : `${target.name} は資源不足で承諾できません`;
  adiv.appendChild(note);
  const ac = document.createElement('button');
  ac.textContent = `✅ ${target.name} 承諾`;
  ac.className = 'end'; ac.disabled = !canAccept;
  ac.onclick = tradeAccept;
  adiv.appendChild(ac);
  const co = document.createElement('button');
  co.textContent = '🔁 逆オファーで再交渉';
  co.onclick = openCounterOffer;
  adiv.appendChild(co);
  const dc = document.createElement('button');
  dc.textContent = `❌ ${target.name} 拒否`;
  dc.className = 'danger';
  dc.onclick = tradeDecline;
  adiv.appendChild(dc);
}

function renderMonopolyUI(adiv) {
  const h = document.createElement('h3'); h.textContent = `💰 独占 — 資源種類を選択`; adiv.appendChild(h);
  for (const r of RESOURCES) {
    const b = document.createElement('button');
    b.textContent = `${RESOURCE_EMOJI[r]} ${RESOURCE_NAMES[r]}`;
    b.onclick = () => monopolyChoose(r);
    adiv.appendChild(b);
  }
}

function renderBuildUI(adiv) {
  const p = currentP();
  const blocked = state.pendingFreeRoads > 0;
  const roadOk   = (state.pendingFreeRoads > 0) || (!blocked && canAfford(p, COSTS.road) && p.roadsLeft > 0);
  const settleOk = !blocked && canAfford(p, COSTS.settlement) && p.settlementsLeft > 0;
  const cityOk   = !blocked && canAfford(p, COSTS.city)       && p.citiesLeft > 0;
  const devOk    = !blocked && canAfford(p, COSTS.dev)        && state.devDeck.length > 0;

  const mkBtn = (label, kind, ok) => {
    const b = document.createElement('button');
    b.innerHTML = label;
    b.disabled = !ok;
    if (state.buildMode === kind) b.classList.add('active');
    b.onclick = () => startBuild(kind);
    adiv.appendChild(b);
  };

  if (state.pendingFreeRoads > 0) {
    const note = document.createElement('div');
    note.style.padding = '4px'; note.style.fontSize = '12px'; note.style.color = '#fbc02d';
    note.textContent = `🛣️ 街道建設発動中：残り${state.pendingFreeRoads}本（無料）`;
    adiv.appendChild(note);
  } else {
    mkBtn('道を建設 <span class="cost-hint">🌲🧱</span>', 'road', roadOk);
    mkBtn('開拓地を建設 <span class="cost-hint">🌲🧱🐑🌾</span>', 'settlement', settleOk);
    mkBtn('都市に発展 <span class="cost-hint">⛰️×3 🌾×2</span>', 'city', cityOk);

    const devBtn = document.createElement('button');
    devBtn.innerHTML = `🎴 発展カードを購入 <span class="cost-hint">🐑🌾⛰️ (残${state.devDeck.length})</span>`;
    devBtn.disabled = !devOk;
    devBtn.onclick = buyDevCard;
    adiv.appendChild(devBtn);

    const playable = playableDevs(p);
    if (playable.length > 0) {
      const h = document.createElement('h3'); h.textContent = '発展カードを使う';
      adiv.appendChild(h);
      playable.forEach((c, idx) => {
        const b = document.createElement('button');
        b.textContent = `▶ ${DEV_NAMES[c.type]}を発動`;
        b.disabled = state.devCardPlayedThisTurn;
        b.onclick = () => playDevCard(idx);
        adiv.appendChild(b);
      });
      if (state.devCardPlayedThisTurn) {
        const note = document.createElement('div');
        note.style.fontSize = '10px'; note.style.color = '#a0aec0'; note.style.padding = '2px';
        note.textContent = '※ 発展カードは1ターン1枚まで';
        adiv.appendChild(note);
      }
    }

    const det = document.createElement('details');
    det.innerHTML = '<summary>銀行と取引（港対応）</summary>';
    const grid = document.createElement('div');
    grid.className = 'trade-grid';
    let any = false;
    for (const give of RESOURCES) {
      const ratio = getTradeRatio(p, give);
      if (p.resources[give] < ratio) continue;
      for (const get of RESOURCES) {
        if (give === get) continue;
        any = true;
        const b = document.createElement('button');
        b.textContent = `${RESOURCE_EMOJI[give]}×${ratio} → ${RESOURCE_EMOJI[get]}`;
        b.onclick = () => bankTrade(give, get);
        grid.appendChild(b);
      }
    }
    if (!any) {
      const span = document.createElement('div');
      span.style.fontSize = '11px'; span.style.color = '#a0aec0'; span.style.padding = '4px';
      span.textContent = '取引可能な資源がありません';
      det.appendChild(span);
    } else {
      det.appendChild(grid);
    }
    adiv.appendChild(det);

    const trBtn = document.createElement('button');
    trBtn.textContent = '🤝 プレイヤーに交渉';
    trBtn.onclick = openTradeCompose;
    adiv.appendChild(trBtn);
  }

  if (state.buildMode && !state.pendingFreeRoads) {
    const cb = document.createElement('button');
    cb.textContent = '選択キャンセル'; cb.className = 'cancel';
    cb.onclick = cancelBuild;
    adiv.appendChild(cb);
  }
  if (!state.pendingFreeRoads && !state.pendingPlenty && !state.pendingMonopoly) {
    const eb = document.createElement('button');
    eb.textContent = 'ターン終了';
    eb.className = 'end';
    eb.onclick = endTurn;
    adiv.appendChild(eb);
  }
}

// Mouse-wheel zoom over the board (in addition to the slider / ± buttons)
(function(){
  const boardEl = document.getElementById('board');
  if (boardEl) boardEl.addEventListener('wheel', function(e){
    if (!state) return;
    e.preventDefault();
    const dir = e.deltaY < 0 ? 1 : -1;
    setZoom((state.zoom || 1) + dir * 0.12);
  }, { passive: false });
})();
showStartScreen();
