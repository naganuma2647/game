<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ブロックス</title>
<style>
:root{--bg:#0e0e18;--surf:#1a1a28;--gold:#c9a030;--gold2:#f0d060;--txt:#e8e8f0;--dim:#555;
  --p1:#e0473a;--p2:#3e87d6;--p3:#4ec05e;--p4:#e0c34a;--cs:25px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--txt);font-family:'Segoe UI','Hiragino Sans',sans-serif;min-height:100vh;padding:48px 8px 32px;display:flex;flex-direction:column;align-items:center}
.back{position:fixed;top:12px;left:12px;z-index:999;background:rgba(0,0,0,.55);color:#fff;text-decoration:none;font:600 13px/1 'Segoe UI',sans-serif;padding:8px 13px;border-radius:999px;border:1px solid rgba(255,255,255,.25)}
#setup{width:100%;max-width:360px;background:var(--surf);border-radius:16px;padding:24px 20px;margin-top:12px}
#setup h1{font-size:22px;text-align:center;color:var(--gold);margin-bottom:4px}
.subtitle{font-size:11px;color:var(--dim);text-align:center;margin-bottom:18px}
.form-row{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.form-row label{font-size:11px;color:var(--gold2)}
.form-row select{background:#141420;border:1px solid #333;color:var(--txt);padding:7px 10px;border-radius:8px;font-size:13px;font-family:inherit}
.start-btn{width:100%;padding:11px;background:var(--gold);color:#111;border:none;border-radius:10px;font:700 15px 'Segoe UI',sans-serif;cursor:pointer;margin-top:6px}
.start-btn:hover{background:var(--gold2)}
.rules-box{margin-top:14px;padding:11px;background:rgba(255,255,255,.04);border-radius:8px;font-size:11px;color:var(--dim);line-height:1.7}
.rules-box b{color:var(--txt)}
#game{display:none;width:100%;flex-direction:column;gap:8px;align-items:center}
.hdr{display:flex;justify-content:space-between;align-items:center;gap:8px;width:100%;max-width:860px;flex-wrap:wrap}
#status{font-size:13px;padding:6px 14px;border-radius:8px;background:var(--surf);flex:1;min-width:160px}
.srow{display:flex;gap:5px;flex-wrap:wrap}
.schip{font-size:11px;padding:4px 9px;border-radius:6px;font-weight:700;opacity:.55;border:1px solid}
.schip.cur{opacity:1;box-shadow:0 0 6px currentColor}
.schip.out{opacity:.25;text-decoration:line-through}
.play{display:flex;gap:10px;align-items:flex-start;max-width:860px;width:100%}
#board{display:grid;grid-template-columns:repeat(20,var(--cs));flex-shrink:0;border:2px solid #252535;background:#111118;cursor:crosshair}
.cell{width:var(--cs);height:var(--cs);border:0.5px solid rgba(255,255,255,.06)}
.cell.p1{background:var(--p1)}.cell.p2{background:var(--p2)}.cell.p3{background:var(--p3)}.cell.p4{background:var(--p4)}
.cell.pv-ok{background:var(--pcol,#888);opacity:.5}.cell.pv-ng{background:#ff3333;opacity:.45}
.sb{flex:1;min-width:155px;display:flex;flex-direction:column;gap:7px}
.ctrls{display:flex;gap:5px}
.cbtn{flex:1;padding:7px 4px;background:var(--surf);border:1px solid #333;color:var(--txt);border-radius:8px;cursor:pointer;font-size:12px;font-family:inherit;white-space:nowrap}
.cbtn:hover{border-color:var(--gold)}
.sprev{background:var(--surf);border-radius:10px;padding:8px;min-height:64px;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--dim)}
.pgrid{display:flex;flex-wrap:wrap;gap:4px;background:var(--surf);border-radius:10px;padding:8px;max-height:440px;overflow-y:auto}
.pbtn{background:#141420;border:2px solid #252535;border-radius:6px;padding:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;min-width:34px;min-height:34px}
.pbtn:hover:not(.used){border-color:var(--gold)}.pbtn.sel{border-color:var(--gold2);background:#1e1e2c}.pbtn.used{opacity:.18;cursor:default}
.pmini{display:grid;gap:1px}
#end{display:none;width:100%;max-width:400px;background:var(--surf);border-radius:16px;padding:24px;text-align:center;margin-top:12px}
#end h2{color:var(--gold);margin-bottom:16px;font-size:20px}
.rrow{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #1e1e2c;font-size:14px}
.rbtn{margin-top:16px;padding:10px 24px;background:var(--gold);color:#111;border:none;border-radius:10px;font:700 14px 'Segoe UI',sans-serif;cursor:pointer}
@media(max-width:580px){
  :root{--cs:17px}
  .play{flex-direction:column}
  .sb{min-width:unset;width:100%}
  .pgrid{max-height:160px;flex-direction:row}
}
</style>
</head>
<body>
<a href="../index.html" class="back">← 一覧に戻る</a>

<div id="setup">
  <h1>ブロックス</h1>
  <p class="subtitle">角タッチでテリトリーを広げる戦略ゲーム</p>
  <div class="form-row">
    <label>人間プレイヤー数</label>
    <select id="sel-h">
      <option value="1">1人（CPU×3）</option>
      <option value="2" selected>2人（CPU×2）</option>
      <option value="3">3人（CPU×1）</option>
      <option value="4">4人（全員人間）</option>
    </select>
  </div>
  <div class="form-row">
    <label>CPU の強さ</label>
    <select id="sel-d">
      <option value="easy">弱</option>
      <option value="normal" selected>普通</option>
      <option value="hard">強</option>
    </select>
  </div>
  <button class="start-btn" onclick="init()">ゲーム開始</button>
  <div class="rules-box">
    <b>ルール：</b>4人が20×20ボードに交互にタイルを置く。<br>
    ・最初の1枚は自分のコーナーに置く<br>
    ・以降は<b>自分の色と角（斜め）でつながるように</b>置く<br>
    ・自分の色と辺（上下左右）で接触するのはNG<br>
    ・置けなくなったらパス。全員パスでゲーム終了<br>
    ・<b>残りマス数が少ない人の勝ち</b>
  </div>
</div>

<div id="game">
  <div class="hdr">
    <div id="status">-</div>
    <div class="srow" id="srow"></div>
  </div>
  <div class="play">
    <div id="board"></div>
    <div class="sb">
      <div class="ctrls">
        <button class="cbtn" id="btn-rot" onclick="rotate()">↻ 回転 [R]</button>
        <button class="cbtn" id="btn-flip" onclick="doFlip()">⇄ 反転 [F]</button>
      </div>
      <div class="sprev" id="sprev">タイルを選択</div>
      <div class="pgrid" id="pgrid"></div>
    </div>
  </div>
</div>

<div id="end">
  <h2>ゲーム終了</h2>
  <div id="rlist"></div>
  <button class="rbtn" onclick="location.reload()">もう一度</button>
</div>

<script>
// ===== PIECE DEFINITIONS =====
const BP=[
  {id:'1', c:[[0,0]]},
  {id:'2', c:[[0,0],[0,1]]},
  {id:'3i',c:[[0,0],[0,1],[0,2]]},
  {id:'3l',c:[[0,0],[1,0],[1,1]]},
  {id:'4o',c:[[0,0],[0,1],[1,0],[1,1]]},
  {id:'4i',c:[[0,0],[0,1],[0,2],[0,3]]},
  {id:'4t',c:[[0,0],[0,1],[0,2],[1,1]]},
  {id:'4l',c:[[0,0],[1,0],[2,0],[2,1]]},
  {id:'4s',c:[[0,0],[0,1],[1,1],[1,2]]},
  {id:'5f',c:[[0,1],[0,2],[1,0],[1,1],[2,1]]},
  {id:'5i',c:[[0,0],[0,1],[0,2],[0,3],[0,4]]},
  {id:'5l',c:[[0,0],[1,0],[2,0],[3,0],[3,1]]},
  {id:'5n',c:[[0,0],[1,0],[1,1],[2,1],[3,1]]},
  {id:'5p',c:[[0,0],[0,1],[1,0],[1,1],[2,0]]},
  {id:'5t',c:[[0,0],[0,1],[0,2],[1,1],[2,1]]},
  {id:'5u',c:[[0,0],[0,2],[1,0],[1,1],[1,2]]},
  {id:'5v',c:[[0,0],[1,0],[2,0],[2,1],[2,2]]},
  {id:'5w',c:[[0,0],[1,0],[1,1],[2,1],[2,2]]},
  {id:'5x',c:[[0,1],[1,0],[1,1],[1,2],[2,1]]},
  {id:'5y',c:[[0,1],[1,0],[1,1],[2,1],[3,1]]},
  {id:'5z',c:[[0,0],[0,1],[1,1],[2,1],[2,2]]},
];

function norm(cs){
  const mr=Math.min(...cs.map(c=>c[0])),mc=Math.min(...cs.map(c=>c[1]));
  return cs.map(([r,c])=>[r-mr,c-mc]).sort((a,b)=>a[0]-b[0]||a[1]-b[1]);
}
function rot90(cs){return norm(cs.map(([r,c])=>[c,-r]));}
function flipH(cs){return norm(cs.map(([r,c])=>[r,-c]));}
function ckey(cs){return cs.map(([r,c])=>r+','+c).join('|');}
function getOrients(cs){
  const seen=new Set(),res=[];
  let cur=norm(cs);
  for(let f=0;f<2;f++){
    for(let r=0;r<4;r++){
      const k=ckey(cur);
      if(!seen.has(k)){seen.add(k);res.push(cur.map(x=>[...x]));}
      cur=rot90(cur);
    }
    cur=flipH(cur);
  }
  return res;
}
const PIECES=BP.map(p=>({...p,os:getOrients(p.c)}));

// ===== CONSTANTS =====
const PCOL=['','#e0473a','#3e87d6','#4ec05e','#e0c34a'];
const PNAME=['','赤','青','緑','黄'];
const CORNERS=[[0,0],[0,19],[19,19],[19,0]];
const N=20;
const DIRS=[[-1,0],[1,0],[0,-1],[0,1]];
const DIAGS=[[-1,-1],[-1,1],[1,-1],[1,1]];

// ===== STATE =====
let G={};
let HR=-1,HC=-1;
let ONLINE=false, MYSEAT=-1, roomSend=null;

function init(){
  const nh=+document.getElementById('sel-h').value;
  const diff=document.getElementById('sel-d').value;
  G={
    board:Array.from({length:N},()=>Array(N).fill(0)),
    nh,diff,numP:4,cur:0,
    pcs:Array.from({length:4},()=>PIECES.map(p=>({...p,used:false}))),
    sp:null,so:0,
    first:[true,true,true,true],
    out:[false,false,false,false],
    done:false,
  };
  document.getElementById('setup').style.display='none';
  document.getElementById('game').style.display='flex';
  buildBoard();renderScores();turn();
}

function isHuman(){return G.cur<G.nh;}
function isMyTurn(){ return ONLINE ? G.cur===MYSEAT : G.cur<G.nh; }

function buildBoard(){
  const el=document.getElementById('board');
  el.innerHTML='';
  for(let r=0;r<N;r++) for(let c=0;c<N;c++){
    const d=document.createElement('div');
    d.className='cell';
    d.dataset.r=r;d.dataset.c=c;
    d.addEventListener('mouseenter',()=>{HR=r;HC=c;if(isHuman())renderBoard();});
    d.addEventListener('mouseleave',()=>{HR=-1;HC=-1;if(isHuman())renderBoard();});
    d.addEventListener('click',()=>tryPlace(r,c));
    el.appendChild(d);
  }
}

function renderBoard(){
  const cells=document.querySelectorAll('#board .cell');
  cells.forEach((el,i)=>{
    const r=Math.floor(i/N),c=i%N;
    el.className='cell';
    const p=G.board[r][c];
    if(p)el.classList.add('p'+p);
  });
  if(HR>=0&&G.sp!==null&&isHuman()){
    const shape=curShape();
    const placed=placeAt(shape,HR,HC);
    const ok=isValid(placed,G.cur);
    document.documentElement.style.setProperty('--pcol',PCOL[G.cur+1]);
    placed.forEach(([r,c])=>{
      if(r<0||r>=N||c<0||c>=N)return;
      const idx=r*N+c;
      if(!G.board[r][c]) cells[idx].classList.add(ok?'pv-ok':'pv-ng');
    });
  }
}

function curShape(){
  const p=G.pcs[G.cur][G.sp];
  return p.os[G.so%p.os.length];
}

function placeAt(shape,ar,ac){
  const rArr=shape.map(([r])=>r),cArr=shape.map(([,c])=>c);
  const or=ar-Math.round((Math.max(...rArr))/2);
  const oc=ac-Math.round((Math.max(...cArr))/2);
  return shape.map(([r,c])=>[r+or,c+oc]);
}

function isValid(cells,pi){
  const p=pi+1;
  const set=new Set(cells.map(([r,c])=>r+','+c));
  for(const [r,c] of cells){
    if(r<0||r>=N||c<0||c>=N||G.board[r][c])return false;
    for(const [dr,dc] of DIRS){
      const nr=r+dr,nc=c+dc;
      if(set.has(nr+','+nc))continue;
      if(nr>=0&&nr<N&&nc>=0&&nc<N&&G.board[nr][nc]===p)return false;
    }
  }
  if(G.first[pi]){
    const [cr,cc]=CORNERS[pi];
    return cells.some(([r,c])=>r===cr&&c===cc);
  }
  for(const [r,c] of cells){
    for(const [dr,dc] of DIAGS){
      const nr=r+dr,nc=c+dc;
      if(set.has(nr+','+nc))continue;
      if(nr>=0&&nr<N&&nc>=0&&nc<N&&G.board[nr][nc]===p)return true;
    }
  }
  return false;
}

function hasMove(pi){
  for(const pc of G.pcs[pi]){
    if(pc.used)continue;
    for(const o of pc.os){
      for(let r=0;r<N;r++) for(let c=0;c<N;c++){
        if(isValid(placeAt(o,r,c),pi))return true;
      }
    }
  }
  return false;
}

function allMoves(pi){
  const res=[];
  G.pcs[pi].forEach((pc,pidx)=>{
    if(pc.used)return;
    pc.os.forEach((o,oidx)=>{
      for(let r=0;r<N;r++) for(let c=0;c<N;c++){
        const placed=placeAt(o,r,c);
        if(isValid(placed,pi))res.push({pidx,oidx,placed,sz:o.length});
      }
    });
  });
  return res;
}

function turn(){
  if(G.done)return;
  const pi=G.cur;
  const col=PCOL[pi+1],name=PNAME[pi+1];
  const st=document.getElementById('status');

  if(!hasMove(pi)){
    G.out[pi]=true;
    st.innerHTML=`<span style="color:${col}">${name}</span> はパス`;
    renderScores();
    if(G.out.every(Boolean)){setTimeout(endGame,700);return;}
    if(!advance()){setTimeout(endGame,700);return;}
    setTimeout(turn,700);
    return;
  }

  if(isMyTurn()){
    st.innerHTML=`<span style="color:${col};font-weight:700">${name}の番</span> — タイルを選んで盤に置く`;
    renderPieces();renderBoard();
  } else if(!ONLINE || (OnlineRoom.isHost()&&OnlineRoom.isAuto(pi))){
    st.innerHTML=`<span style="color:${col}">${name}</span> が考え中…`;
    G.sp=null;renderPieces();
    if(!ONLINE||OnlineRoom.isHost()) setTimeout(()=>cpuTurn(pi),600);
  } else {
    st.innerHTML=`<span style="color:${col}">${name}</span> の番…`;
    G.sp=null;renderPieces();renderBoard();
  }
}

function tryPlace(r,c){
  if(!isMyTurn()||G.sp===null||G.done)return;
  const cells=placeAt(curShape(),r,c);
  if(!isValid(cells,G.cur))return;
  if(ONLINE){ roomSend({t:'place',pidx:G.sp,cells}); return; }
  doPlace(cells,G.cur,G.sp);
  HR=-1;HC=-1;
  renderBoard();renderScores();
  if(!advance()){setTimeout(endGame,500);return;}
  setTimeout(turn,300);
}

function doPlace(cells,pi,pidx){
  cells.forEach(([r,c])=>{G.board[r][c]=pi+1;});
  G.pcs[pi][pidx].used=true;
  G.first[pi]=false;
  G.sp=null;G.so=0;
}

function advance(){
  let next=(G.cur+1)%G.numP,tried=0;
  while(G.out[next]&&tried<G.numP){next=(next+1)%G.numP;tried++;}
  if(tried>=G.numP)return false;
  G.cur=next;G.sp=null;G.so=0;
  return true;
}

function cpuTurn(pi){
  if(ONLINE&&(!OnlineRoom.isHost()||!OnlineRoom.isAuto(pi)))return;
  const moves=allMoves(pi);
  if(!moves.length){
    if(ONLINE){ roomSend({t:'pass'}); return; }
    G.out[pi]=true;renderScores();
    if(G.out.every(Boolean)){setTimeout(endGame,500);return;}
    if(!advance()){setTimeout(endGame,500);return;}
    setTimeout(turn,300);return;
  }
  let m;
  const diff=ONLINE?'normal':G.diff;
  if(diff==='easy'){m=moves[Math.random()*moves.length|0];}
  else if(diff==='normal'){const mx=Math.max(...moves.map(x=>x.sz));const big=moves.filter(x=>x.sz>=mx-1);m=big[Math.random()*big.length|0];}
  else{const sc=moves.map(x=>{const d=x.placed.reduce((s,[r,c])=>s+Math.abs(r-9.5)+Math.abs(c-9.5),0)/x.placed.length;return{...x,score:x.sz*12-d*0.5};}).sort((a,b)=>b.score-a.score);const top=sc.slice(0,Math.max(1,sc.length/10|0));m=top[Math.random()*top.length|0];}
  if(ONLINE){ roomSend({t:'place',pidx:m.pidx,cells:m.placed}); return; }
  doPlace(m.placed,pi,m.pidx);
  renderBoard();renderScores();
  if(!advance()){setTimeout(endGame,500);return;}
  setTimeout(turn,350);
}

function rotate(){
  if(G.sp===null)return;
  const p=G.pcs[G.cur][G.sp];
  G.so=(G.so+1)%p.os.length;
  renderSelPreview();renderBoard();
}
function doFlip(){
  if(G.sp===null)return;
  const p=G.pcs[G.cur][G.sp];
  const half=Math.floor(p.os.length/2)||1;
  G.so=(G.so+half)%p.os.length;
  renderSelPreview();renderBoard();
}

function renderPieces(){
  const grid=document.getElementById('pgrid');
  grid.innerHTML='';
  const sp=document.getElementById('sprev');
  if(!isHuman()){sp.textContent='CPU の番';return;}
  sp.textContent='タイルを選択';
  G.pcs[G.cur].forEach((pc,i)=>{
    const btn=document.createElement('button');
    btn.className='pbtn'+(pc.used?' used':'')+(G.sp===i?' sel':'');
    const cs=pc.c.length<=1?13:pc.c.length<=2?12:pc.c.length<=4?10:9;
    const mr=Math.max(...pc.c.map(([r])=>r));
    const mc=Math.max(...pc.c.map(([,c])=>c));
    const mini=document.createElement('div');
    mini.className='pmini';
    mini.style.cssText=`grid-template-columns:repeat(${mc+1},${cs}px);grid-template-rows:repeat(${mr+1},${cs}px)`;
    const set=new Set(pc.c.map(([r,c])=>r+','+c));
    for(let r=0;r<=mr;r++) for(let c=0;c<=mc;c++){
      const cell=document.createElement('div');
      cell.style.cssText=`width:${cs}px;height:${cs}px;border-radius:1px;background:${set.has(r+','+c)?PCOL[G.cur+1]:'transparent'}`;
      mini.appendChild(cell);
    }
    btn.appendChild(mini);
    btn.onclick=()=>{
      if(pc.used)return;
      G.sp=i;G.so=0;
      renderPieces();renderSelPreview();renderBoard();
    };
    grid.appendChild(btn);
  });
  if(G.sp!==null)renderSelPreview();
}

function renderSelPreview(){
  if(G.sp===null)return;
  const p=G.pcs[G.cur][G.sp];
  const shape=p.os[G.so%p.os.length];
  const mr=Math.max(...shape.map(([r])=>r));
  const mc=Math.max(...shape.map(([,c])=>c));
  const cs=18;
  const wrap=document.createElement('div');
  wrap.style.cssText=`display:grid;grid-template-columns:repeat(${mc+1},${cs}px);grid-template-rows:repeat(${mr+1},${cs}px);gap:2px`;
  const set=new Set(shape.map(([r,c])=>r+','+c));
  for(let r=0;r<=mr;r++) for(let c=0;c<=mc;c++){
    const cell=document.createElement('div');
    cell.style.cssText=`width:${cs}px;height:${cs}px;border-radius:2px;background:${set.has(r+','+c)?PCOL[G.cur+1]:'rgba(255,255,255,.05)'}`;
    wrap.appendChild(cell);
  }
  const el=document.getElementById('sprev');
  el.innerHTML='';el.appendChild(wrap);
}

function renderScores(){
  const row=document.getElementById('srow');
  row.innerHTML='';
  G.pcs.forEach((pcs,pi)=>{
    const rem=pcs.filter(p=>!p.used).reduce((s,p)=>s+p.c.length,0);
    const ch=document.createElement('div');
    ch.className='schip'+(pi===G.cur?' cur':'')+(G.out[pi]?' out':'');
    ch.style.cssText=`color:${PCOL[pi+1]};border-color:${PCOL[pi+1]}`;
    ch.textContent=`${PNAME[pi+1]} ${rem}`;
    row.appendChild(ch);
  });
}

function endGame(){
  G.done=true;
  document.getElementById('game').style.display='none';
  document.getElementById('end').style.display='block';
  const scores=G.pcs.map((pcs,pi)=>({
    pi,score:pcs.filter(p=>!p.used).reduce((s,p)=>s+p.c.length,0)
  })).sort((a,b)=>a.score-b.score);
  const medals=['🥇','🥈','🥉',''];
  document.getElementById('rlist').innerHTML=scores.map((s,i)=>`
    <div class="rrow">
      <span>${medals[i]||''} <span style="color:${PCOL[s.pi+1]}">${PNAME[s.pi+1]}</span>${s.pi<G.nh?' (あなた)':' (CPU)'}</span>
      <span>${s.score === 0 ? '全部置けた！' : s.score+'マス残り'}</span>
    </div>`).join('');
}

document.addEventListener('keydown',e=>{
  if(!G.cur&&G.cur!==0)return;
  if(e.key==='r'||e.key==='R')rotate();
  if(e.key==='f'||e.key==='F')doFlip();
});

// ===== ONLINE =====
function startOnline(seat,n,send){
  ONLINE=true;MYSEAT=seat;roomSend=send;
  document.getElementById('setup').style.display='none';
  document.getElementById('game').style.display='flex';
  G={
    board:Array.from({length:N},()=>Array(N).fill(0)),
    nh:0,diff:'normal',numP:n,cur:0,
    pcs:Array.from({length:n},()=>PIECES.map(p=>({...p,used:false}))),
    sp:null,so:0,
    first:Array(n).fill(true),
    out:Array(n).fill(false),
    done:false,
  };
  buildBoard();renderScores();turn();
}

function getState(){
  return{board:G.board.map(r=>[...r]),pcs:G.pcs.map(pp=>pp.map(p=>({...p,os:undefined}))),cur:G.cur,first:[...G.first],out:[...G.out],numP:G.numP};
}
function applyState(o){
  ONLINE=true;MYSEAT=o.seat;roomSend=o.send;
  document.getElementById('setup').style.display='none';
  document.getElementById('game').style.display='flex';
  const s=o.state;
  G={board:s.board,numP:s.numP,nh:0,diff:'normal',cur:s.cur,
    pcs:Array.from({length:s.numP},(_,i)=>PIECES.map((p,j)=>({...p,used:s.pcs[i][j].used}))),
    sp:null,so:0,first:s.first,out:s.out,done:false};
  buildBoard();renderBoard();renderScores();turn();
}

</script>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script src="../shared/lobby.js?v=7"></script>
<script src="../shared/online-room.js?v=7"></script>
<script>
OnlineRoom.init({
  gameId:'blokus',minPlayers:2,maxPlayers:4,
  note:'20×20ボードにタイルを置くテリトリーゲーム',
  onStart:(seat,n,send)=>startOnline(seat,n,send),
  onMessage:(from,msg)=>{
    if(msg.t==='place'){
      doPlace(msg.cells,from,msg.pidx);
      HR=-1;HC=-1;
      renderBoard();renderScores();
      if(!advance()){setTimeout(endGame,500);return;}
      setTimeout(turn,350);
    } else if(msg.t==='pass'){
      G.out[from]=true;renderScores();
      if(G.out.every(Boolean)){setTimeout(endGame,700);return;}
      if(!advance()){setTimeout(endGame,700);return;}
      setTimeout(turn,700);
    }
  },
  onLeft:(seat)=>{if(ONLINE)turn();},
  getState,applyState
});
