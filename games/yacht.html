<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ヨット</title>
<style>
:root{--bg:#14110E;--panel:#1F1A14;--txt:#EDE6D6;--sub:#9A8F7B;--gold:#C9A227;--line:#352C20;--die:#F4EFE2;--pip:#222;--keep:#2E7D46;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--txt);font-family:"Hiragino Sans","Yu Gothic UI",sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:14px 10px 28px;user-select:none}
h1{font-family:"Hiragino Mincho ProN",serif;font-size:25px;letter-spacing:.18em;margin:2px 0}
.sub{font-size:10px;color:var(--sub);letter-spacing:.2em;margin-bottom:8px}
.dice{display:flex;gap:10px;justify-content:center;margin:8px 0}
.die{width:52px;height:52px;border-radius:10px;background:var(--die);position:relative;box-shadow:0 3px 7px rgba(0,0,0,.4);cursor:pointer;transition:transform .1s}
.die.keep{outline:3px solid var(--keep);outline-offset:1px}
.die.keep::after{content:"キープ";position:absolute;bottom:-15px;left:0;right:0;text-align:center;font-size:9px;color:var(--keep);font-weight:700}
.die.roll{animation:sh .35s ease}
@keyframes sh{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
.die .pip{position:absolute;width:9px;height:9px;border-radius:50%;background:var(--pip);transform:translate(-50%,-50%)}
.rollbar{display:flex;gap:12px;align-items:center;margin:18px 0 8px}
.rollbar button{background:var(--gold);border:none;color:#14110E;font-weight:700;padding:11px 26px;border-radius:9px;cursor:pointer;font-size:15px;font-family:inherit}
.rollbar button:disabled{opacity:.4}
.rollbar .left{font-size:12px;color:var(--sub)}
.hint{font-size:11px;color:var(--sub);margin-bottom:8px;text-align:center}
.sheet{width:min(94vw,400px);border:1px solid var(--line);border-radius:10px;overflow:hidden;background:var(--panel)}
.srow{display:flex;align-items:center;justify-content:space-between;padding:9px 13px;border-bottom:1px solid var(--line);font-size:14px}
.srow:last-child{border-bottom:none}
.srow.head{background:rgba(255,255,255,.04);font-size:11px;color:var(--sub);letter-spacing:.1em;padding:6px 13px}
.srow .nm{flex:1}
.srow .pt{width:54px;text-align:right;font-variant-numeric:tabular-nums;font-weight:700}
.srow.open{cursor:pointer}
.srow.open:hover{background:rgba(201,162,39,.12)}
.srow.open .pt{color:var(--gold)}
.srow.used{opacity:.55}.srow.used .pt{color:var(--txt)}
.srow.total{background:rgba(201,162,39,.1);font-weight:700}
.srow.total .pt{color:var(--gold);font-size:16px}
.bonus{font-size:11px;color:var(--sub)}
.over{position:fixed;inset:0;background:rgba(10,8,5,.85);display:none;align-items:center;justify-content:center;z-index:30}
.over.show{display:flex}
.over .c{background:#241c10;border:1px solid var(--gold);border-radius:10px;padding:26px 38px;text-align:center}
.over .t{font-size:24px;color:var(--gold);font-family:"Hiragino Mincho ProN",serif;margin-bottom:8px}
.over .s{font-size:15px;margin-bottom:16px}
.over button{background:var(--gold);border:none;color:#241c10;font-weight:700;padding:9px 22px;border-radius:7px;cursor:pointer;font-size:14px;font-family:inherit}
</style>
</head>
<body>
<a href="../index.html" style="position:fixed;top:10px;left:10px;z-index:99999;background:rgba(0,0,0,0.55);color:#fff;text-decoration:none;font:600 13px/1 'Segoe UI',sans-serif;padding:8px 13px;border-radius:999px;border:1px solid rgba(255,255,255,0.25)">← 一覧に戻る</a>
<h1>ヨット</h1><div class="sub">YACHT — サイコロ役作り</div>
<div style="display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:8px" id="np">
<span style="font-size:11px;color:var(--sub);align-self:center;margin-right:2px">人数:</span>
<button data-np="1" class="on" style="background:transparent;border:1px solid #3a3326;color:var(--sub);padding:5px 12px;border-radius:16px;font-size:12px;cursor:pointer;font-family:inherit">1人</button>
<button data-np="2" style="background:transparent;border:1px solid #3a3326;color:var(--sub);padding:5px 12px;border-radius:16px;font-size:12px;cursor:pointer;font-family:inherit">2人</button>
<button data-np="3" style="background:transparent;border:1px solid #3a3326;color:var(--sub);padding:5px 12px;border-radius:16px;font-size:12px;cursor:pointer;font-family:inherit">3人</button>
<button data-np="4" style="background:transparent;border:1px solid #3a3326;color:var(--sub);padding:5px 12px;border-radius:16px;font-size:12px;cursor:pointer;font-family:inherit">4人</button>
</div>
<div id="curp" style="font-size:13px;color:var(--gold);min-height:18px;margin-bottom:4px;display:none"></div>
<div class="dice" id="dice"></div>
<div class="rollbar"><button id="roll">サイコロを振る</button><span class="left" id="left">残り3回</span></div>
<div class="hint">振った後、残したいサイコロをタップで「キープ」。最大3回振って、下の表の空き枠をタップで記入。</div>
<div class="sheet" id="sheet"></div>
<div class="over" id="over"><div class="c"><div class="t">ゲーム終了！</div><div class="s" id="ov-s"></div><button id="again">もう一度</button></div></div>
<script>
const PIPS={1:[[50,50]],2:[[28,28],[72,72]],3:[[26,26],[50,50],[74,74]],4:[[28,28],[72,28],[28,72],[72,72]],5:[[28,28],[72,28],[50,50],[28,72],[72,72]],6:[[28,26],[72,26],[28,50],[72,50],[28,74],[72,74]]};
const CATS=[
  {id:'ones',name:'1の目',up:true,fn:d=>sum(d.filter(x=>x===1))},
  {id:'twos',name:'2の目',up:true,fn:d=>sum(d.filter(x=>x===2))},
  {id:'threes',name:'3の目',up:true,fn:d=>sum(d.filter(x=>x===3))},
  {id:'fours',name:'4の目',up:true,fn:d=>sum(d.filter(x=>x===4))},
  {id:'fives',name:'5の目',up:true,fn:d=>sum(d.filter(x=>x===5))},
  {id:'sixes',name:'6の目',up:true,fn:d=>sum(d.filter(x=>x===6))},
  {id:'three',name:'スリーカード',fn:d=>nKind(d,3)?sum(d):0},
  {id:'four',name:'フォーカード',fn:d=>nKind(d,4)?sum(d):0},
  {id:'full',name:'フルハウス',fn:d=>isFull(d)?25:0},
  {id:'sstr',name:'Sストレート',fn:d=>straight(d,4)?30:0},
  {id:'lstr',name:'Lストレート',fn:d=>straight(d,5)?40:0},
  {id:'yacht',name:'ヨット(5個同じ)',fn:d=>nKind(d,5)?50:0},
  {id:'chance',name:'チャンス',fn:d=>sum(d)}
];
const sum=a=>a.reduce((x,y)=>x+y,0);
function counts(d){const c={};d.forEach(v=>c[v]=(c[v]||0)+1);return c;}
function nKind(d,n){return Object.values(counts(d)).some(v=>v>=n);}
function isFull(d){const v=Object.values(counts(d)).sort();return v.length===2&&v[0]===2&&v[1]===3;}
function straight(d,len){const s=[...new Set(d)].sort((a,b)=>a-b);let run=1,best=1;for(let i=1;i<s.length;i++){if(s[i]===s[i-1]+1){run++;best=Math.max(best,run);}else run=1;}return best>=len;}
let dice,keep,rolls,allScores,turn,over,np=1,curPlayer;
let ONLINE=false,MYSEAT=0,roomSend=null;
const PCOL=['#e0473a','#3e87d6','#4ec05e','#e0c34a']; // P1赤 P2青 P3緑 P4黄
function myTurn(){return !ONLINE||curPlayer===MYSEAT;}
// online: route every input through the relay so all clients apply in one order
function emit(a){if(ONLINE){if(!myTurn()||over)return;roomSend(a);}else doAction(a);}
function doAction(a){if(a.k==='roll')_roll();else if(a.k==='keep')_toggleKeep(a.i);else if(a.k==='record')_record(a.id);else if(a.k==='autoturn')_autoturn();}
// 退出席の代理: 1回振って空き役へ記入し完走させる（ホストのみ送信）
function _autoturn(){if(rolls===0)_roll();const c=CATS.find(x=>scores()[x.id]===undefined);if(c)_record(c.id);}
function isAutoSeat(s){return ONLINE&&window.OnlineRoom&&((OnlineRoom.isCpu&&OnlineRoom.isCpu(s))||(OnlineRoom.isGone&&OnlineRoom.isGone(s)));}
function autoKick(){if(!ONLINE||!OnlineRoom.isHost()||over||np<=1)return;if(!isAutoSeat(curPlayer))return;
  setTimeout(()=>{if(ONLINE&&OnlineRoom.isHost()&&!over&&isAutoSeat(curPlayer))OnlineRoom.send({k:'autoturn'});},700);}
function init(){dice=[1,1,1,1,1];keep=[false,false,false,false,false];rolls=0;
  allScores=Array.from({length:np},()=>({}));turn=0;curPlayer=0;over=false;
  document.getElementById('over').classList.remove('show');
  document.getElementById('curp').style.display=np>1?'block':'none';
  updateCurP();renderDice();renderSheet();updateRollBtn();}
function scores(){return allScores[curPlayer];}
function updateCurP(){
  if(ONLINE&&window.OnlineRoom&&OnlineRoom.setTurn)OnlineRoom.setTurn(curPlayer===MYSEAT&&!over);
  if(np<=1)return;
  const me=ONLINE&&curPlayer===MYSEAT;
  const cp=document.getElementById('curp');
  cp.textContent=(me?'★ あなた（P'+(curPlayer+1)+'）':'プレイヤー '+(curPlayer+1))+' の番（'+turn+'/13問目）';
  cp.style.color=over?'var(--gold)':PCOL[curPlayer];cp.style.fontWeight='800';}
function renderDice(){const el=document.getElementById('dice');el.innerHTML='';dice.forEach((v,i)=>{
  const d=document.createElement('div');d.className='die'+(keep[i]?' keep':'');
  d.innerHTML=PIPS[v].map(([x,y])=>`<span class="pip" style="left:${x}%;top:${y}%"></span>`).join('');
  if(rolls>0&&myTurn())d.addEventListener('click',()=>emit({k:'keep',i}));
  el.appendChild(d);});}
function updateRollBtn(){document.getElementById('roll').disabled=rolls>=3||over||!myTurn();
  document.getElementById('left').textContent=over?'—':'残り'+(3-rolls)+'回';}
function _toggleKeep(i){if(rolls===0||over)return;keep[i]=!keep[i];renderDice();}
function _roll(){if(rolls>=3||over)return;rolls++;
  for(let i=0;i<5;i++)if(!keep[i])dice[i]=1+Math.floor(Math.random()*6);
  const el=document.getElementById('dice');renderDice();
  el.querySelectorAll('.die').forEach((d,i)=>{if(!keep[i])d.classList.add('roll');});
  updateRollBtn();renderSheet();}
function roll(){emit({k:'roll'});}
function upperSum(p){const sc=p!==undefined?allScores[p]:scores();return CATS.filter(c=>c.up&&sc[c.id]!==undefined).reduce((s,c)=>s+sc[c.id],0);}
function bonus(p){return upperSum(p)>=63?35:0;}
function grandTotal(p){const sc=p!==undefined?allScores[p]:scores();return CATS.reduce((s,c)=>s+(sc[c.id]||0),0)+bonus(p);}
function renderSheet(){const sh=document.getElementById('sheet');sh.innerHTML='';
  const head=(t)=>{const r=document.createElement('div');r.className='srow head';r.innerHTML=`<span class="nm">${t}</span><span class="pt"></span>`;sh.appendChild(r);};
  head('上段（合計63以上でボーナス+35）');
  for(const c of CATS.filter(c=>c.up))catRow(sh,c);
  // ボーナス行
  const br=document.createElement('div');br.className='srow';
  br.innerHTML=`<span class="nm bonus">上段ボーナス（${upperSum()}/63）</span><span class="pt">${bonus()}</span>`;sh.appendChild(br);
  head('下段');
  for(const c of CATS.filter(c=>!c.up))catRow(sh,c);
  const tr=document.createElement('div');tr.className='srow total';
  tr.innerHTML=`<span class="nm">合計</span><span class="pt">${grandTotal()}</span>`;sh.appendChild(tr);}
function catRow(sh,c){const r=document.createElement('div');
  const used=scores()[c.id]!==undefined;
  const preview=(!used&&rolls>0)?c.fn(dice):null;
  const canRec=!used&&rolls>0&&myTurn();
  r.className='srow'+(used?' used':(canRec?' open':''));
  r.innerHTML=`<span class="nm">${c.name}</span><span class="pt">${used?scores()[c.id]:(preview!==null?preview:'')}</span>`;
  if(canRec)r.addEventListener('click',()=>emit({k:'record',id:c.id}));
  sh.appendChild(r);}
function _record(id){const c=CATS.find(x=>x.id===id);if(!c||scores()[c.id]!==undefined||rolls===0||over)return;
  scores()[c.id]=c.fn(dice);
  keep=[false,false,false,false,false];rolls=0;
  if(np>1){
    curPlayer=(curPlayer+1)%np;
    if(curPlayer===0)turn++;
    if(turn>=13){finish();return;}
  } else {
    turn++;
    if(turn>=13){finish();return;}
  }
  updateCurP();renderDice();renderSheet();updateRollBtn();autoKick();}
function finish(){over=true;updateRollBtn();
  if(np===1){document.getElementById('ov-s').textContent='合計 '+grandTotal()+' 点'+(grandTotal()>=200?'（ハイスコア級！）':'');}
  else{const totals=allScores.map((_,p)=>grandTotal(p));const max=Math.max(...totals);const winners=totals.map((v,i)=>v===max?i+1:null).filter(x=>x);const r=winners.length>1?'引き分け（P'+winners.join(', P')+'）':'プレイヤー'+winners[0]+'の勝ち！';const det=totals.map((v,i)=>'P'+(i+1)+': '+v+'点').join(' / ');document.getElementById('ov-s').innerHTML=r+'<br><span style="font-size:13px">'+det+'</span>';}
  document.getElementById('over').classList.add('show');}
document.getElementById('roll').addEventListener('click',roll);
document.getElementById('again').addEventListener('click',()=>{if(ONLINE)return;init();});
document.getElementById('np').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;np=+b.dataset.np;document.querySelectorAll('#np button').forEach(x=>{x.classList.remove('on');x.style.borderColor='#3a3326';x.style.color='var(--sub)';});b.classList.add('on');b.style.borderColor='var(--gold)';b.style.color='var(--gold)';init();});
init();
function startOnline(seat,n,send){ONLINE=true;MYSEAT=seat;roomSend=send;np=n;
  document.getElementById('np').style.display='none';
  document.getElementById('again').style.display='none';
  init();}
// 再接続: 現在状態の書き出し/復元
function getState(){return {dice,keep,rolls,allScores,turn,curPlayer,over};}
function applyState(o){ONLINE=true;MYSEAT=o.seat;roomSend=o.send;np=o.n;
  document.getElementById('np').style.display='none';
  document.getElementById('again').style.display='none';
  const s=o.state;dice=s.dice;keep=s.keep;rolls=s.rolls;allScores=s.allScores;turn=s.turn;curPlayer=s.curPlayer;over=s.over;
  document.getElementById('curp').style.display=np>1?'block':'none';
  updateCurP();renderDice();renderSheet();updateRollBtn();
  if(over)finish();}
</script>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script src="../shared/lobby.js?v=5"></script>
<script src="../shared/online-room.js?v=8"></script>
<script>
OnlineRoom.init({gameId:'yacht',minPlayers:2,maxPlayers:4,note:'全員で同じ問題を解いてスコアを競います。',
  onStart:(seat,n,send)=>startOnline(seat,n,send),
  onMessage:(from,msg)=>doAction(msg),
  onLeft:(seat)=>autoKick(),
  getState,applyState});
</script>
</body>
</html>
