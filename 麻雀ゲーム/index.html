<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>麻雀</title>
<style>
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0; height: 100%;
  background: #0b3d2e;
  color: #f0f0f0;
  font-family: "Segoe UI", "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
  overflow: hidden;
}
#app { position: relative; width: 100vw; height: 100vh; }

#table {
  position: absolute; inset: 0;
  display: grid;
  grid-template-columns: 1fr 2.4fr 1fr;
  grid-template-rows: 1fr 2.6fr 1fr;
  grid-template-areas:
    ".    top   ."
    "left center right"
    ".    bottom .";
  padding: 8px;
  gap: 4px;
}
.seat-top { grid-area: top; }
.seat-left { grid-area: left; }
.seat-right { grid-area: right; }
.seat-bottom { grid-area: bottom; }
#board { grid-area: center; }

.seat { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 0; }
.seat-bottom { justify-content: flex-end; }
.seat-top { justify-content: flex-start; }

/* 中央卓：四つの河で中央情報を囲む */
#board {
  display: grid;
  grid-template-columns: auto auto auto;
  grid-template-rows: auto auto auto;
  grid-template-areas:
    ".     ptop   ."
    "pleft cinfo  pright"
    ".     pbot   .";
  place-items: center;
  place-content: center;
  gap: 2px;
}
.pond-top    { grid-area: ptop; }
.pond-bottom { grid-area: pbot; }
.pond-left   { grid-area: pleft; }
.pond-right  { grid-area: pright; }
#center      { grid-area: cinfo; }

/* 河：卓を囲み、捨てた人に牌が正面を向く。各自の左→右で6牌ごと、中央側から外へ伸びる */
.pond { display: flex; gap: 2px; }
/* 1行=6牌ぶんの固定サイズを確保し、1枚目から左端スロットに置く（牌が増えても既存牌は動かない） */
.prow { display: flex; gap: 1px; justify-content: flex-start; }
.pond-bottom .prow, .pond-top .prow { min-width: 149px; }   /* 24px×6 + 1px×5 */
.pond-left .prow,  .pond-right .prow { min-height: 185px; }  /* 30px×6 + 1px×5 */
/* 中央側の辺に寄せて、外側へ伸ばす */
.pond-bottom { align-self: start; }
.pond-top    { align-self: end; }
.pond-right  { justify-self: start; }
.pond-left   { justify-self: end; }
/* 自分(下) */
.pond-bottom { flex-direction: column; }
.pond-bottom .prow { flex-direction: row; }
/* 対面(上)：180°回転 */
.pond-top { flex-direction: column-reverse; }
.pond-top .prow { flex-direction: row-reverse; }
.pond-top .disc { transform: rotate(180deg); }
/* 右(下家)：その人の左→右は画面の下→上。牌頭は左を向く(反時計90°)。列は外(右)へ伸びる */
.pond-right { flex-direction: row; }
.pond-right .prow { flex-direction: column-reverse; }
.pond-right .disc { transform: rotate(-90deg); }
/* 左(上家)：その人の左→右は画面の上→下。牌頭は右を向く(時計90°)。列は外(左)へ伸びる */
.pond-left { flex-direction: row-reverse; }
.pond-left .prow { flex-direction: column; }
.pond-left .disc { transform: rotate(90deg); }

.pinfo {
  display: flex; gap: 10px; align-items: baseline;
  background: rgba(0,0,0,0.35); padding: 4px 12px; border-radius: 6px;
  font-size: 14px; margin: 4px;
}
.pname { font-weight: bold; }
.pscore { color: #ffd86b; font-variant-numeric: tabular-nums; }
.pwind { color: #9fe8c0; }

/* 牌グリフ（Unicode麻雀牌＝実際の牌に近い絵柄） */
.tile-glyph {
  font-size: 30px; line-height: 1;
  font-family: "Segoe UI Symbol", "Segoe UI Emoji", "Apple Color Emoji", sans-serif;
}
.tile-glyph.back { color: #1b6b4f; }
.tile-glyph.disc {
  font-size: 22px; width: 24px; height: 30px;
  display: inline-flex; align-items: center; justify-content: center;
}
.tile-glyph.aka { color: #e23b2e; }
.disc.riichi { background: #ffd86b; border-radius: 3px; }
.meld-t { font-size: 21px; }
#center-dora .tile-glyph { font-size: 24px; }
.result-tiles .tile-glyph { font-size: 30px; }
.dora-line .tile-glyph { font-size: 18px; vertical-align: middle; }

/* 副露（鳴き面子） */
.melds { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; margin: 2px; }
.meld { display: inline-flex; }
.seat-left .melds, .seat-right .melds { max-width: 90px; }

/* 手牌(裏) */
.hand-back { display: flex; gap: 0; flex-wrap: nowrap; justify-content: center; }
/* 上家・下家（左右）の手牌裏は縦一列で表示 */
.seat-left .hand-back, .seat-right .hand-back { max-width: none; flex-direction: column; flex-wrap: nowrap; align-items: center; }
.seat-left .hand-back .tile-glyph, .seat-right .hand-back .tile-glyph { font-size: 18px; line-height: .82; }

/* プレイヤー手牌（横一列） */
.hand { display: flex; gap: 3px; flex-wrap: nowrap; justify-content: center; padding: 6px; }
#seat-0.conceal #player-hand { visibility: hidden; }
.tile-btn {
  font-size: 34px; line-height: 1; flex: 0 0 auto;
  font-family: "Segoe UI Symbol", "Segoe UI Emoji", "Apple Color Emoji", sans-serif;
  background: #fbf7ec; color: #111; border: 1px solid #b8b29c;
  border-radius: 6px; padding: 2px 4px 6px; cursor: pointer; transition: transform .08s;
}
.tile-btn.aka { color: #e23b2e; background: #fff0ee; border-color: #e23b2e; }
.tile-btn:hover:not(.disabled) { transform: translateY(-8px); background: #fffdf6; }
.tile-btn.drawn { margin-left: 18px; }
.tile-btn.disabled { opacity: .5; cursor: default; }
.tile-btn.riichi-cand { outline: 3px solid #ff5d5d; }

/* 中央情報（卓の中心） */
#center {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 6px; background: rgba(0,0,0,0.28); border-radius: 10px;
  padding: 10px 16px; min-width: 150px;
}
#center-round { font-size: 19px; font-weight: bold; }
#center-wall { font-size: 12px; color: #cfe9dc; }
#center-dora {
  display: flex; align-items: center; gap: 8px;
}
#center-dora .label { font-size: 12px; color: #cfe9dc; }

/* アクションバー */
#action-bar {
  position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 10px; z-index: 40; justify-content: center;
  pointer-events: none; /* 中身のボタンだけ操作可（空のときは下を邪魔しない） */
}
#action-bar .action { pointer-events: auto; box-shadow: 0 4px 14px rgba(0,0,0,.5); }
.action {
  font-size: 18px; font-weight: bold; padding: 12px 22px;
  border: none; border-radius: 8px; cursor: pointer;
  background: #2c6e54; color: #fff;
}
.action:hover { background: #357f62; }
.action.btn-win { background: #d14b3c; }
.action.btn-win:hover { background: #e2584a; }
.action.btn-riichi { background: #c79a2b; }
.action.btn-riichi:hover { background: #d8aa39; }

/* 対局ログ（左上・折りたたみ） */
#log-panel { position: absolute; top: 8px; left: 8px; z-index: 25; }
#log-toggle {
  font-size: 13px; padding: 6px 12px; border: 1px solid #2c6e54;
  background: rgba(0,0,0,0.45); color: #cfe9dc; border-radius: 6px; cursor: pointer;
}
#log-toggle:hover { background: rgba(0,0,0,0.65); }
#log-content {
  margin-top: 4px; width: 260px; max-height: 60vh; overflow-y: auto;
  background: rgba(0,0,0,0.8); border: 1px solid #2c6e54; border-radius: 8px;
  padding: 8px 10px; font-size: 12px; line-height: 1.5;
}
.log-hand { margin-bottom: 8px; }
.log-hand-title { font-weight: bold; color: #ffd86b; border-bottom: 1px solid #2c6e54; margin-bottom: 2px; }
.log-line { color: #e0eee6; }
.log-line.win { color: #ffce6b; }

/* メッセージ */
#message {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  background: rgba(0,0,0,0.8); padding: 16px 30px; border-radius: 10px;
  font-size: 22px; z-index: 30; pointer-events: none;
}
.hidden { display: none !important; }

/* 結果 */
#result, #start-screen {
  position: absolute; inset: 0; background: rgba(0,0,0,0.7);
  display: flex; align-items: center; justify-content: center; z-index: 40;
}
.result-box, .start-box {
  background: #14241d; border: 1px solid #2c6e54; border-radius: 12px;
  padding: 26px 34px; min-width: 360px; max-width: 90vw; text-align: center;
}
.result-box h2 { margin: 0 0 14px; }
.result-tiles { display: flex; flex-wrap: wrap; justify-content: center; gap: 2px; margin-bottom: 8px; }
.dora-line { font-size: 13px; color: #cfe9dc; margin: 6px 0 12px; }
.yaku-row, .rank-row, .ten-row {
  display: flex; justify-content: space-between; gap: 30px;
  padding: 3px 0; border-bottom: 1px dotted #2c6e54;
}
.ten-row { justify-content: center; }
#result-yaku { max-width: 380px; margin: 0 auto 14px; }
#result-score { font-size: 22px; font-weight: bold; color: #ffd86b; margin-bottom: 18px; }
#result-next {
  font-size: 18px; padding: 10px 30px; border: none; border-radius: 8px;
  background: #2c6e54; color: #fff; cursor: pointer;
}
#result-next:hover { background: #357f62; }

/* 手渡しオーバーレイ（人間の対面操作） */
#handover {
  position: absolute; inset: 0; background: rgba(0,0,0,0.92);
  display: flex; align-items: center; justify-content: center; z-index: 45;
}
.handover-box { text-align: center; max-width: 96vw; }
#handover-banner { font-size: 24px; font-weight: bold; margin-bottom: 18px; }
#handover-reveal {
  font-size: 20px; padding: 14px 36px; border: none; border-radius: 10px;
  background: #2c6e54; color: #fff; cursor: pointer;
}
#handover-reveal:hover { background: #357f62; }
#handover-hand {
  display: flex; gap: 4px; flex-wrap: nowrap; justify-content: center; margin: 10px 0;
}
#handover-actions { display: flex; gap: 12px; justify-content: center; margin-top: 14px; }

/* 開始画面の設定 */
.config {
  background: rgba(0,0,0,0.25); border-radius: 10px; padding: 12px 16px;
  margin: 14px 0; display: flex; flex-direction: column; gap: 10px;
}
.cfg-row { display: flex; align-items: center; justify-content: space-between; gap: 16px; }
.cfg-label { font-size: 15px; }
.seg { display: inline-flex; gap: 4px; }
.seg button {
  font-size: 14px; padding: 7px 14px; border: 1px solid #2c6e54;
  background: #14241d; color: #cfe9dc; border-radius: 6px; cursor: pointer;
}
.seg-lv button { padding: 7px 12px; min-width: 34px; font-weight: bold; }
.seg button.active { background: #2c6e54; color: #fff; border-color: #57a07f; }
.seg button:hover { background: #1d3a2e; }
.seg button.active:hover { background: #2c6e54; }

.start-box h1 { margin: 0 0 2px; color: #ffd86b; }
.start-box .subtitle {
  margin: 0 0 14px; color: #9fe8c0; font-size: 16px; font-weight: bold; letter-spacing: 2px;
}
#btn-start {
  font-size: 22px; padding: 14px 40px; margin: 16px 0;
  border: none; border-radius: 10px; background: #d14b3c; color: #fff; cursor: pointer;
}
#btn-start:hover { background: #e2584a; }
.rules-note { font-size: 13px; color: #cfe9dc; text-align: left; margin-top: 8px; }
.rules-note p { margin: 4px 0; }

/* ===== スマホ対応 (≤600px) ===== */
@media (max-width: 600px) {
  #table { padding: 2px; gap: 1px; grid-template-columns: minmax(0,0.55fr) minmax(0,2.4fr) minmax(0,0.55fr); grid-template-rows: minmax(0,0.7fr) minmax(0,2.6fr) minmax(0,1.1fr); }
  .seat-left, .seat-right { overflow: hidden; }
  .seat-left .hand-back, .seat-right .hand-back { flex-direction: column; flex-wrap: nowrap; max-width: 100%; }
  #board { gap: 1px; }
  .pinfo { font-size: 10px; padding: 2px 6px; gap: 5px; margin: 1px; border-radius: 4px; }
  .pond-bottom .prow, .pond-top .prow { min-width: 101px; }
  .pond-left .prow, .pond-right .prow { min-height: 125px; }
  .tile-glyph { font-size: 18px; }
  .tile-glyph.disc { font-size: 14px; width: 16px; height: 20px; }
  .tile-glyph.back { font-size: 16px; }
  .meld-t { font-size: 14px; }
  .hand { gap: 1px; padding: 2px; }
  .tile-btn { font-size: 22px; padding: 1px 2px 3px; border-radius: 4px; }
  .tile-btn.drawn { margin-left: 8px; }
  .seat-left .hand-back .tile-glyph, .seat-right .hand-back .tile-glyph { font-size: 12px; }
  .seat-left .melds, .seat-right .melds { max-width: 60px; }
  .melds { gap: 2px; margin: 1px; }
  #center { padding: 4px 6px; min-width: 80px; gap: 2px; border-radius: 6px; }
  #center-round { font-size: 13px; }
  #center-wall { font-size: 10px; }
  #center-dora .tile-glyph { font-size: 16px; }
  #center-dora .label { font-size: 10px; }
  #center-dora { gap: 4px; }
  #action-bar { bottom: 92px; gap: 5px; }
  .action { font-size: 13px; padding: 7px 11px; border-radius: 6px; }
  #log-toggle { font-size: 11px; padding: 4px 8px; }
  #log-content { width: min(80vw, 240px); font-size: 11px; max-height: 50vh; padding: 6px 8px; }
  #message { font-size: 16px; padding: 10px 18px; }
  .result-box, .start-box { min-width: 0; width: 96vw; padding: 16px 18px; }
  .result-box h2 { font-size: 18px; margin: 0 0 8px; }
  .result-tiles .tile-glyph { font-size: 22px; }
  .dora-line { font-size: 11px; }
  .dora-line .tile-glyph { font-size: 14px; }
  .yaku-row, .rank-row, .ten-row { gap: 12px; font-size: 13px; }
  #result-yaku { max-width: none; }
  #result-score { font-size: 18px; margin-bottom: 12px; }
  #result-next { font-size: 15px; padding: 8px 22px; }
  .start-box h1 { font-size: 22px; }
  .start-box .subtitle { font-size: 13px; margin: 0 0 10px; }
  .config { padding: 8px 10px; margin: 10px 0; gap: 7px; }
  .cfg-row { gap: 8px; }
  .cfg-label { font-size: 13px; }
  .seg button { font-size: 12px; padding: 5px 9px; }
  .seg-lv button { padding: 5px 8px; min-width: 28px; }
  #btn-start { font-size: 17px; padding: 10px 28px; margin: 10px 0; }
  .rules-note { font-size: 11px; }
  #handover-banner { font-size: 17px; margin-bottom: 12px; }
  #handover-reveal { font-size: 16px; padding: 10px 24px; }
  #handover-hand .tile-glyph { font-size: 18px; }
}

/* ===== さらに狭い画面 (≤380px) ===== */
@media (max-width: 380px) {
  .tile-btn { font-size: 19px; }
  .tile-glyph.disc { font-size: 12px; width: 14px; height: 18px; }
  .pond-bottom .prow, .pond-top .prow { min-width: 89px; }
  .pond-left .prow, .pond-right .prow { min-height: 113px; }
  .action { font-size: 12px; padding: 6px 9px; }
  .tile-glyph { font-size: 15px; }
  .meld-t { font-size: 12px; }
  .seat-left .hand-back .tile-glyph, .seat-right .hand-back .tile-glyph { font-size: 10px; }
}
@media (max-width: 600px) {
  #autowin-toggle { top: 48px !important; left: 12px !important; }
  #naki-toggle { top: 48px !important; left: 130px !important; }
}
</style>
</head>
<body>
<a href="../index.html" style="position:fixed;top:12px;left:12px;z-index:9999;background:rgba(0,0,0,0.55);color:#fff;text-decoration:none;font:600 14px/1 'Segoe UI',sans-serif;padding:9px 14px;border-radius:999px;border:1px solid rgba(255,255,255,0.25);">← 一覧に戻る</a>
<button id="autowin-toggle" style="position:fixed;top:12px;left:150px;z-index:9999;background:rgba(0,0,0,0.55);color:#fff;border:1px solid rgba(255,255,255,0.25);font:600 13px/1 'Segoe UI',sans-serif;padding:9px 12px;border-radius:999px;cursor:pointer">自動和了: OFF</button>
<button id="naki-toggle" style="position:fixed;top:12px;left:288px;z-index:9999;background:rgba(0,0,0,0.55);color:#fff;border:1px solid rgba(255,255,255,0.25);font:600 13px/1 'Segoe UI',sans-serif;padding:9px 12px;border-radius:999px;cursor:pointer">鳴き: ON</button>
<div id="app">
  <div id="table">
    <!-- 対面(CPU2) -->
    <div class="seat seat-top" id="seat-2">
      <div class="pinfo"><span class="pname"></span><span class="pscore"></span><span class="pwind"></span></div>
      <div class="hand-back"></div>
      <div class="melds" id="melds-2"></div>
    </div>
    <!-- 左(CPU3) -->
    <div class="seat seat-left" id="seat-3">
      <div class="pinfo"><span class="pname"></span><span class="pscore"></span><span class="pwind"></span></div>
      <div class="hand-back"></div>
      <div class="melds" id="melds-3"></div>
    </div>
    <!-- 右(CPU1) -->
    <div class="seat seat-right" id="seat-1">
      <div class="pinfo"><span class="pname"></span><span class="pscore"></span><span class="pwind"></span></div>
      <div class="hand-back"></div>
      <div class="melds" id="melds-1"></div>
    </div>

    <!-- 中央卓：四人の河が中央情報を囲む -->
    <div id="board">
      <div class="pond pond-top" id="pond-2"></div>
      <div class="pond pond-left" id="pond-3"></div>
      <div id="center">
        <div id="center-round"></div>
        <div id="center-wall"></div>
        <div id="center-dora">
          <span class="label">ドラ</span>
          <div id="dora-indicators"></div>
        </div>
      </div>
      <div class="pond pond-right" id="pond-1"></div>
      <div class="pond pond-bottom" id="pond-0"></div>
    </div>

    <!-- 自分(プレイヤー) -->
    <div class="seat seat-bottom" id="seat-0">
      <div class="pinfo"><span class="pname"></span><span class="pscore"></span><span class="pwind"></span></div>
      <div class="melds" id="melds-0"></div>
      <div class="hand" id="player-hand"></div>
    </div>
  </div>

  <div id="action-bar"></div>

  <div id="log-panel">
    <button id="log-toggle">対局ログ ▶</button>
    <div id="log-content" class="hidden"></div>
  </div>

  <div id="message" class="hidden"></div>

  <!-- 人間の対面プレイヤー操作用オーバーレイ -->
  <div id="handover" class="hidden">
    <div class="handover-box">
      <div id="handover-banner"></div>
      <button id="handover-reveal">手牌を見る</button>
      <div id="handover-hand"></div>
      <div id="handover-actions"></div>
    </div>
  </div>

  <div id="result" class="hidden">
    <div class="result-box">
      <h2 id="result-title"></h2>
      <div id="result-hand"></div>
      <div id="result-yaku"></div>
      <div id="result-score"></div>
      <button id="result-next">次へ</button>
    </div>
  </div>

  <div id="start-screen">
    <div class="start-box">
      <h1>麻雀</h1>
      <p class="subtitle">Mルール</p>

      <div class="config">
        <div class="cfg-row">
          <span class="cfg-label">局数</span>
          <span class="seg seg-length">
            <button class="length-opt" data-length="tonpuu">東風戦</button>
            <button class="length-opt active" data-length="hanchan">半荘戦</button>
          </span>
        </div>
        <div class="cfg-row">
          <span class="cfg-label">手前（自分）</span>
          <span class="seg" data-seat="0">
            <button class="seat-opt" data-seat="0" data-type="human">人間</button>
            <button class="seat-opt active" data-seat="0" data-type="cpu">CPU</button>
          </span>
        </div>
        <div class="cfg-row">
          <span class="cfg-label">右（下家）</span>
          <span class="seg" data-seat="1">
            <button class="seat-opt active" data-seat="1" data-type="cpu">CPU</button>
            <button class="seat-opt" data-seat="1" data-type="human">人間</button>
          </span>
        </div>
        <div class="cfg-row">
          <span class="cfg-label">対面</span>
          <span class="seg" data-seat="2">
            <button class="seat-opt active" data-seat="2" data-type="cpu">CPU</button>
            <button class="seat-opt" data-seat="2" data-type="human">人間</button>
          </span>
        </div>
        <div class="cfg-row">
          <span class="cfg-label">左（上家）</span>
          <span class="seg" data-seat="3">
            <button class="seat-opt active" data-seat="3" data-type="cpu">CPU</button>
            <button class="seat-opt" data-seat="3" data-type="human">人間</button>
          </span>
        </div>
        <div class="cfg-row">
          <span class="cfg-label">CPUの強さ</span>
          <span class="seg seg-lv">
            <button class="lv-opt" data-lv="1">1</button>
            <button class="lv-opt" data-lv="2">2</button>
            <button class="lv-opt" data-lv="3">3</button>
            <button class="lv-opt" data-lv="4">4</button>
