-s=\"7\">7×7<\/button>\n  <button data-s=\"9\" class=\"on\">9×9<\/button>\n  <button data-s=\"11\">11×11<\/button>\n<\/div>\n\n<div class=\"status\"><div class=\"dot r\" id=\"tdot\"><\/div><span id=\"msg\">赤の番です<\/span><\/div>\n\n<div class=\"wrap\"><svg id=\"svg\"><\/svg><\/div>\n\n<div class=\"legend\">\n  <span><i style=\"background:var(--red)\"><\/i>赤:上下を繋ぐ<\/span>\n  <span><i style=\"background:var(--blue)\"><\/i>青:左右を繋ぐ<\/span>\n<\/div>\n\n<div class=\"foot\">\n  <button id=\"undo\">待った<\/button>\n  <button id=\"reset\">最初から<\/button>\n<\/div>\n\n<div class=\"overlay\" id=\"overlay\">\n  <div class=\"card\">\n    <div class=\"t\" id=\"ov-t\">赤の勝ち<\/div>\n    <div class=\"s\" id=\"ov-s\"><\/div>\n    <button id=\"again\">もう一度<\/button>\n  <\/div>\n<\/div>\n\n<script>\nconst R=1,Bp=2,E=0;\nlet N=9,mode='cpu1',board,turn,history=[],lastIdx=-1,over=false,busy=false;\nconst svg=document.getElementById('svg');\nconst msg=document.getElementById('msg');\nlet hexEls=[];\n\nconst NB=[[-1,0],[-1,1],[0,-1],[0,1],[1,-1],[1,0]];\nconst idx=(r,c)=>r*N+c;\n\n/* ---------- geometry ---------- */\nfunction hexPath(cx,cy,s){\n  let p='';\n  for(let k=0;k<6;k++){\n    const a=Math.PI/180*(60*k-30);\n    p+=(k?'L':'M')+(cx+s*Math.cos(a)).toFixed(2)+','+(cy+s*Math.sin(a)).toFixed(2);\n  }\n  return p+'Z';\n}\n\nfunction buildBoard(){\n  svg.innerHTML='';hexEls=[];\n  const s=20,w=Math.sqrt(3)*s,h=1.5*s;\n  const W=w*N+w*(N-1)/2+40,H=h*(N-1)+2*s+40;\n  svg.setAttribute('viewBox',`0 0 ${W} ${H}`);\n  const ox=20+w/2,oy=20+s;\n\n  const pos=(r,c)=>[ox+c*w+r*w/2,oy+r*h];\n\n  // edge guides\n  const eg=document.createElementNS('http://www.w3.org/2000/svg','g');\n  eg.setAttribute('class','edge');\n  function edgeLine(pts,col,wd){\n    const e=document.createElementNS('http://www.w3.org/2000/svg','polyline');\n    e.setAttribute('points',pts.map(p=>p.join(',')).join(' '));\n    e.setAttribute('stroke',col);e.setAttribute('stroke-width',wd);\n    e.setAttribute('fill','none');e.setAttribute('stroke-linecap','round');\n    eg.appendChild(e);\n  }\n  const [x0,y0]=pos(0,0),[x1,y1]=pos(0,N-1),[x2,y2]=pos(N-1,0),[x3,y3]=pos(N-1,N-1);\n  edgeLine([[x0-w/2,y0-s-4],[x1+w/2,y1-s-4]],'var(--red)',5);\n  edgeLine([[x2-w/2,y2+s+4],[x3+w/2,y3+s+4]],'var(--red)',5);\n  edgeLine([[x0-w/2-4,y0-s],[x2-w/2-4,y2+s]],'var(--blue)',5);\n  edgeLine([[x1+w/2+4,y1-s],[x3+w/2+4,y3+s]],'var(--blue)',5);\n  svg.appendChild(eg);\n\n  for(let r=0;r<N;r++)for(let c=0;c<N;c++){\n    const [cx,cy]=pos(r,c);\n    const p=document.createElementNS('http://www.w3.org/2000/svg','path');\n    p.setAttribute('d',hexPath(cx,cy,s-1));\n    p.setAttribute('class','hex');\n    p.addEventListener('click',()=>onCell(idx(r,c)));\n    svg.appendChild(p);\n    hexEls[idx(r,c)]=p;\n  }\n}\n\n/* ---------- game ---------- */\nfunction init(){\n  board=new Array(N*N).fill(E);\n  turn=R;history=[];lastIdx=-1;over=false;busy=false;\n  document.getElementById('overlay').classList.remove('show');\n  buildBoard();render();\n  msg.textContent='赤の番です';\n}\n\nfunction render(){\n  for(let i=0;i<N*N;i++){\n    const el=hexEls[i];\n    el.classList.toggle('r',board[i]===R);\n    el.classList.toggle('b',board[i]===Bp);\n    el.classList.toggle('last',i===lastIdx);\n  }\n  document.getElementById('tdot').className='dot '+(turn===R?'r':'b');\n  document.getElementById('undo').disabled=!history.length||busy||over;\n}\n\nfunction onCell(i){\n  if(over||busy||board[i]!==E)return;\n  if(mode!=='pvp'&&turn!==R)return;\n  history.push({bd:board.slice(),turn,last:lastIdx});\n  place(i);\n}\n\nfunction place(i){\n  board[i]=turn;lastIdx=i;\n  const path=winPath(turn);\n  if(path){\n    over=true;render();\n    for(const j of path)hexEls[j].classList.add('win');\n    const t=document.getElementById('ov-t');\n    const winRed=turn===R;\n    t.textContent=mode==='pvp'?(winRed?'赤の勝ち':'青の勝ち'):(winRed?'勝利':'敗北');\n    t.style.color=winRed?'var(--red)':'var(--blue)';\n    document.getElementById('ov-s').textContent=`${history.length+1}手で決着`;\n    msg.textContent='対局終了';\n    setTimeout(()=>document.getElementById('overlay').classList.add('show'),700);\n    return;\n  }\n  turn=turn===R?Bp:R;\n  render();\n  msg.textContent=(turn===R?'赤':'青')+'の番です';\n  if(mode!=='pvp'&&turn===Bp){\n    busy=true;render();\n    setTimeout(()=>{\n      const m=cpuMove();\n      busy=false;\n      history.push({bd:board.slice(),turn,last:lastIdx});\n      place(m);\n    },420);\n  }\n}\n\nfunction winPath(p){\n  // BFS with parent tracking\n  const seen=new Array(N*N).fill(false),par=new Array(N*N).fill(-1),q=[];\n  if(p===R){for(let c=0;c<N;c++)if(board[idx(0,c)]===R){q.push(idx(0,c));seen[idx(0,c)]=true;}}\n  else{for(let r=0;r<N;r++)if(board[idx(r,0)]===Bp){q.push(idx(r,0));seen[idx(r,0)]=true;}}\n  while(q.length){\n    const i=q.shift(),r=Math.floor(i/N),c=i%N;\n    if((p===R&&r===N-1)||(p===Bp&&c===N-1)){\n      const path=[];let j=i;\n      while(j!==-1){path.push(j);j=par[j];}\n      return path;\n    }\n    for(const[dr,dc]of NB){\n      const nr=r+dr,nc=c+dc;\n      if(nr<0||nr>=N||nc<0||nc>=N)continue;\n      const ni=idx(nr,nc);\n      if(!seen[ni]&&board[ni]===p){seen[ni]=true;par[ni]=i;q.push(ni);}\n    }\n  }\n  return null;\n}\n\n/* ---------- CPU ---------- */\n// Dijkstra: own=0, empty=1, opp=blocked → 最短接続コスト\nfunction dist(bd,p){\n  const INF=1e9,d=new Array(N*N).fill(INF);\n  const pq=[];\n  const push=(i,v)=>{if(v<d[i]){d[i]=v;pq.push([v,i]);}};\n  if(p===R){for(let c=0;c<N;c++){const i=idx(0,c);if(bd[i]!==(p===R?Bp:R))push(i,bd[i]===p?0:1);}}\n  else{for(let r=0;r<N;r++){const i=idx(r,0);if(bd[i]!==R)push(i,bd[i]===p?0:1);}}\n  while(pq.length){\n    pq.sort((a,b)=>a[0]-b[0]);\n    const[v,i]=pq.shift();\n    if(v>d[i])continue;\n    const r=Math.floor(i/N),c=i%N;\n    for(const[dr,dc]of NB){\n      const nr=r+dr,nc=c+dc;\n      if(nr<0||nr>=N||nc<0||nc>=N)continue;\n      const ni=idx(nr,nc);\n      if(bd[ni]===(p===R?Bp:R))continue;\n      push(ni,v+(bd[ni]===p?0:1));\n    }\n  }\n  let best=INF;\n  if(p===R){for(let c=0;c<N;c++)best=Math.min(best,d[idx(N-1,c)]);}\n  else{for(let r=0;r<N;r++)best=Math.min(best,d[idx(r,N-1)]);}\n  return best;\n}\n\nfunction cpuMove(){\n  const empties=[];\n  for(let i=0;i<N*N;i++)if(board[i]===E)empties.push(i);\n  // 初手付近は中央寄り\n  if(empties.length>=N*N-1){\n    const c=Math.floor(N/2);\n    const cand=idx(c,c);\n    return board[cand]===E?cand:empties[0];\n  }\n  let scored=[];\n  for(const i of empties){\n    board[i]=Bp;\n    const my=dist(board,Bp),op=dist(board,R);\n    board[i]=E;\n    if(my===0)return i; // 即勝ち\n    scored.push([op-my,i,op]);\n  }\n  // 相手の即勝ちブロック\n  for(const[,i]of scored){\n    board[i]=R;\n    if(dist(board,R)===0){board[i]=E;\n      // ブロックしつつ自分にも良い手を優先\n      return i;\n    }\n    board[i]=E;\n  }\n  scored.sort((a,b)=>b[0]-a[0]);\n  if(mode==='cpu1'){\n    const top=scored.slice(0,Math.min(6,scored.length));\n    return top[Math.floor(Math.random()*top.length)][1];\n  }\n  return scored[0][1];\n}\n\n/* ---------- UI ---------- */\ndocument.getElementById('undo').addEventListener('click',()=>{\n  if(!history.length||busy)return;\n  let h=history.pop();\n  if(mode!=='pvp'){while(history.length&&h.turn!==R)h=history.pop();}\n  board=h.bd;turn=h.turn;lastIdx=h.last;over=false;\n  document.getElementById('overlay').classList.remove('show');\n  render();\n  msg.textContent=(turn===R?'赤':'青')+'の番です';\n});\ndocument.getElementById('reset').addEventListener('click',init);\ndocument.getElementById('again').addEventListener('click',init);\n\ndocument.getElementById('modes').addEventListener('click',e=>{\n  const b=e.target.closest('button');if(!b)return;\n  mode=b.dataset.m;\n  document.querySelectorAll('#modes button').forEach(x=>x.classList.remove('on'));\n  b.classList.add('on');init();\n});\ndocument.getElementById('sizes').addEventListener('click',e=>{\n  const b=e.target.closest('button');if(!b)return;\n  N=+b.dataset.s;\n  document.querySelectorAll('#sizes button').forEach(x=>x.classList.remove('on'));\n  b.classList.add('on');init();\n});\n\ninit();\n<\/script>\n<\/body>\n<\/html>\n";

SRC.connect4="<!DOCTYPE html>\n<html lang=\"ja\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0, user-scalable=no\">\n<title>コネクトフォー<\/title>\n<style>\n:root{\n  --bg:#101321;\n  --frame:#1F3A8F;\n  --frame-dk:#162A6B;\n  --hole:#0B0E1A;\n  --red:#E04A3A;\n  --red-dk:#9C2A1E;\n  --yel:#F0B428;\n  --yel-dk:#B07E10;\n  --txt:#E8EAF2;\n  --sub:#828AA5;\n  --gold:#D9B44A;\n}\n*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}\nbody{\n  background:var(--bg);color:var(--txt);\n  font-family:\"Hiragino Sans\",\"Yu Gothic UI\",\"Noto Sans JP\",sans-serif;\n  min-height:100vh;display:flex;flex-direction:column;align-items:center;\n  padding:16px 10px 32px;\n}\nh1{\n  font-family:\"Hiragino Mincho ProN\",\"Yu Mincho\",serif;\n  font-size:24px;font-weight:600;letter-spacing:.35em;text-indent:.35em;margin:4px 0 2px;\n}\n.sub{font-size:10.5px;color:var(--sub);letter-spacing:.25em;margin-bottom:12px}\n.modes{display:flex;gap:8px;margin-bottom:12px}\n.modes button{\n  background:transparent;border:1px solid #303a5e;color:var(--sub);\n  padding:7px 13px;border-radius:18px;font-size:12.5px;cursor:pointer;font-family:inherit;transition:all .2s;\n}\n.modes button.on{border-color:var(--gold);color:var(--gold)}\n\n.status{display:flex;align-items:center;gap:9px;margin:2px 0 10px;font-size:14px;min-height:24px}\n.dot{width:17px;height:17px;border-radius:50%}\n.dot.r{background:radial-gradient(circle at 35% 30%,#f08a76,var(--red-dk))}\n.dot.y{background:radial-gradient(circle at 35% 30%,#ffd970,var(--yel-dk))}\n\n.bwrap{\n  padding:6px;border-radius:14px;\n  background:linear-gradient(160deg,#23335f,#121b3a);\n  box-shadow:0 16px 48px rgba(0,0,0,.6);\n}\nsvg{display:block;width:min(96vw,440px);height:auto}\n.col{fill:transparent;cursor:pointer}\n.col:hover{fill:rgba(217,180,74,.08)}\n.disc{transition:transform .07s}\n.win-ring{fill:none;stroke:var(--gold);stroke-width:4;pointer-events:none}\n\n.msg{min-height:22px;font-size:13.5px;color:var(--gold);letter-spacing:.06em;margin-top:12px;text-align:center}\n.foot{display:flex;gap:10px;margin-top:10px}\n.foot button{\n  background:transparent;border:1px solid #303a5e;color:var(--txt);\n  padding:8px 18px;border-radius:6px;font-size:13px;cursor:pointer;font-family:inherit;\n}\n.foot button:hover{border-color:var(--gold)}\n.foot button:disabled{opacity:.35}\n\n.overlay{\n  position:fixed;inset:0;background:rgba(7,9,16,.84);\n  display:flex;align-items:center;justify-content:center;\n  opacity:0;pointer-events:none;transition:opacity .35s;z-index:20;\n}\n.overlay.show{opacity:1;pointer-events:auto}\n.card{\n  background:#171D33;border:1px solid var(--gold);border-radius:10px;\n  padding:28px 42px;text-align:center;\n}\n.card .t{\n  font-family:\"Hiragino Mincho ProN\",\"Yu Mincho\",serif;\n  font-size:27px;letter-spacing:.22em;text-indent:.22em;color:var(--gold);margin-bottom:8px;\n}\n.card .s{font-size:13px;color:var(--sub);margin-bottom:18px}\n.card button{\n  background:var(--gold);border:none;color:#171D33;padding:9px 26px;\n  border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;\n}\n@media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}\n<\/style>\n<\/head>\n<body>\n<h1>コネクトフォー<\/h1>\n<div class=\"sub\">CONNECT FOUR — 縦・横・斜めに4つ並べる<\/div>\n\n<div class=\"modes\" id=\"modes\">\n  <button data-m=\"cpu1\" class=\"on\">CPU 弱<\/button>\n  <button data-m=\"cpu2\">CPU 強<\/button>\n  <button data-m=\"pvp\">2人対戦<\/button>\n<\/div>\n\n<div class=\"status\"><div class=\"dot r\" id=\"tdot\"><\/div><span id=\"tlabel\">赤の番です<\/span><\/div>\n\n<div class=\"bwrap\"><svg id=\"bd\"><\/svg><\/div>\n\n<div class=\"msg\" id=\"msg\"><\/div>\n<div class=\"foot\">\n  <button id=\"undo\">待った<\/button>\n  <button id=\"reset\">最初から<\/button>\n<\/div>\n\n<div class=\"overlay\" id=\"gov\">\n  <div class=\"card\">\n    <div class=\"t\" id=\"g-t\">勝利<\/div>\n    <div class=\"s\" id=\"g-s\"><\/div>\n    <button id=\"g-again\">もう一度<\/button>\n  <\/div>\n<\/div>\n\n<script>\nconst COLS=7,ROWS=6;\nlet board,turn,mode='cpu1',history=[],over=false,busy=false,winCells=[];\n\nconst NS='http://www.w3.org/2000/svg';\nconst svg=document.getElementById('bd');\nconst CELL=58,PAD=10;\nconst W=COLS*CELL+PAD*2,H=ROWS*CELL+PAD*2;\nsvg.setAttribute('viewBox',`0 0 ${W} ${H}`);\n\nconst idx=(r,c)=>r*COLS+c;\nconst cx=c=>PAD+c*CELL+CELL/2;\nconst cy=r=>PAD+r*CELL+CELL/2;\n\nlet discLayer,ringLayer;\n(function build(){\n  const defs=document.createElementNS(NS,'defs');\n  defs.innerHTML=`\n  <radialGradient id=\"dr\" cx=\".35\" cy=\".3\" r=\".9\"><stop offset=\"0\" stop-color=\"#f08a76\"/><stop offset=\"1\" stop-color=\"var(--red-dk)\"/><\/radialGradient>\n  <radialGradient id=\"dy\" cx=\".35\" cy=\".3\" r=\".9\"><stop offset=\"0\" stop-color=\"#ffd970\"/><stop offset=\"1\" stop-color=\"var(--yel-dk)\"/><\/radialGradient>\n  <mask id=\"holes\">\n    <rect width=\"${W}\" height=\"${H}\" fill=\"#fff\"/>\n    ${Array.from({length:ROWS*COLS},(_,i)=>{\n      const r=Math.floor(i/COLS),c=i%COLS;\n      return `<circle cx=\"${cx(c)}\" cy=\"${cy(r)}\" r=\"${CELL*.40}\" fill=\"#000\"/>`;\n    }).join('')}\n  <\/mask>`;\n  svg.appendChild(defs);\n\n  // 背面(穴の奥)\n  const back=document.createElementNS(NS,'rect');\n  back.setAttribute('width',W);back.setAttribute('height',H);\n  back.setAttribute('fill','var(--hole)');back.setAttribute('rx',12);\n  svg.appendChild(back);\n\n  // ディスク層(フレームの後ろ)\n  discLayer=document.createElementNS(NS,'g');\n  svg.appendChild(discLayer);\n\n  // フレーム(穴あき)\n  const fr=document.createElementNS(NS,'rect');\n  fr.setAttribute('width',W);fr.setAttribute('height',H);\n  fr.setAttribute('fill','var(--frame)');fr.setAttribute('rx',12);\n  fr.setAttribute('mask','url(#holes)');\n  fr.setAttribute('pointer-events','none');\n  svg.appendChild(fr);\n\n  ringLayer=document.createElementNS(NS,'g');\n  svg.appendChild(ringLayer);\n\n  // 列クリック領域\n  for(let c=0;c<COLS;c++){\n    const rc=document.createElementNS(NS,'rect');\n    rc.setAttribute('x',PAD+c*CELL);rc.setAttribute('y',0);\n    rc.setAttribute('width',CELL);rc.setAttribute('height',H);\n    rc.setAttribute('class','col');\n    rc.addEventListener('click',()=>onCol(c));\n    svg.appendChild(rc);\n  }\n})();\n\nfunction init(){\n  board=new Array(ROWS*COLS).fill(0);\n  turn=1;history=[];over=false;busy=false;winCells=[];\n  discLayer.innerHTML='';ringLayer.innerHTML='';\n  document.getElementById('gov').classList.remove('show');\n  updateStatus();\n  document.getElementById('msg').textContent='';\n  document.getElementById('undo').disabled=true;\n}\n\nfunction updateStatus(){\n  document.getElementById('tdot').className='dot '+(turn===1?'r':'y');\n  document.getElementById('tlabel').textContent=(turn===1?'赤':'黄')+'の番です';\n}\n\nfunction dropRow(bd,c){\n  for(let r=ROWS-1;r>=0;r--)if(bd[idx(r,c)]===0)return r;\n  return -1;\n}\n\nfunction checkWin(bd,p){\n  const dirs=[[0,1],[1,0],[1,1],[1,-1]];\n  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){\n    if(bd[idx(r,c)]!==p)continue;\n    for(const[dr,dc]of dirs){\n      const cells=[idx(r,c)];\n      let nr=r+dr,nc=c+dc;\n      while(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS&&bd[idx(nr,nc)]===p){\n        cells.push(idx(nr,nc));\n        if(cells.length===4)return cells;\n        nr+=dr;nc+=dc;\n      }\n    }\n  }\n  return null;\n}\n\nconst isHuman=()=>mode==='pvp'||turn===1;\n\nfunction onCol(c){\n  if(over||busy||!isHuman())return;\n  const r=dropRow(board,c);\n  if(r<0)return;\n  history.push({bd:board.slice(),turn});\n  play(c,r);\n}\n\nfunction play(c,r){\n  busy=true;\n  const p=turn;\n  board[idx(r,c)]=p;\n  // 落下アニメーション\n  const g=document.createElementNS(NS,'g');\n  g.setAttribute('class','disc');\n  const d=document.createElementNS(NS,'circle');\n  d.setAttribute('cx',cx(c));d.setAttribute('cy',cy(r));\n  d.setAttribute('r',CELL*.40);\n  d.setAttribute('fill',p===1?'url(#dr)':'url(#dy)');\n  g.appendChild(d);\n  g.dataset.cell=idx(r,c);\n  const dist=cy(r)+CELL;\n  g.style.transform=`translateY(${-dist}px)`;\n  discLayer.appendChild(g);\n  const dur=Math.max(.18,.07*(r+1));\n  requestAnimationFrame(()=>{\n    g.style.transition=`transform ${dur}s cubic-bezier(.55,0,1,.85)`;\n    g.style.transform='translateY(0)';\n  });\n  setTimeout(()=>afterDrop(p),dur*1000+60);\n}\n\nfunction afterDrop(p){\n  const win=checkWin(board,p);\n  if(win){\n    over=true;busy=false;winCells=win;\n    for(const i of win){\n      const r=Math.floor(i/COLS),c=i%COLS;\n      const ring=document.createElementNS(NS,'circle');\n      ring.setAttribute('cx',cx(c));ring.setAttribute('cy',cy(r));\n      ring.setAttribute('r',CELL*.40);\n      ring.setAttribute('class','win-ring');\n      ringLayer.appendChild(ring);\n    }\n    const t=document.getElementById('g-t');\n    if(mode==='pvp')t.textContent=p===1?'赤の勝ち':'黄の勝ち';\n    else t.textContent=p===1?'勝利':'敗北';\n    document.getElementById('g-s').textContent=`${history.length+1}手で決着`;\n    document.getElementById('msg').textContent='対局終了';\n    document.getElementById('undo').disabled=false;\n    setTimeout(()=>document.getElementById('gov').classList.add('show'),650);\n    return;\n  }\n  if(board.every(v=>v!==0)){\n    over=true;busy=false;\n    document.getElementById('g-t').textContent='引き分け';\n    document.getElementById('g-s').textContent='盤面が埋まりました';\n    setTimeout(()=>document.getElementById('gov').classList.add('show'),500);\n    return;\n  }\n  turn=3-turn;busy=false;\n  updateStatus();\n  document.getElementById('undo').disabled=!history.length;\n  if(!isHuman()){\n    busy=true;\n    setTimeout(()=>{\n      const c=cpuMove();\n      busy=false;\n      const r=dropRow(board,c);\n      history.push({bd:board.slice(),turn});\n      play(c,r);\n    },420);\n  }\n}\n\n/* ============ CPU ============ */\nconst ORDER=[3,2,4,1,5,0,6];\n\nfunction winsAt(bd,c,p){\n  const r=dropRow(bd,c);\n  if(r<0)return false;\n  bd[idx(r,c)]=p;\n  const w=checkWin(bd,p);\n  bd[idx(r,c)]=0;\n  return!!w;\n}\n\nfunction evalBd(bd,me){\n  // 4マス窓の評価\n  const opp=3-me;\n  let s=0;\n  const line=(a,b,c,d)=>{\n    const v=[bd[a],bd[b],bd[c],bd[d]];\n    const m=v.filter(x=>x===me).length,o=v.filter(x=>x===opp).length;\n    if(m&&o)return 0;\n    if(m===3)return 60;if(m===2)return 8;if(m===1)return 1;\n    if(o===3)return -70;if(o===2)return -9;if(o===1)return -1;\n    return 0;\n  };\n  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){\n    if(c+3<COLS)s+=line(idx(r,c),idx(r,c+1),idx(r,c+2),idx(r,c+3));\n    if(r+3<ROWS)s+=line(idx(r,c),idx(r+1,c),idx(r+2,c),idx(r+3,c));\n    if(r+3<ROWS&&c+3<COLS)s+=line(idx(r,c),idx(r+1,c+1),idx(r+2,c+2),idx(r+3,c+3));\n    if(r+3<ROWS&&c-3>=0)s+=line(idx(r,c),idx(r+1,c-1),idx(r+2,c-2),idx(r+3,c-3));\n  }\n  // 中央列ボーナス\n  for(let r=0;r<ROWS;r++)if(bd[idx(r,3)]===me)s+=4;else if(bd[idx(r,3)]===opp)s-=4;\n  return s;\n}\n\nfunction negamax(bd,p,depth,a,b,me){\n  for(const c of ORDER){\n    if(winsAt(bd,c,p))return 100000+depth;\n  }\n  if(depth===0)return p===me?evalBd(bd,me):-evalBd(bd,me);\n  let any=false,best=-Infinity;\n  for(const c of ORDER){\n    const r=dropRow(bd,c);\n    if(r<0)continue;\n    any=true;\n    bd[idx(r,c)]=p;\n    const v=-negamax(bd,3-p,depth-1,-b,-a,me);\n    bd[idx(r,c)]=0;\n    if(v>best)best=v;\n    if(best>a)a=best;\n    if(a>=b)break;\n  }\n  if(!any)return 0; // 引き分け\n  return best;\n}\n\nfunction cpuMove(){\n  const me=turn,opp=3-me;\n  const legal=ORDER.filter(c=>dropRow(board,c)>=0);\n  // 即勝ち / 即ブロックは常に\n  for(const c of legal)if(winsAt(board,c,me))return c;\n  for(const c of legal)if(winsAt(board,c,opp))return c;\n  if(mode==='cpu1'){\n    // 弱: 中央寄りランダム(相手に勝ち筋を渡す手は半分回避)\n    const safe=legal.filter(c=>{\n      const r=dropRow(board,c);\n      board[idx(r,c)]=me;\n      const gives=legal.some(c2=>winsAt(board,c2,opp));\n      board[idx(r,c)]=0;\n      return!gives;\n    });\n    const pool=safe.length?safe:legal;\n    const wts=pool.map(c=>4-Math.abs(c-3)+1);\n    let t=wts.reduce((a,b)=>a+b,0)*Math.random();\n    for(let k=0;k<pool.length;k++){t-=wts[k];if(t<=0)return pool[k];}\n    return pool[0];\n  }\n  // 強: αβ探索 深さ9\n  let best=legal[0],bs=-Infinity;\n  for(const c of legal){\n    const r=dropRow(board,c);\n    board[idx(r,c)]=me;\n    const v=-negamax(board,opp,9,-Infinity,Infinity,me);\n    board[idx(r,c)]=0;\n    if(v>bs){bs=v;best=c;}\n  }\n  return best;\n}\n\n/* ============ controls ============ */\nfunction redraw(){\n  discLayer.innerHTML='';ringLayer.innerHTML='';\n  for(let i=0;i<ROWS*COLS;i++){\n    if(board[i]===0)continue;\n    const r=Math.floor(i/COLS),c=i%COLS;\n    const g=document.createElementNS(NS,'g');\n    const d=document.createElementNS(NS,'circle');\n    d.setAttribute('cx',cx(c));d.setAttribute('cy',cy(r));\n    d.setAttribute('r',CELL*.40);\n    d.setAttribute('fill',board[i]===1?'url(#dr)':'url(#dy)');\n    g.appendChild(d);\n    discLayer.appendChild(g);\n  }\n}\n\ndocument.getElementById('undo').addEventListener('click',()=>{\n  if(!history.length||busy)return;\n  let h=history.pop();\n  if(mode!=='pvp'){while(history.length&&h.turn!==1)h=history.pop();}\n  board=h.bd;turn=h.turn;over=false;\n  document.getElementById('gov').classList.remove('show');\n  redraw();updateStatus();\n  document.getElementById('msg').textContent='';\n  document.getElementById('undo').disabled=!history.length;\n});\ndocument.getElementById('reset').addEventListener('click',init);\ndocument.getElementById('g-again').addEventListener('click',init);\ndocument.getElementById('modes').addEventListener('click',e=>{\n  const b=e.target.closest('button');if(!b)return;\n  mode=b.dataset.m;\n  document.querySelectorAll('#modes button').forEach(x=>x.classList.remove('on'));\n  b.classList.add('on');init();\n});\n\ninit();\n<\/script>\n<\/body>\n<\/html>\n";

const grid=document.getElementById('grid');
for(const g of GAMES){
  const b=document.createElement('button');
  b.className='gcard';
  b.innerHTML='<span class="ic">'+g.icon+'</span>'+
    '<span class="nm">'+g.name+'</span>'+
    '<span class="en">'+g.en+'</span>'+
    '<span class="ds">'+g.desc+'</span>';
  b.addEventListener('click',()=>open(g));
  grid.appendChild(b);
}

const player=document.getElementById('player');
const frame=document.getElementById('frame');
function open(g){
  document.getElementById('ptitle').textContent=g.name;
  document.getElementById('pen').textContent=g.en;
  frame.srcdoc=SRC[g.id]||'';
  player.classList.add('show');
  history.pushState({game:g.id},'','#'+g.id);
}
function closeGame(){
  player.classList.remove('show');
  frame.srcdoc='';
}
document.getElementById('backbtn').addEventListener('click',()=>{
  closeGame();
  if(location.hash)history.pushState({},'','#');
});
window.addEventListener('popstate',e=>{
  if(!e.state||!e.state.game)closeGame();
  else{
    const g=GAMES.find(x=>x.id===e.state.game);
    if(g)open(g);
  }
});
// 直リンク (#shogi など)
function openFromHash(){
  const g=GAMES.find(x=>'#'+x.id===location.hash);
  if(g)open(g); else closeGame();
}
if(location.hash)openFromHash();
// ハッシュだけ変わった場合（既に開いた状態で別ゲームのリンクを踏む等）にも追従
window.addEventListener('hashchange',openFromHash);
</script>
</body>
</html>
