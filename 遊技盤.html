pu1\" class=\"on\">CPU 弱<\/button>\n  <button data-m=\"cpu2\">CPU 強<\/button>\n  <button data-m=\"pvp\">2人対戦<\/button>\n<\/div>\n\n<div class=\"info\">\n  <span>○ 白 ピップ <b id=\"pip0\">167<\/b> / 上がり <b id=\"off0\">0<\/b><\/span>\n  <span>● 黒 ピップ <b id=\"pip1\">167<\/b> / 上がり <b id=\"off1\">0<\/b><\/span>\n<\/div>\n\n<div class=\"bwrap\"><svg id=\"bd\"><\/svg><\/div>\n\n<div class=\"dicebar\" id=\"dicebar\">\n  <button class=\"rollbtn\" id=\"roll\">サイコロを振る<\/button>\n<\/div>\n\n<div class=\"msg\" id=\"msg\"><\/div>\n<div class=\"foot\">\n  <button id=\"undo\">待った<\/button>\n  <button id=\"reset\">最初から<\/button>\n<\/div>\n\n<div class=\"overlay\" id=\"gov\">\n  <div class=\"card\">\n    <div class=\"t\" id=\"g-t\">勝利<\/div>\n    <div class=\"s\" id=\"g-s\"><\/div>\n    <button id=\"g-again\">もう一度<\/button>\n  <\/div>\n<\/div>\n\n<script>\n/* =================== state =================== */\n/* pts[1..24]: +n=白n枚, -n=黒n枚。白:24→1へ進みベアオフ、黒:1→24 */\nlet pts,bar,off,turn,dice,used,mode='cpu1',busy=false,over=false,rolled=false;\nlet history=[],sel=null;\n\nfunction startPos(){\n  pts=new Array(25).fill(0);\n  pts[24]=2;pts[13]=5;pts[8]=3;pts[6]=5;       // 白\n  pts[1]=-2;pts[12]=-5;pts[17]=-3;pts[19]=-5;  // 黒\n  bar={w:0,b:0};off={w:0,b:0};\n}\n\nconst W='w',B='b';\nconst sign=p=>p===W?1:-1;\nconst cnt=(v,p)=>p===W?Math.max(v,0):Math.max(-v,0);\n\nfunction pipCount(p){\n  let s=0;\n  for(let i=1;i<=24;i++){\n    const n=cnt(pts[i],p);\n    s+=n*(p===W?i:25-i);\n  }\n  s+=(p===W?bar.w:bar.b)*25;\n  return s;\n}\n\n/* =================== rules =================== */\nfunction allHome(st,p){\n  if(p===W){\n    if(st.bar.w>0)return false;\n    for(let i=7;i<=24;i++)if(st.pts[i]>0)return false;\n    return true;\n  }else{\n    if(st.bar.b>0)return false;\n    for(let i=1;i<=18;i++)if(st.pts[i]<0)return false;\n    return true;\n  }\n}\nfunction canLand(st,p,t){\n  return p===W?st.pts[t]>=-1:st.pts[t]<=1;\n}\n\nfunction singleMoves(st,p,d){\n  const out=[];\n  if(p===W){\n    if(st.bar.w>0){\n      const t=25-d;\n      if(canLand(st,W,t))out.push({from:'bar',to:t,die:d});\n      return out;\n    }\n    for(let i=1;i<=24;i++){\n      if(st.pts[i]<=0)continue;\n      const t=i-d;\n      if(t>=1){if(canLand(st,W,t))out.push({from:i,to:t,die:d});}\n      else if(allHome(st,W)){\n        if(i===d)out.push({from:i,to:'off',die:d});\n        else if(i<d){\n          let higher=false;\n          for(let j=i+1;j<=6;j++)if(st.pts[j]>0)higher=true;\n          if(!higher)out.push({from:i,to:'off',die:d});\n        }\n      }\n    }\n  }else{\n    if(st.bar.b>0){\n      const t=d;\n      if(canLand(st,B,t))out.push({from:'bar',to:t,die:d});\n      return out;\n    }\n    for(let i=1;i<=24;i++){\n      if(st.pts[i]>=0)continue;\n      const t=i+d;\n      if(t<=24){if(canLand(st,B,t))out.push({from:i,to:t,die:d});}\n      else if(allHome(st,B)){\n        const dist=25-i;\n        if(dist===d)out.push({from:i,to:'off',die:d});\n        else if(dist<d){\n          let higher=false;\n          for(let j=19;j<i;j++)if(st.pts[j]<0)higher=true;\n          if(!higher)out.push({from:i,to:'off',die:d});\n        }\n      }\n    }\n  }\n  return out;\n}\n\nfunction applySingle(st,p,m){\n  let hit=false;\n  if(m.from==='bar'){p===W?st.bar.w--:st.bar.b--;}\n  else st.pts[m.from]-=sign(p);\n  if(m.to==='off'){p===W?st.off.w++:st.off.b++;}\n  else{\n    if(p===W&&st.pts[m.to]===-1){st.pts[m.to]=0;st.bar.b++;hit=true;}\n    if(p===B&&st.pts[m.to]===1){st.pts[m.to]=0;st.bar.w++;hit=true;}\n    st.pts[m.to]+=sign(p);\n  }\n  return hit;\n}\n\nconst cloneSt=st=>({pts:st.pts.slice(),bar:{...st.bar},off:{...st.off}});\nconst curSt=()=>({pts,bar,off});\n\n/* 全シーケンス列挙(最大手数ルール+大きい目優先) */\nfunction genSequences(st0,p,diceArr){\n  const seqs=[];\n  function rec(st,remain,moves){\n    let any=false;\n    const tried=new Set();\n    for(let k=0;k<remain.length;k++){\n      const d=remain[k];\n      if(tried.has(d))continue;\n      tried.add(d);\n      const ms=singleMoves(st,p,d);\n      for(const m of ms){\n        any=true;\n        const ns=cloneSt(st);\n        applySingle(ns,p,m);\n        const nr=remain.slice();nr.splice(k,1);\n        rec(ns,nr,[...moves,m]);\n      }\n    }\n    if(!any)seqs.push({moves,st});\n    if(seqs.length>4000)return;\n  }\n  rec(cloneSt(st0),diceArr,[]);\n  let maxLen=0;\n  for(const s of seqs)maxLen=Math.max(maxLen,s.moves.length);\n  let valid=seqs.filter(s=>s.moves.length===maxLen);\n  // 片方しか使えない時は大きい目を優先\n  if(maxLen===1&&diceArr.length===2&&diceArr[0]!==diceArr[1]){\n    const big=Math.max(...diceArr);\n    const bigSeqs=valid.filter(s=>s.moves[0].die===big);\n    if(bigSeqs.length)valid=bigSeqs;\n  }\n  return{valid,maxLen};\n}\n\n/* 現在の残りダイスで「いま指せる単手」 */\nfunction legalNow(){\n  const remain=remainingDice();\n  if(!remain.length)return[];\n  const{valid,maxLen}=genSequences(curSt(),turn,remain);\n  if(maxLen===0)return[];\n  const firsts=[];\n  const seen=new Set();\n  for(const s of valid){\n    const m=s.moves[0];\n    const key=m.from+'-'+m.to+'-'+m.die;\n    if(!seen.has(key)){seen.add(key);firsts.push(m);}\n  }\n  return firsts;\n}\nfunction remainingDice(){\n  const r=[];\n  for(let i=0;i<dice.length;i++)if(!used[i])r.push(dice[i]);\n  return r;\n}\nfunction consumeDie(d){\n  for(let i=0;i<dice.length;i++)if(!used[i]&&dice[i]===d){used[i]=true;return;}\n}\n\n/* =================== board drawing =================== */\nconst NS='http://www.w3.org/2000/svg';\nconst svg=document.getElementById('bd');\nconst PW=36,PH=140,BARW=34,TRAYW=40,PAD=8;\nconst BW=PW*12+BARW+TRAYW+PAD*2,BH=PH*2+70;\nsvg.setAttribute('viewBox',`0 0 ${BW} ${BH}`);\n\nfunction colX(col){ // col 0..11 左→右\n  let x=PAD+col*PW;\n  if(col>=6)x+=BARW;\n  return x;\n}\nfunction pointCol(pt){ // ポイント番号→列\n  if(pt>=13&&pt<=18)return pt-13;       // 上左\n  if(pt>=19&&pt<=24)return pt-13;       // 上右\n  if(pt>=7&&pt<=12)return 12-pt;        // 下左\n  return 12-pt;                          // 下右 (1..6)\n}\nconst isTop=pt=>pt>=13;\n\nlet layerCk,layerHl;\n(function build(){\n  const defs=document.createElementNS(NS,'defs');\n  defs.innerHTML=`\n  <radialGradient id=\"cw\" cx=\".35\" cy=\".3\" r=\".9\"><stop offset=\"0\" stop-color=\"#fff\"/><stop offset=\"1\" stop-color=\"var(--white-dk)\"/><\/radialGradient>\n  <radialGradient id=\"cb\" cx=\".35\" cy=\".3\" r=\".9\"><stop offset=\"0\" stop-color=\"#4a4a52\"/><stop offset=\"1\" stop-color=\"var(--black-dk)\"/><\/radialGradient>`;\n  svg.appendChild(defs);\n  const bg=document.createElementNS(NS,'rect');\n  bg.setAttribute('width',BW);bg.setAttribute('height',BH);\n  bg.setAttribute('fill','var(--felt)');bg.setAttribute('rx',8);\n  svg.appendChild(bg);\n  // バー\n  const barR=document.createElementNS(NS,'rect');\n  barR.setAttribute('x',PAD+6*PW);barR.setAttribute('y',0);\n  barR.setAttribute('width',BARW);barR.setAttribute('height',BH);\n  barR.setAttribute('fill','var(--bar)');\n  svg.appendChild(barR);\n  // トレー\n  const tr=document.createElementNS(NS,'rect');\n  tr.setAttribute('x',BW-TRAYW-2);tr.setAttribute('y',4);\n  tr.setAttribute('width',TRAYW-4);tr.setAttribute('height',BH-8);\n  tr.setAttribute('fill','var(--bar)');tr.setAttribute('rx',6);\n  svg.appendChild(tr);\n  // 三角ポイント\n  for(let pt=1;pt<=24;pt++){\n    const col=pointCol(pt),x=colX(col);\n    const top=isTop(pt);\n    const y0=top?6:BH-6,dir=top?1:-1;\n    const tri=document.createElementNS(NS,'path');\n    tri.setAttribute('d',`M${x+2},${y0} L${x+PW-2},${y0} L${x+PW/2},${y0+dir*PH} Z`);\n    tri.setAttribute('fill',(col%2===0)===top?'var(--tri-a)':'var(--tri-b)');\n    tri.setAttribute('opacity',.92);\n    svg.appendChild(tri);\n    const num=document.createElementNS(NS,'text');\n    num.setAttribute('x',x+PW/2);\n    num.setAttribute('y',top?BH/2-58:BH/2+64);\n    num.setAttribute('text-anchor','middle');\n    num.setAttribute('font-size',9);\n    num.setAttribute('fill','var(--sub)');\n    num.textContent=pt;\n    svg.appendChild(num);\n  }\n  layerHl=document.createElementNS(NS,'g');svg.appendChild(layerHl);\n  layerCk=document.createElementNS(NS,'g');svg.appendChild(layerCk);\n  // クリック領域\n  for(let pt=1;pt<=24;pt++){\n    const col=pointCol(pt),x=colX(col);\n    const rc=document.createElementNS(NS,'rect');\n    rc.setAttribute('x',x);\n    rc.setAttribute('y',isTop(pt)?0:BH-PH-30);\n    rc.setAttribute('width',PW);rc.setAttribute('height',PH+30);\n    rc.setAttribute('class','pt-click');\n    rc.addEventListener('click',()=>onPoint(pt));\n    svg.appendChild(rc);\n  }\n  // バー・トレークリック\n  const barC=document.createElementNS(NS,'rect');\n  barC.setAttribute('x',PAD+6*PW);barC.setAttribute('y',0);\n  barC.setAttribute('width',BARW);barC.setAttribute('height',BH);\n  barC.setAttribute('class','pt-click');\n  barC.addEventListener('click',()=>onPoint('bar'));\n  svg.appendChild(barC);\n  const trC=document.createElementNS(NS,'rect');\n  trC.setAttribute('x',BW-TRAYW-2);trC.setAttribute('y',0);\n  trC.setAttribute('width',TRAYW);trC.setAttribute('height',BH);\n  trC.setAttribute('class','pt-click');\n  trC.addEventListener('click',()=>onPoint('off'));\n  svg.appendChild(trC);\n})();\n\nfunction ckR(){return PW/2-3;}\nfunction drawChecker(x,y,p,selMark){\n  const c=document.createElementNS(NS,'circle');\n  c.setAttribute('cx',x);c.setAttribute('cy',y);\n  c.setAttribute('r',ckR());\n  c.setAttribute('fill',p===W?'url(#cw)':'url(#cb)');\n  c.setAttribute('stroke',selMark?'var(--sel)':p===W?'#9a8d72':'#000');\n  c.setAttribute('stroke-width',selMark?3:1);\n  c.setAttribute('class','checker nopick');\n  layerCk.appendChild(c);\n}\n\nfunction render(){\n  layerCk.innerHTML='';layerHl.innerHTML='';\n  const legal=isHumanTurn()&&rolled?legalNow():[];\n  const targets=sel!==null?legal.filter(m=>String(m.from)===String(sel)):[];\n  // 行き先ハイライト\n  for(const m of targets){\n    if(m.to==='off'){\n      const r=document.createElementNS(NS,'rect');\n      r.setAttribute('x',BW-TRAYW-2);r.setAttribute('y',turn===W?BH/2+4:4);\n      r.setAttribute('width',TRAYW-4);r.setAttribute('height',BH/2-8);\n      r.setAttribute('fill','none');r.setAttribute('stroke','var(--sel)');\n      r.setAttribute('stroke-width',2.5);r.setAttribute('rx',6);\n      layerHl.appendChild(r);\n    }else{\n      const col=pointCol(m.to),x=colX(col);\n      const top=isTop(m.to);\n      const r=document.createElementNS(NS,'rect');\n      r.setAttribute('x',x+2);\n      r.setAttribute('y',top?4:BH-PH-4);\n      r.setAttribute('width',PW-4);r.setAttribute('height',PH);\n      r.setAttribute('fill','rgba(217,168,74,.22)');\n      r.setAttribute('stroke','var(--sel)');r.setAttribute('stroke-width',2);\n      r.setAttribute('rx',4);\n      layerHl.appendChild(r);\n    }\n  }\n  // 選択可能ポイントの淡い印\n  if(sel===null){\n    const froms=new Set(legal.map(m=>String(m.from)));\n    for(const f of froms){\n      if(f==='bar')continue;\n      const pt=+f,col=pointCol(pt),x=colX(col);\n      const d=document.createElementNS(NS,'circle');\n      d.setAttribute('cx',x+PW/2);\n      d.setAttribute('cy',isTop(pt)?PH+16:BH-PH-16);\n      d.setAttribute('r',3.4);\n      d.setAttribute('fill','var(--gold)');\n      layerHl.appendChild(d);\n    }\n  }\n  // 駒\n  for(let pt=1;pt<=24;pt++){\n    const v=pts[pt];\n    if(v===0)continue;\n    const p=v>0?W:B,n=Math.abs(v);\n    const col=pointCol(pt),x=colX(col)+PW/2;\n    const top=isTop(pt);\n    const show=Math.min(n,5);\n    for(let k=0;k<show;k++){\n      const y=top?16+k*(ckR()*2-2):BH-46-k*(ckR()*2-2)+30;\n      drawChecker(x,y,p,sel===pt&&k===show-1);\n    }\n    if(n>5){\n      const t=document.createElementNS(NS,'text');\n      t.setAttribute('x',x);\n      t.setAttribute('y',top?16+4*(ckR()*2-2)+5:BH-16-4*(ckR()*2-2)+5);\n      t.setAttribute('text-anchor','middle');\n      t.setAttribute('font-size',12);t.setAttribute('font-weight','700');\n      t.setAttribute('fill',p===W?'#222':'#eee');\n      t.setAttribute('class','nopick');\n      t.textContent=n;\n      layerCk.appendChild(t);\n    }\n  }\n  // バー\n  const bx=PAD+6*PW+BARW/2;\n  for(let k=0;k<Math.min(bar.w,4);k++)drawChecker(bx,BH/2+26+k*18,W,sel==='bar'&&turn===W);\n  for(let k=0;k<Math.min(bar.b,4);k++)drawChecker(bx,BH/2-26-k*18,B,sel==='bar'&&turn===B);\n  if(bar.w>4||bar.b>4){\n    const t=document.createElementNS(NS,'text');\n    t.setAttribute('x',bx);t.setAttribute('y',BH/2+4);\n    t.setAttribute('text-anchor','middle');t.setAttribute('font-size',10);\n    t.setAttribute('fill','var(--sub)');t.textContent=`${bar.b}/${bar.w}`;\n    layerCk.appendChild(t);\n  }\n  // トレー(上がり駒)\n  const tx=BW-TRAYW/2-2;\n  for(let k=0;k<off.w;k++){\n    const r=document.createElementNS(NS,'rect');\n    r.setAttribute('x',tx-13);r.setAttribute('y',BH-14-k*9);\n    r.setAttribute('width',26);r.setAttribute('height',7);\n    r.setAttribute('fill','var(--white)');r.setAttribute('rx',2);\n    layerCk.appendChild(r);\n  }\n  for(let k=0;k<off.b;k++){\n    const r=document.createElementNS(NS,'rect');\n    r.setAttribute('x',tx-13);r.setAttribute('y',8+k*9);\n    r.setAttribute('width',26);r.setAttribute('height',7);\n    r.setAttribute('fill','#3a3a42');r.setAttribute('rx',2);\n    layerCk.appendChild(r);\n  }\n  // 情報\n  document.getElementById('pip0').textContent=pipCount(W);\n  document.getElementById('pip1').textContent=pipCount(B);\n  document.getElementById('off0').textContent=off.w;\n  document.getElementById('off1').textContent=off.b;\n  document.getElementById('undo').disabled=!history.length||busy||over;\n  document.getElementById('roll').disabled=busy||over||rolled||!isHumanTurn();\n  renderDice();\n}\n\nfunction renderDice(){\n  const bar2=document.getElementById('dicebar');\n  bar2.querySelectorAll('.die,.dlabel').forEach(x=>x.remove());\n  if(!rolled)return;\n  dice.forEach((d,i)=>{\n    if(i>=2&&dice[0]===dice[1]&&i>=2){} // ゾロ目は2個+ラベル表示\n  });\n  const show=dice[0]===dice[1]&&dice.length===4?[dice[0],dice[1]]:dice;\n  show.forEach((d,i)=>{\n    const el=document.createElement('div');\n    el.className='die'+(used[i]&&!(dice.length===4)?' used':'');\n    if(dice.length===4){\n      const usedCnt=used.filter(Boolean).length;\n      if(i<usedCnt-2||(usedCnt>i&&usedCnt>=i+1&&false)){}\n    }\n    const P={1:[[50,50]],2:[[28,28],[72,72]],3:[[26,26],[50,50],[74,74]],\n      4:[[28,28],[72,28],[28,72],[72,72]],\n      5:[[28,28],[72,28],[50,50],[28,72],[72,72]],\n      6:[[28,26],[72,26],[28,50],[72,50],[28,74],[72,74]]};\n    el.innerHTML=P[d].map(([x,y])=>`<span class=\"pip\" style=\"left:${x}%;top:${y}%\"><\/span>`).join('');\n    document.getElementById('dicebar').appendChild(el);\n  });\n  if(dice.length===4){\n    const l=document.createElement('span');\n    l.className='dlabel';\n    l.style.cssText='font-size:12px;color:var(--sub)';\n    l.textContent=`ゾロ目! 残り${dice.length-used.filter(Boolean).length}手`;\n    document.getElementById('dicebar').appendChild(l);\n  }else{\n    const rem=remainingDice().length;\n    const l=document.createElement('span');\n    l.className='dlabel';\n    l.style.cssText='font-size:12px;color:var(--sub)';\n    l.textContent=`残り${rem}手`;\n    document.getElementById('dicebar').appendChild(l);\n  }\n}\n\n/* =================== flow =================== */\nfunction msg(s){document.getElementById('msg').textContent=s;}\nconst isHumanTurn=()=>mode==='pvp'||turn===W;\nconst rnd=()=>1+Math.floor(Math.random()*6);\n\nfunction init(){\n  startPos();\n  history=[];sel=null;over=false;busy=false;rolled=false;\n  document.getElementById('gov').classList.remove('show');\n  // オープニングロール\n  let a,b2;\n  do{a=rnd();b2=rnd();}while(a===b2);\n  turn=a>b2?W:B;\n  dice=[a,b2].sort((x,y)=>y-x);used=[false,false];rolled=true;\n  msg(`オープニングロール ${a}-${b2}:${turn===W?'白':'黒'}の先攻`);\n  render();\n  if(!isHumanTurn())setTimeout(cpuTurn,900);\n  else checkNoMoves();\n}\n\nfunction rollDice(){\n  const a=rnd(),b2=rnd();\n  if(a===b2){dice=[a,a,a,a];used=[false,false,false,false];}\n  else{dice=[Math.max(a,b2),Math.min(a,b2)];used=[false,false];}\n  rolled=true;\n}\n\ndocument.getElementById('roll').addEventListener('click',()=>{\n  if(busy||over||rolled||!isHumanTurn())return;\n  pushHistory();\n  rollDice();\n  msg(dice.length===4?`${dice[0]}のゾロ目!`:`${dice[0]}-${dice[1]}`);\n  render();\n  checkNoMoves();\n});\n\nfunction checkNoMoves(){\n  if(over)return;\n  const legal=legalNow();\n  if(rolled&&legal.length===0){\n    const rem=remainingDice().length;\n    msg(rem===dice.length?'動かせる手がありません — パス':'これ以上動かせません');\n    setTimeout(endTurn,1100);\n  }\n}\n\nfunction onPoint(pt){\n  if(over||busy||!rolled||!isHumanTurn())return;\n  const legal=legalNow();\n  // 移動実行?\n  if(sel!==null){\n    const cand=legal.filter(m=>String(m.from)===String(sel)&&String(m.to)===String(pt));\n    if(cand.length){\n      // 同じ行き先に複数の目: 残りの手を最大化する目を選ぶ\n      let mv=cand[0];\n      if(cand.length>1){\n        let bestLen=-1;\n        for(const m of cand){\n          const ns=cloneSt(curSt());\n          applySingle(ns,turn,m);\n          const rem=remainingDice().slice();\n          rem.splice(rem.indexOf(m.die),1);\n          const{maxLen}=genSequences(ns,turn,rem);\n          if(maxLen>bestLen){bestLen=maxLen;mv=m;}\n        }\n      }\n      execMove(mv);\n      return;\n    }\n    sel=null;render();\n    // 続けて別の駒選択へフォールスルー\n  }\n  // 駒選択\n  const froms=new Set(legal.map(m=>String(m.from)));\n  if(froms.has(String(pt))){sel=pt;render();}\n}\n\nfunction execMove(m){\n  const st=curSt();\n  const hit=applySingle(st,turn,m);\n  pts=st.pts;bar=st.bar;off=st.off;\n  consumeDie(m.die);\n  sel=bar[turn===W?'w':'b']>0?'bar':null;\n  if(hit)msg('ヒット!');\n  render();\n  // 勝利\n  if(off.w===15||off.b===15){finish();return;}\n  if(remainingDice().length===0){setTimeout(endTurn,400);return;}\n  const legal=legalNow();\n  if(!legal.length){msg('これ以上動かせません');setTimeout(endTurn,1000);return;}\n}\n\nfunction endTurn(){\n  if(over)return;\n  turn=turn===W?B:W;\n  rolled=false;sel=null;\n  render();\n  msg((turn===W?'白':'黒')+'の番です');\n  if(!isHumanTurn()){\n    setTimeout(cpuTurn,700);\n  }\n}\n\nfunction pushHistory(){\n  history.push({pts:pts.slice(),bar:{...bar},off:{...off},turn,dice:dice?dice.slice():null,\n    used:used?used.slice():null,rolled});\n  if(history.length>100)history.shift();\n}\n\n/* =================== CPU =================== */\nfunction evalSt(st,p){\n  // pの視点\n  const opp=p===W?B:W;\n  let s=0;\n  const myPip=(()=>{let t=0;for(let i=1;i<=24;i++){const n=p===W?Math.max(st.pts[i],0):Math.max(-st.pts[i],0);t+=n*(p===W?i:25-i);}t+=(p===W?st.bar.w:st.bar.b)*25;return t;})();\n  const opPip=(()=>{let t=0;for(let i=1;i<=24;i++){const n=opp===W?Math.max(st.pts[i],0):Math.max(-st.pts[i],0);t+=n*(opp===W?i:25-i);}t+=(opp===W?st.bar.w:st.bar.b)*25;return t;})();\n  s+=(opPip-myPip)*1.0;\n  s+=(p===W?st.off.w:st.off.b)*22;\n  s+=(p===W?st.bar.b:st.bar.w)*16;  // 相手をバーへ\n  s-=(p===W?st.bar.w:st.bar.b)*14;\n  for(let i=1;i<=24;i++){\n    const v=st.pts[i];\n    const mine=p===W?v:-v;\n    if(mine===1){\n      // ブロット: 相手陣に近いほど危険\n      const danger=p===W?(25-i):i;\n      s-=8+Math.max(0,12-danger*.5);\n    }\n    if(mine>=2){\n      s+=3;\n      const homept=p===W?i<=6:i>=19;\n      if(homept)s+=5;\n    }\n  }\n  return s;\n}\n\nfunction cpuTurn(){\n  if(over)return;\n  busy=true;\n  pushHistory();\n  rollDice();\n  msg(`黒のロール:${dice.length===4?dice[0]+'のゾロ目':dice[0]+'-'+dice[1]}`);\n  render();\n  setTimeout(()=>{\n    const{valid,maxLen}=genSequences(curSt(),B,dice.slice());\n    if(maxLen===0){\n      busy=false;msg('黒は動かせません — パス');\n      setTimeout(endTurn,1000);return;\n    }\n    let chosen;\n    if(mode==='cpu1'){\n      chosen=valid[Math.floor(Math.random()*valid.length)];\n    }else{\n      let bs=-Infinity;\n      for(const s of valid){\n        const v=evalSt(s.st,B)+Math.random()*2;\n        if(v>bs){bs=v;chosen=s;}\n      }\n    }\n    // 1手ずつアニメーション\n    let k=0;\n    function step(){\n      if(k<chosen.moves.length){\n        const m=chosen.moves[k++];\n        const st=curSt();\n        const hit=applySingle(st,B,m);\n        pts=st.pts;bar=st.bar;off=st.off;\n        consumeDie(m.die);\n        if(hit)msg('黒がヒット!');\n        render();\n        setTimeout(step,480);\n      }else{\n        busy=false;\n        if(off.b===15){finish();return;}\n        setTimeout(endTurn,420);\n      }\n    }\n    step();\n  },800);\n}\n\n/* =================== finish =================== */\nfunction finish(){\n  over=true;busy=false;\n  const winner=off.w===15?W:B;\n  const loser=winner===W?B:W;\n  const loserOff=winner===W?off.b:off.w;\n  let mult=1,label='シングル勝ち';\n  if(loserOff===0){\n    mult=2;label='ギャモン勝ち!';\n    // バックギャモン: 敗者が勝者ホームかバーに残存\n    const inWinnerHome=(()=>{\n      if(loser===B){for(let i=1;i<=6;i++)if(pts[i]<0)return true;return bar.b>0;}\n      else{for(let i=19;i<=24;i++)if(pts[i]>0)return true;return bar.w>0;}\n    })();\n    if(inWinnerHome){mult=3;label='バックギャモン勝ち!!';}\n  }\n  const t=document.getElementById('g-t');\n  if(mode==='pvp')t.textContent=winner===W?'白の勝ち':'黒の勝ち';\n  else t.textContent=winner===W?'勝利':'敗北';\n  document.getElementById('g-s').innerHTML=`${label}(${mult}点)<br>白 ${off.w} − 黒 ${off.b}`;\n  msg('対局終了');render();\n  setTimeout(()=>document.getElementById('gov').classList.add('show'),500);\n}\n\n/* =================== controls =================== */\ndocument.getElementById('undo').addEventListener('click',()=>{\n  if(!history.length||busy)return;\n  let h=history.pop();\n  if(mode!=='pvp'){while(history.length&&h.turn!==W)h=history.pop();}\n  pts=h.pts;bar=h.bar;off=h.off;turn=h.turn;\n  dice=h.dice;used=h.used;rolled=h.rolled;\n  over=false;sel=null;\n  document.getElementById('gov').classList.remove('show');\n  render();\n  msg((turn===W?'白':'黒')+'の番です');\n});\ndocument.getElementById('reset').addEventListener('click',init);\ndocument.getElementById('g-again').addEventListener('click',init);\ndocument.getElementById('modes').addEventListener('click',e=>{\n  const b=e.target.closest('button');if(!b)return;\n  mode=b.dataset.m;\n  document.querySelectorAll('#modes button').forEach(x=>x.classList.remove('on'));\n  b.classList.add('on');init();\n});\n\ninit();\n<\/script>\n<\/body>\n<\/html>\n";

SRC.checkers="<!DOCTYPE html>\n<html lang=\"ja\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0, user-scalable=no\">\n<title>チェッカー<\/title>\n<style>\n:root{\n  --bg:#1A1212;\n  --light:#E9D7B2;\n  --dark:#7A4A2B;\n  --frame:#3A241A;\n  --red:#C23B35;\n  --red-dk:#7E1F1B;\n  --blk:#33343C;\n  --blk-dk:#121318;\n  --txt:#EDE4D4;\n  --sub:#A2917D;\n  --gold:#D9A84A;\n  --sel:rgba(217,168,74,.85);\n}\n*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}\nbody{\n  background:var(--bg);color:var(--txt);\n  font-family:\"Hiragino Sans\",\"Yu Gothic UI\",\"Noto Sans JP\",sans-serif;\n  min-height:100vh;display:flex;flex-direction:column;align-items:center;\n  padding:16px 10px 32px;\n}\nh1{\n  font-family:\"Hiragino Mincho ProN\",\"Yu Mincho\",serif;\n  font-size:25px;font-weight:600;letter-spacing:.4em;text-indent:.4em;margin:4px 0 2px;\n}\n.sub{font-size:10.5px;color:var(--sub);letter-spacing:.22em;margin-bottom:12px}\n.modes{display:flex;gap:8px;margin-bottom:10px}\n.modes button{\n  background:transparent;border:1px solid #4a382c;color:var(--sub);\n  padding:7px 13px;border-radius:18px;font-size:12.5px;cursor:pointer;font-family:inherit;transition:all .2s;\n}\n.modes button.on{border-color:var(--gold);color:var(--gold)}\n\n.status{\n  width:min(96vw,420px);display:flex;justify-content:space-between;align-items:center;\n  font-size:12.5px;color:var(--sub);margin-bottom:8px;padding:0 4px;\n}\n.status b{color:var(--txt);font-variant-numeric:tabular-nums}\n.status .turn{color:var(--gold)}\n\n.bwrap{\n  padding:9px;border-radius:10px;\n  background:linear-gradient(160deg,#42291a,#241409);\n  box-shadow:0 14px 44px rgba(0,0,0,.6);\n}\nsvg{display:block;width:min(96vw,420px);height:auto}\n.sq{cursor:pointer}\n.pc{pointer-events:none}\n\n.msg{min-height:22px;font-size:13.5px;color:var(--gold);letter-spacing:.06em;margin-top:12px;text-align:center}\n.foot{display:flex;gap:10px;margin-top:10px}\n.foot button{\n  background:transparent;border:1px solid #4a382c;color:var(--txt);\n  padding:8px 18px;border-radius:6px;font-size:13px;cursor:pointer;font-family:inherit;\n}\n.foot button:hover{border-color:var(--gold)}\n.foot button:disabled{opacity:.35}\n\n.overlay{\n  position:fixed;inset:0;background:rgba(12,7,5,.84);\n  display:flex;align-items:center;justify-content:center;\n  opacity:0;pointer-events:none;transition:opacity .35s;z-index:20;\n}\n.overlay.show{opacity:1;pointer-events:auto}\n.card{\n  background:#251610;border:1px solid var(--gold);border-radius:10px;\n  padding:28px 42px;text-align:center;\n}\n.card .t{\n  font-family:\"Hiragino Mincho ProN\",\"Yu Mincho\",serif;\n  font-size:27px;letter-spacing:.22em;text-indent:.22em;color:var(--gold);margin-bottom:8px;\n}\n.card .s{font-size:13px;color:var(--sub);margin-bottom:18px}\n.card button{\n  background:var(--gold);border:none;color:#251610;padding:9px 26px;\n  border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;\n}\n@media (prefers-reduced-motion:reduce){*{transition:none!important}}\n<\/style>\n<\/head>\n<body>\n<h1>チェッカー<\/h1>\n<div class=\"sub\">CHECKERS — イングリッシュ・ドラフツ / 取れる時は必ず取る<\/div>\n\n<div class=\"modes\" id=\"modes\">\n  <button data-m=\"cpu1\" class=\"on\">CPU 弱<\/button>\n  <button data-m=\"cpu2\">CPU 強<\/button>\n  <button data-m=\"pvp\">2人対戦<\/button>\n<\/div>\n\n<div class=\"status\">\n  <span>🔴 赤 残り <b id=\"n0\">12<\/b><\/span>\n  <span class=\"turn\" id=\"tlabel\">赤の番です<\/span>\n  <span>⚫ 黒 残り <b id=\"n1\">12<\/b><\/span>\n<\/div>\n\n<div class=\"bwrap\"><svg id=\"bd\"><\/svg><\/div>\n\n<div class=\"msg\" id=\"msg\"><\/div>\n<div class=\"foot\">\n  <button id=\"undo\">待った<\/button>\n  <button id=\"reset\">最初から<\/button>\n<\/div>\n\n<div class=\"overlay\" id=\"gov\">\n  <div class=\"card\">\n    <div class=\"t\" id=\"g-t\">勝利<\/div>\n    <div class=\"s\" id=\"g-s\"><\/div>\n    <button id=\"g-again\">もう一度<\/button>\n  <\/div>\n<\/div>\n\n<script>\n/* ============ core ============ */\n/* board[64]: null | {o:0赤(下)/1黒(上), k:bool} */\nlet board,turn,mode='cpu1',history=[],over=false,busy=false;\nlet sel=null,chain=null,last=[-1,-1];\n\nconst idx=(r,c)=>r*8+c;\nconst inB=(r,c)=>r>=0&&r<8&&c>=0&&c<8;\n\nfunction init(){\n  board=new Array(64).fill(null);\n  for(let r=0;r<3;r++)for(let c=0;c<8;c++)if((r+c)%2===1)board[idx(r,c)]={o:1,k:false};\n  for(let r=5;r<8;r++)for(let c=0;c<8;c++)if((r+c)%2===1)board[idx(r,c)]={o:0,k:false};\n  turn=0;history=[];over=false;busy=false;sel=null;chain=null;last=[-1,-1];\n  document.getElementById('gov').classList.remove('show');\n  render();\n  msg('赤の番です');\n}\n\nfunction dirsOf(p){\n  if(p.k)return[[-1,-1],[-1,1],[1,-1],[1,1]];\n  return p.o===0?[[-1,-1],[-1,1]]:[[1,-1],[1,1]];\n}\n\nfunction jumpsFrom(bd,i){\n  const p=bd[i];if(!p)return[];\n  const r=Math.floor(i/8),c=i%8,out=[];\n  for(const[dr,dc]of dirsOf(p)){\n    const mr=r+dr,mc=c+dc,tr=r+2*dr,tc=c+2*dc;\n    if(!inB(tr,tc))continue;\n    const mid=bd[idx(mr,mc)];\n    if(mid&&mid.o!==p.o&&!bd[idx(tr,tc)])\n      out.push({to:idx(tr,tc),over:idx(mr,mc)});\n  }\n  return out;\n}\nfunction stepsFrom(bd,i){\n  const p=bd[i];if(!p)return[];\n  const r=Math.floor(i/8),c=i%8,out=[];\n  for(const[dr,dc]of dirsOf(p)){\n    const nr=r+dr,nc=c+dc;\n    if(inB(nr,nc)&&!bd[idx(nr,nc)])out.push({to:idx(nr,nc)});\n  }\n  return out;\n}\n\nfunction anyJump(bd,o){\n  for(let i=0;i<64;i++)if(bd[i]&&bd[i].o===o&&jumpsFrom(bd,i).length)return true;\n  return false;\n}\n\n/* 着手シーケンス列挙(探索用): {from, path:[to...], overs:[...], bd} */\nfunction genSeqs(bd,o){\n  const seqs=[];\n  const mustJump=anyJump(bd,o);\n  for(let i=0;i<64;i++){\n    const p=bd[i];\n    if(!p||p.o!==o)continue;\n    if(mustJump){\n      const rec=(b,pos,path,overs)=>{\n        const js=jumpsFrom(b,pos);\n        let ext=false;\n        for(const j of js){\n          const nb=b.map(x=>x?{...x}:null);\n          const pc=nb[pos];\n          nb[pos]=null;nb[j.over]=null;\n          let crowned=false;\n          const tr=Math.floor(j.to/8);\n          if(!pc.k&&((pc.o===0&&tr===0)||(pc.o===1&&tr===7))){nb[j.to]={o:pc.o,k:true};crowned=true;}\n          else nb[j.to]={...pc};\n          if(!crowned){\n            ext=true;\n            rec(nb,j.to,[...path,j.to],[...overs,j.over]);\n          }else{\n            seqs.push({from:i,path:[...path,j.to],overs:[...overs,j.over],bd:nb});\n            ext=true;\n          }\n        }\n        if(!ext&&path.length)seqs.push({from:i,path,overs,bd:b});\n      };\n      // recの末端処理: 上のロジックだと中間で続行可能でも末端だけ拾う形に修正\n      const rec2=(b,pos,path,overs)=>{\n        const js=jumpsFrom(b,pos);\n        if(!js.length){\n          if(path.length)seqs.push({from:i,path,overs,bd:b});\n          return;\n        }\n        for(const j of js){\n          const nb=b.map(x=>x?{...x}:null);\n          const pc=nb[pos];\n          nb[pos]=null;nb[j.over]=null;\n          const tr=Math.floor(j.to/8);\n          const crowned=!pc.k&&((pc.o===0&&tr===0)||(pc.o===1&&tr===7));\n          nb[j.to]={o:pc.o,k:pc.k||crowned};\n          if(crowned)seqs.push({from:i,path:[...path,j.to],overs:[...overs,j.over],bd:nb});\n          else rec2(nb,j.to,[...path,j.to],[...overs,j.over]);\n        }\n      };\n      rec2(bd,i,[],[]);\n    }else{\n      for(const s of stepsFrom(bd,i)){\n        const nb=bd.map(x=>x?{...x}:null);\n        const pc=nb[i];nb[i]=null;\n        const tr=Math.floor(s.to/8);\n        const crowned=!pc.k&&((pc.o===0&&tr===0)||(pc.o===1&&tr===7));\n        nb[s.to]={o:pc.o,k:pc.k||crowned};\n        seqs.push({from:i,path:[s.to],overs:[],bd:nb});\n      }\n    }\n  }\n  return seqs;\n}\n\n/* ============ UI ============ */\nconst NS='http://www.w3.org/2000/svg';\nconst svg=document.getElementById('bd');\nconst CELL=50,PAD=5;\nsvg.setAttribute('viewBox',`0 0 ${CELL*8+PAD*2} ${CELL*8+PAD*2}`);\nlet olEls=[],pcLayer;\n\n(function build(){\n  const defs=document.createElementNS(NS,'defs');\n  defs.innerHTML=`\n  <radialGradient id=\"pr\" cx=\".35\" cy=\".3\" r=\".9\"><stop offset=\"0\" stop-color=\"#e9776f\"/><stop offset=\"1\" stop-color=\"var(--red-dk)\"/><\/radialGradient>\n  <radialGradient id=\"pb\" cx=\".35\" cy=\".3\" r=\".9\"><stop offset=\"0\" stop-color=\"#565862\"/><stop offset=\"1\" stop-color=\"var(--blk-dk)\"/><\/radialGradient>`;\n  svg.appendChild(defs);\n  for(let i=0;i<64;i++){\n    const r=Math.floor(i/8),c=i%8;\n    const rc=document.createElementNS(NS,'rect');\n    rc.setAttribute('x',PAD+c*CELL);rc.setAttribute('y',PAD+r*CELL);\n    rc.setAttribute('width',CELL);rc.setAttribute('height',CELL);\n    rc.setAttribute('fill',(r+c)%2?'var(--dark)':'var(--light)');\n    rc.setAttribute('class','sq');\n    rc.addEventListener('click',()=>onSquare(i));\n    svg.appendChild(rc);\n  }\n  const ovG=document.createElementNS(NS,'g');\n  ovG.setAttribute('pointer-events','none');\n  svg.appendChild(ovG);\n  for(let i=0;i<64;i++){\n    const r=Math.floor(i/8),c=i%8;\n    const rc=document.createElementNS(NS,'rect');\n    rc.setAttribute('x',PAD+c*CELL);rc.setAttribute('y',PAD+r*CELL);\n    rc.setAttribute('width',CELL);rc.setAttribute('height',CELL);\n    rc.setAttribute('fill','transparent');\n    ovG.appendChild(rc);olEls[i]=rc;\n  }\n  pcLayer=document.createElementNS(NS,'g');\n  pcLayer.setAttribute('pointer-events','none');\n  svg.appendChild(pcLayer);\n})();\n\nfunction currentOptions(){\n  // chain中はその駒のジャンプのみ / 通常は強制取りを反映\n  if(chain)return jumpsFrom(board,chain).map(j=>({from:chain,...j,jump:true}));\n  const mustJump=anyJump(board,turn);\n  const out=[];\n  for(let i=0;i<64;i++){\n    const p=board[i];\n    if(!p||p.o!==turn)continue;\n    if(mustJump){\n      for(const j of jumpsFrom(board,i))out.push({from:i,...j,jump:true});\n    }else{\n      for(const s of stepsFrom(board,i))out.push({from:i,to:s.to,jump:false});\n    }\n  }\n  return out;\n}\n\nfunction render(){\n  pcLayer.innerHTML='';\n  const opts=(!over&&!busy&&isHuman())?currentOptions():[];\n  for(let i=0;i<64;i++){\n    let f='transparent';\n    if(i===last[0]||i===last[1])f='rgba(217,168,74,.25)';\n    olEls[i].setAttribute('fill',f);\n  }\n  if(sel!==null){\n    olEls[sel].setAttribute('fill','var(--sel)');\n    for(const o of opts.filter(o=>o.from===sel)){\n      olEls[o.to].setAttribute('fill',o.jump?'rgba(194,59,53,.45)':'rgba(217,168,74,.35)');\n    }\n  }else{\n    // 動かせる駒に印\n    const froms=new Set(opts.map(o=>o.from));\n    for(const i of froms){\n      const r=Math.floor(i/8),c=i%8;\n      const d=document.createElementNS(NS,'circle');\n      d.setAttribute('cx',PAD+c*CELL+CELL/2);\n      d.setAttribute('cy',PAD+r*CELL+8);\n      d.setAttribute('r',2.6);\n      d.setAttribute('fill','var(--gold)');\n      pcLayer.appendChild(d);\n    }\n  }\n  let n0=0,n1=0;\n  for(let i=0;i<64;i++){\n    const p=board[i];if(!p)continue;\n    p.o===0?n0++:n1++;\n    const r=Math.floor(i/8),c=i%8;\n    const cx=PAD+c*CELL+CELL/2,cy=PAD+r*CELL+CELL/2;\n    // 駒(積層感)\n    const base=document.createElementNS(NS,'circle');\n    base.setAttribute('cx',cx);base.setAttribute('cy',cy+2);\n    base.setAttribute('r',CELL*.38);\n    base.setAttribute('fill',p.o===0?'var(--red-dk)':'#000');\n    base.setAttribute('class','pc');\n    pcLayer.appendChild(base);\n    const top=document.createElementNS(NS,'circle');\n    top.setAttribute('cx',cx);top.setAttribute('cy',cy-1);\n    top.setAttribute('r',CELL*.38);\n    top.setAttribute('fill',p.o===0?'url(#pr)':'url(#pb)');\n    top.setAttribute('stroke','rgba(0,0,0,.45)');\n    top.setAttribute('stroke-width',1);\n    top.setAttribute('class','pc');\n    pcLayer.appendChild(top);\n    const ridge=document.createElementNS(NS,'circle');\n    ridge.setAttribute('cx',cx);ridge.setAttribute('cy',cy-1);\n    ridge.setAttribute('r',CELL*.27);\n    ridge.setAttribute('fill','none');\n    ridge.setAttribute('stroke','rgba(255,255,255,.22)');\n    ridge.setAttribute('stroke-width',1.4);\n    ridge.setAttribute('class','pc');\n    pcLayer.appendChild(ridge);\n    if(p.k){\n      const cr=document.createElementNS(NS,'text');\n      cr.setAttribute('x',cx);cr.setAttribute('y',cy+5);\n      cr.setAttribute('text-anchor','middle');\n      cr.setAttribute('font-size',15);\n      cr.setAttribute('fill','var(--gold)');\n      cr.setAttribute('class','pc');\n      cr.textContent='♛';\n      pcLayer.appendChild(cr);\n    }\n  }\n  document.getElementById('n0').textContent=n0;\n  document.getElementById('n1').textContent=n1;\n  document.getElementById('tlabel').textContent=over?'対局終了':(turn===0?'赤の番です':'黒の番です');\n  document.getElementById('undo').disabled=!history.length||busy||over||!!chain;\n}\n\nfunction msg(s){document.getElementById('msg').textContent=s;}\nconst isHuman=()=>mode==='pvp'||turn===0;\n\nfunction onSquare(i){\n  if(over||busy||!isHuman())return;\n  const opts=currentOptions();\n  if(sel!==null){\n    const mv=opts.find(o=>o.from===sel&&o.to===i);\n    if(mv){\n      if(!chain)pushHistory();\n      execStep(mv);\n      return;\n    }\n  }\n  if(chain)return; // チェーン中は他の駒不可\n  const p=board[i];\n  if(p&&p.o===turn&&opts.some(o=>o.from===i)){sel=i;render();}\n  else{sel=null;render();}\n}\n\nfunction pushHistory(){\n  history.push({bd:board.map(p=>p?{...p}:null),turn,last:[...last]});\n  if(history.length>200)history.shift();\n}\n\nfunction execStep(mv){\n  const p=board[mv.from];\n  board[mv.from]=null;\n  if(mv.jump)board[mv.over]=null;\n  const tr=Math.floor(mv.to/8);\n  const crowned=!p.k&&((p.o===0&&tr===0)||(p.o===1&&tr===7));\n  board[mv.to]={o:p.o,k:p.k||crowned};\n  last=[mv.from,mv.to];\n  // 連続ジャンプ?\n  if(mv.jump&&!crowned&&jumpsFrom(board,mv.to).length){\n    chain=mv.to;sel=mv.to;\n    render();\n    msg('連続ジャンプ!続けて取ってください');\n    return;\n  }\n  chain=null;sel=null;\n  endTurnOrContinue(crowned);\n}\n\nfunction endTurnOrContinue(crowned){\n  turn=1-turn;\n  render();\n  const opts=currentOptions.call(null);\n  // 相手の合法手チェック(currentOptionsはhuman判定を含むため直接生成)\n  const seqs=genSeqs(board,turn);\n  if(seqs.length===0){\n    over=true;render();\n    const w=1-turn;\n    const t=document.getElementById('g-t');\n    if(mode==='pvp')t.textContent=w===0?'赤の勝ち':'黒の勝ち';\n    else t.textContent=w===0?'勝利':'敗北';\n    document.getElementById('g-s').textContent=turn===0?'赤は動けません':'黒は動けません';\n    msg('対局終了');\n    setTimeout(()=>document.getElementById('gov').classList.add('show'),500);\n    return;\n  }\n  msg((turn===0?'赤':'黒')+'の番です'+(crowned?'(キング誕生!)':'')+(anyJump(board,turn)?' — 取る手があります':''));\n  if(!isHuman()){\n    busy=true;render();\n    setTimeout(cpuTurn,520);\n  }\n}\n\n/* ============ CPU ============ */\nfunction evalBd(bd){\n  // 黒視点プラス\n  let s=0;\n  for(let i=0;i<64;i++){\n    const p=bd[i];if(!p)continue;\n    const r=Math.floor(i/8);\n    let v=p.k?160:100;\n    if(!p.k)v+=p.o===1?r*3:(7-r)*3; // 前進\n    // バックロー防衛\n    if(!p.k&&((p.o===1&&r===0)||(p.o===0&&r===7)))v+=6;\n    s+=p.o===1?v:-v;\n  }\n  return s;\n}\n\nfunction negamax(bd,o,depth,a,b){\n  const seqs=genSeqs(bd,o);\n  if(!seqs.length)return -50000-depth;\n  if(depth===0)return o===1?evalBd(bd):-evalBd(bd);\n  // ジャンプは延長気味に\n  let best=-Infinity;\n  seqs.sort((x,y)=>y.overs.length-x.overs.length);\n  for(const s of seqs){\n    const v=-negamax(s.bd,1-o,depth-1,-b,-a);\n    if(v>best)best=v;\n    if(best>a)a=best;\n    if(a>=b)break;\n  }\n  return best;\n}\n\nfunction cpuTurn(){\n  const seqs=genSeqs(board,turn);\n  let pick;\n  if(mode==='cpu1'){\n    seqs.sort((x,y)=>y.overs.length-x.overs.length);\n    const maxCap=seqs[0].overs.length;\n    const pool=maxCap>0?seqs.filter(s=>s.overs.length===maxCap):seqs;\n    pick=pool[Math.floor(Math.random()*pool.length)];\n  }else{\n    let bs=-Infinity;\n    for(const s of seqs){\n      const v=-negamax(s.bd,1-turn,7,-Infinity,Infinity)+Math.random()*4;\n      if(v>bs){bs=v;pick=s;}\n    }\n  }\n  // シーケンスを1ステップずつ再生\n  pushHistory();\n  let pos=pick.from,k=0;\n  function step(){\n    if(k>=pick.path.length){\n      busy=false;chain=null;sel=null;\n      endTurnOrContinue(false);\n      return;\n    }\n    const to=pick.path[k],over_=pick.overs[k];\n    const p=board[pos];\n    board[pos]=null;\n    if(over_!==undefined&&over_!==null&&pick.overs.length>k)board[pick.overs[k]]=null;\n    const tr=Math.floor(to/8);\n    const crowned=!p.k&&((p.o===0&&tr===0)||(p.o===1&&tr===7));\n    board[to]={o:p.o,k:p.k||crowned};\n    last=[pos,to];\n    pos=to;k++;\n    render();\n    setTimeout(step,380);\n  }\n  step();\n}\n\n/* ============ controls ============ */\ndocument.getElementById('undo').addEventListener('click',()=>{\n  if(!history.length||busy||chain)return;\n  let h=history.pop();\n  if(mode!=='pvp'){while(history.length&&h.turn!==0)h=history.pop();}\n  board=h.bd;turn=h.turn;last=h.last;over=false;sel=null;chain=null;\n  document.getElementById('gov').classList.remove('show');\n  render();\n  msg((turn===0?'赤':'黒')+'の番です');\n});\ndocument.getElementById('reset').addEventListener('click',init);\ndocument.getElementById('g-again').addEventListener('click',init);\ndocument.getElementById('modes').addEventListener('click',e=>{\n  const b=e.target.closest('button');if(!b)return;\n  mode=b.dataset.m;\n  document.querySelectorAll('#modes button').forEach(x=>x.classList.remove('on'));\n  b.classList.add('on');init();\n});\n\ninit();\n<\/script>\n<\/body>\n<\/html>\n";

SRC.geister="<!DOCTYPE html>\n<html lang=\"ja\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0, user-scalable=no\">\n<title>ガイスター<\/title>\n<style>\n:root{\n  --bg:#14101A;\n  --board:#241D33;\n  --cell:#2E2545;\n  --cell-b:#1C1530;\n  --blue:#4D8FE0;\n  --blue-dk:#2A5FA8;\n  --red:#D6454E;\n  --red-dk:#992730;\n  --gray:#787E92;\n  --gray-dk:#4C5163;\n  --txt:#E9E4F2;\n  --sub:#9A93AD;\n  --gold:#D9B44A;\n  --sel:rgba(217,180,74,.85);\n}\n*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}\nbody{\n  background:var(--bg);color:var(--txt);\n  font-family:\"Hiragino Sans\",\"Yu Gothic UI\",\"Noto Sans JP\",sans-serif;\n  min-height:100vh;display:flex;flex-direction:column;align-items:center;\n  padding:16px 10px 32px;\n}\nh1{\n  font-family:\"Hiragino Mincho ProN\",\"Yu Mincho\",serif;\n  font-size:25px;font-weight:600;letter-spacing:.45em;text-indent:.45em;margin:4px 0 2px;\n}\n.sub{font-size:10.5px;color:var(--sub);letter-spacing:.22em;margin-bottom:10px}\n.modes{display:flex;gap:8px;margin-bottom:10px}\n.modes button{\n  background:transparent;border:1px solid #3c3454;color:var(--sub);\n  padding:6px 12px;border-radius:18px;font-size:12px;cursor:pointer;font-family:inherit;transition:all .2s;\n}\n.modes button.on{border-color:var(--gold);color:var(--gold)}\n\n.trays{\n  width:min(96vw,420px);display:flex;justify-content:space-between;\n  font-size:11.5px;color:var(--sub);margin-bottom:8px;\n}\n.trays .t{display:flex;align-items:center;gap:5px;flex-wrap:wrap}\n.mini{width:14px;height:15px;display:inline-block}\n\n.bwrap{\n  padding:9px;border-radius:12px;\n  background:linear-gradient(160deg,#2c2342,#181226);\n  box-shadow:0 16px 48px rgba(0,0,0,.6);\n}\nsvg{display:block;width:min(96vw,420px);height:auto}\n.cell{cursor:pointer}\n.gh{pointer-events:none}\n.exit-mark{pointer-events:none;opacity:.8}\n\n.msg{min-height:38px;font-size:13.5px;color:var(--gold);letter-spacing:.05em;margin-top:10px;text-align:center;line-height:1.5}\n.foot{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;justify-content:center}\n.foot button{\n  background:transparent;border:1px solid #3c3454;color:var(--txt);\n  padding:8px 16px;border-radius:6px;font-size:13px;cursor:pointer;font-family:inherit;\n}\n.foot button:hover{border-color:var(--gold)}\n.foot button:disabled{opacity:.35}\n.foot button.primary{background:var(--gold);color:#181226;border-color:var(--gold);font-weight:600}\n\n.overlay{\n  position:fixed;inset:0;background:rgba(10,7,16,.92);\n  display:flex;align-items:center;justify-content:center;\n  opacity:0;pointer-events:none;transition:opacity .3s;z-index:20;\n}\n.overlay.show{opacity:1;pointer-events:auto}\n.card{\n  background:#1E1730;border:1px solid var(--gold);border-radius:10px;\n  padding:28px 40px;text-align:center;max-width:88vw;\n}\n.card .t{\n  font-family:\"Hiragino Mincho ProN\",\"Yu Mincho\",serif;\n  font-size:25px;letter-spacing:.2em;text-indent:.2em;color:var(--gold);margin-bottom:8px;\n}\n.card .s{font-size:13.5px;color:var(--txt);margin-bottom:18px;line-height:1.8}\n.card button{\n  background:var(--gold);border:none;color:#1E1730;padding:10px 28px;\n  border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;\n}\n@media (prefers-reduced-motion:reduce){*{transition:none!important}}\n<\/style>\n<\/head>\n<body>\n<h1>ガイスター<\/h1>\n<div class=\"sub\">GEISTER — 良いおばけ(青)と悪いおばけ(赤)<\/div>\n\n<div class=\"modes\" id=\"modes\">\n  <button data-m=\"cpu1\" class=\"on\">CPU 弱<\/button>\n  <button data-m=\"cpu2\">CPU 強<\/button>\n  <button data-m=\"pvp\">2人対戦<\/button>\n<\/div>\n\n<div class=\"trays\">\n  <div class=\"t\" id=\"tray0\"><span>あなたが取った:<\/span><\/div>\n  <div class=\"t\" id=\"tray1\"><span>相手が取った:<\/span><\/div>\n<\/div>\n\n<div class=\"bwrap\"><svg id=\"bd\"><\/svg><\/div>\n\n<div class=\"msg\" id=\"msg\"><\/div>\n<div class=\"foot\" id=\"foot\">\n  <button id=\"setup-ok\" class=\"primary\" style=\"display:none\">この配置で開始<\/button>\n  <button id=\"setup-rnd\" style=\"display:none\">ランダム配置<\/button>\n  <button id=\"exitbtn\" class=\"primary\" style=\"display:none\">脱出する!<\/button>\n  <button id=\"undo\">待った<\/button>\n  <button id=\"reset\">最初から<\/button>\n<\/div>\n\n<div class=\"overlay\" id=\"hov\">\n  <div class=\"card\">\n    <div class=\"t\" id=\"h-t\">交代<\/div>\n    <div class=\"s\" id=\"h-s\">端末を渡してください<\/div>\n    <button id=\"h-ok\">準備OK<\/button>\n  <\/div>\n<\/div>\n\n<div class=\"overlay\" id=\"gov\">\n  <div class=\"card\">\n    <div class=\"t\" id=\"g-t\">勝利<\/div>\n    <div class=\"s\" id=\"g-s\"><\/div>\n    <button id=\"g-again\">もう一度<\/button>\n  <\/div>\n<\/div>\n\n<script>\n/* =============== state =============== */\nconst N=6;\nlet mode='cpu1';\nlet pieces;          // {id,r,c,o,col:'B'|'R',cap:false}\nlet turn,phase;      // phase: 'setup'|'play'|'over'\nlet setupPlayer;     // pvp用\nlet sel=null,busy=false,history=[],lastMove=null;\nlet viewer=0;        // pvp: 今色が見えているプレイヤー\n\nconst EXITS=o=>o===0?[[0,0],[0,N-1]]:[[N-1,0],[N-1,N-1]];\n\nfunction at(r,c){return pieces.find(p=>!p.cap&&p.r===r&&p.c===c)||null;}\nfunction capturedBy(taker){ // takerが取った相手駒\n  return pieces.filter(p=>p.cap&&p.o!==taker);\n}\n\nfunction init(){\n  pieces=[];\n  let id=0;\n  // 上側(o=1): rows0-1 cols1-4 / 下側(o=0): rows4-5 cols1-4\n  for(const o of[1,0]){\n    const rows=o===1?[0,1]:[4,5];\n    let k=0;\n    for(const r of rows)for(let c=1;c<=4;c++){\n      pieces.push({id:id++,r,c,o,col:k%2===0?'B':'R',cap:false});\n      k++;\n    }\n  }\n  // CPU側はランダム配置\n  if(mode!=='pvp')assignRandom(1);\n  turn=0;sel=null;busy=false;history=[];lastMove=null;\n  phase='setup';setupPlayer=0;viewer=0;\n  document.getElementById('gov').classList.remove('show');\n  document.getElementById('hov').classList.remove('show');\n  uiPhase();\n  render();\n}\n\nfunction assignRandom(o){\n  const mine=pieces.filter(p=>p.o===o);\n  const cols=['B','B','B','B','R','R','R','R'];\n  for(let i=cols.length-1;i>0;i--){\n    const j=Math.floor(Math.random()*(i+1));\n    [cols[i],cols[j]]=[cols[j],cols[i]];\n  }\n  mine.forEach((p,k)=>p.col=cols[k]);\n}\n\nfunction uiPhase(){\n  const isSetup=phase==='setup';\n  document.getElementById('setup-ok').style.display=isSetup?'':'none';\n  document.getElementById('setup-rnd').style.display=isSetup?'':'none';\n  document.getElementById('undo').style.display=isSetup?'none':'';\n  if(isSetup){\n    const who=mode==='pvp'?(setupPlayer===0?'下側':'上側'):'あなた';\n    msg(`【配置】${who}の駒をタップして青↔赤を切替(青4・赤4)。青は相手陣の角から脱出させると勝ち。`);\n  }\n}\n\n/* =============== rules =============== */\nfunction legalMovesOf(p){\n  const out=[];\n  for(const[dr,dc]of[[-1,0],[1,0],[0,-1],[0,1]]){\n    const r=p.r+dr,c=p.c+dc;\n    if(r<0||r>=N||c<0||c>=N)continue;\n    const q=at(r,c);\n    if(q&&q.o===p.o)continue;\n    out.push({r,c,cap:!!q});\n  }\n  return out;\n}\nfunction canExit(p){\n  if(p.col!=='B')return false;\n  return EXITS(p.o).some(([r,c])=>p.r===r&&p.c===c);\n}\n\nfunction checkWin(){\n  // 1. 相手の青4つ捕獲 → 捕獲者勝ち\n  // 2. 自分の赤4つ全部取られた → 自分の勝ち\n  for(const o of[0,1]){\n    const taken=capturedBy(o);\n    const blues=taken.filter(p=>p.col==='B').length;\n    const reds=taken.filter(p=>p.col==='R').length;\n    if(blues>=4)return{winner:o,how:'相手の青おばけを4つ捕獲'};\n    if(reds>=4)return{winner:1-o,how:'赤おばけを4つ全て取らせた(罠成立)'};\n  }\n  return null;\n}\n\n/* =============== render =============== */\nconst NS='http://www.w3.org/2000/svg';\nconst svg=document.getElementById('bd');\nconst CELL=64,PAD=10;\nconst S=CELL*N+PAD*2;\nsvg.setAttribute('viewBox',`0 0 ${S} ${S}`);\nlet cellEls=[],ghLayer,hlLayer;\n\n(function build(){\n  const bg=document.createElementNS(NS,'rect');\n  bg.setAttribute('width',S);bg.setAttribute('height',S);\n  bg.setAttribute('fill','var(--board)');bg.setAttribute('rx',8);\n  svg.appendChild(bg);\n  for(let i=0;i<N*N;i++){\n    const r=Math.floor(i/N),c=i%N;\n    const rc=document.createElementNS(NS,'rect');\n    rc.setAttribute('x',PAD+c*CELL+2);rc.setAttribute('y',PAD+r*CELL+2);\n    rc.setAttribute('width',CELL-4);rc.setAttribute('height',CELL-4);\n    rc.setAttribute('rx',6);\n    rc.setAttribute('fill',(r+c)%2?'var(--cell)':'var(--cell-b)');\n    rc.setAttribute('class','cell');\n    rc.addEventListener('click',()=>onCell(r,c));\n    svg.appendChild(rc);\n    cellEls[i]=rc;\n  }\n  // 脱出口マーク(矢印)\n  for(const o of[0,1]){\n    for(const[r,c]of EXITS(o)){\n      const t=document.createElementNS(NS,'text');\n      t.setAttribute('x',PAD+c*CELL+CELL/2);\n      t.setAttribute('y',o===0?PAD+r*CELL+13:PAD+r*CELL+CELL-5);\n      t.setAttribute('text-anchor','middle');\n      t.setAttribute('font-size',11);\n      t.setAttribute('fill','var(--gold)');\n      t.setAttribute('class','exit-mark');\n      t.textContent=o===0?'⬆出口':'⬇出口';\n      svg.appendChild(t);\n    }\n  }\n  hlLayer=document.createElementNS(NS,'g');svg.appendChild(hlLayer);\n  ghLayer=document.createElementNS(NS,'g');svg.appendChild(ghLayer);\n})();\n\nfunction ghostPath(cx,cy,s){\n  const w=s*.62,h=s*.66;\n  const x0=cx-w/2,y0=cy-h/2+2;\n  return `M${x0},${cy+h/2-4}\n    L${x0},${y0+w/2}\n    A${w/2},${w/2} 0 0 1 ${x0+w},${y0+w/2}\n    L${x0+w},${cy+h/2-4}\n    L${x0+w*5/6},${cy+h/2-10}\n    L${x0+w*4/6},${cy+h/2-4}\n    L${x0+w*3/6},${cy+h/2-10}\n    L${x0+w*2/6},${cy+h/2-4}\n    L${x0+w*1/6},${cy+h/2-10}\n    Z`;\n}\n\nfunction visibleColor(p){\n  // 観戦者(viewer)に見える色\n  if(p.cap)return p.col;                      // 捕獲駒は公開\n  if(mode==='pvp')return p.o===viewer?p.col:null;\n  return p.o===0?p.col:null;                  // CPU戦: 自分の駒のみ\n}\n\nfunction drawGhost(g,cx,cy,size,col,o,selected){\n  const body=document.createElementNS(NS,'path');\n  body.setAttribute('d',ghostPath(cx,cy,size));\n  const fill=col==='B'?'url(#gB)':col==='R'?'url(#gR)':'url(#gG)';\n  body.setAttribute('fill',fill);\n  body.setAttribute('stroke',selected?'var(--sel)':'rgba(0,0,0,.5)');\n  body.setAttribute('stroke-width',selected?2.6:1.2);\n  g.appendChild(body);\n  // 目\n  for(const dx of[-6,6]){\n    const e=document.createElementNS(NS,'circle');\n    e.setAttribute('cx',cx+dx);e.setAttribute('cy',cy-4);\n    e.setAttribute('r',3.4);e.setAttribute('fill','#fff');\n    g.appendChild(e);\n    const pu=document.createElementNS(NS,'circle');\n    pu.setAttribute('cx',cx+dx);\n    pu.setAttribute('cy',cy-4+(o===1?1.4:-0.6));\n    pu.setAttribute('r',1.6);pu.setAttribute('fill','#1a1a22');\n    g.appendChild(pu);\n  }\n  if(!col){\n    const q=document.createElementNS(NS,'text');\n    q.setAttribute('x',cx);q.setAttribute('y',cy+12);\n    q.setAttribute('text-anchor','middle');\n    q.setAttribute('font-size',11);q.setAttribute('font-weight','700');\n    q.setAttribute('fill','#cfd3e0');\n    q.textContent='?';\n    g.appendChild(q);\n  }\n}\n\nfunction render(){\n  if(!svg.querySelector('defs')){\n    const defs=document.createElementNS(NS,'defs');\n    defs.innerHTML=`\n    <radialGradient id=\"gB\" cx=\".35\" cy=\".3\" r=\".95\"><stop offset=\"0\" stop-color=\"#7fb3f0\"/><stop offset=\"1\" stop-color=\"var(--blue-dk)\"/><\/radialGradient>\n    <radialGradient id=\"gR\" cx=\".35\" cy=\".3\" r=\".95\"><stop offset=\"0\" stop-color=\"#ef8086\"/><stop offset=\"1\" stop-color=\"var(--red-dk)\"/><\/radialGradient>\n    <radialGradient id=\"gG\" cx=\".35\" cy=\".3\" r=\".95\"><stop offset=\"0\" stop-color=\"#9aa0b5\"/><stop offset=\"1\" stop-color=\"var(--gray-dk)\"/><\/radialGradient>`;\n    svg.appendChild(defs);\n  }\n  ghLayer.innerHTML='';hlLayer.innerHTML='';\n  // 移動先ハイライト\n  if(sel&&phase==='play'){\n    for(const m of legalMovesOf(sel)){\n      const rc=document.createElementNS(NS,'rect');\n      rc.setAttribute('x',PAD+m.c*CELL+4);rc.setAttribute('y',PAD+m.r*CELL+4);\n      rc.setAttribute('width',CELL-8);rc.setAttribute('height',CELL-8);\n      rc.setAttribute('rx',6);\n      rc.setAttribute('fill',m.cap?'rgba(214,69,78,.3)':'rgba(217,180,74,.22)');\n      rc.setAttribute('stroke','var(--sel)');rc.setAttribute('stroke-width',2);\n      hlLayer.appendChild(rc);\n    }\n  }\n  if(lastMove){\n    const rc=document.createElementNS(NS,'rect');\n    rc.setAttribute('x',PAD+lastMove.c*CELL+2);rc.setAttribute('y',PAD+lastMove.r*CELL+2);\n    rc.setAttribute('width',CELL-4);rc.setAttribute('height',CELL-4);\n    rc.setAttribute('rx',6);rc.setAttribute('fill','none');\n    rc.setAttribute('stroke','rgba(217,180,74,.45)');rc.setAttribute('stroke-width',2);\n    hlLayer.appendChild(rc);\n  }\n  // 駒\n  for(const p of pieces){\n    if(p.cap)continue;\n    const g=document.createElementNS(NS,'g');\n    g.setAttribute('class','gh');\n    const cx=PAD+p.c*CELL+CELL/2,cy=PAD+p.r*CELL+CELL/2;\n    drawGhost(g,cx,cy,CELL,visibleColor(p),p.o,sel===p);\n    ghLayer.appendChild(g);\n  }\n  // トレー\n  for(const taker of[0,1]){\n    const el=document.getElementById('tray'+taker);\n    el.querySelectorAll('svg').forEach(x=>x.remove());\n    for(const p of capturedBy(taker)){\n      const mini=document.createElementNS(NS,'svg');\n      mini.setAttribute('viewBox','0 0 30 32');\n      mini.setAttribute('class','mini');\n      const g=document.createElementNS(NS,'g');\n      drawGhost(g,15,16,30,p.col,p.o,false);\n      mini.appendChild(g);\n      el.appendChild(mini);\n    }\n  }\n  // 脱出ボタン\n  const eb=document.getElementById('exitbtn');\n  eb.style.display=(phase==='play'&&sel&&canExit(sel)&&isHumanSide(sel.o))?'':'none';\n  document.getElementById('undo').disabled=!history.length||busy||phase!=='play';\n}\n\nfunction msg(s){document.getElementById('msg').textContent=s;}\nfunction isHumanSide(o){return mode==='pvp'||o===0;}\n\n/* =============== input =============== */\nfunction onCell(r,c){\n  if(busy)return;\n  if(phase==='setup'){\n    const p=at(r,c);\n    const o=mode==='pvp'?setupPlayer:0;\n    if(p&&p.o===o){\n      p.col=p.col==='B'?'R':'B';\n      render();\n    }\n    return;\n  }\n  if(phase!=='play')return;\n  if(!isHumanSide(turn))return;\n  if(mode==='pvp'&&viewer!==turn)return;\n  const p=at(r,c);\n  if(sel){\n    const m=legalMovesOf(sel).find(m=>m.r===r&&m.c===c);\n    if(m){\n      pushHistory();\n      execMove(sel,m);\n      return;\n    }\n  }\n  if(p&&p.o===turn){sel=p;render();}\n  else{sel=null;render();}\n}\n\ndocument.getElementById('setup-rnd').addEventListener('click',()=>{\n  if(phase!=='setup')return;\n  assignRandom(mode==='pvp'?setupPlayer:0);\n  render();\n});\n\ndocument.getElementById('setup-ok').addEventListener('click',()=>{\n  if(phase!=='setup')return;\n  const o=mode==='pvp'?setupPlayer:0;\n  const mine=pieces.filter(p=>p.o===o);\n  const b=mine.filter(p=>p.col==='B').length;\n  if(b!==4){msg(`青4・赤4にしてください(現在 青${b})`);return;}\n  if(mode==='pvp'&&setupPlayer===0){\n    setupPlayer=1;viewer=1;\n    handoff('上側の配置','端末を上側プレイヤーに渡してください',()=>{render();uiPhase();});\n    return;\n  }\n  phase='play';turn=0;viewer=0;\n  uiPhase();\n  if(mode==='pvp'){\n    handoff('対局開始','下側プレイヤーの番です',()=>{render();msg('下側の番です');});\n  }else{\n    render();msg('あなたの番です。青を上の角まで運ぶか、相手の青を4つ取れば勝ち。');\n  }\n});\n\ndocument.getElementById('exitbtn').addEventListener('click',()=>{\n  if(!sel||!canExit(sel))return;\n  pushHistory();\n  finish(sel.o,'青おばけが脱出に成功');\n});\n\n/* =============== move / flow =============== */\nfunction pushHistory(){\n  history.push({pieces:pieces.map(p=>({...p})),turn,last:lastMove?{...lastMove}:null});\n  if(history.length>100)history.shift();\n}\n\nfunction execMove(p,m){\n  const q=at(m.r,m.c);\n  let capMsg='';\n  if(q){\n    q.cap=true;\n    capMsg=q.col==='B'?'捕獲 — 青でした!':'捕獲 — 赤でした…';\n  }\n  p.r=m.r;p.c=m.c;\n  lastMove={r:m.r,c:m.c};\n  sel=null;\n  const w=checkWin();\n  if(w){render();finish(w.winner,w.how);return;}\n  turn=1-turn;\n  render();\n  if(mode==='pvp'){\n    viewer=-1;render(); // 受け渡し中は両者非公開\n    handoff((turn===0?'下側':'上側')+'の番',capMsg||'端末を渡してください',()=>{\n      viewer=turn;render();\n      msg((turn===0?'下側':'上側')+'の番です'+(capMsg?' / '+capMsg:''));\n    });\n    return;\n  }\n  msg(capMsg?capMsg+' — CPUの番です':'CPUの番です');\n  busy=true;render();\n  setTimeout(cpuTurn,650);\n}\n\nfunction handoff(title,sub,cb){\n  document.getElementById('h-t').textContent=title;\n  document.getElementById('h-s').textContent=sub;\n  document.getElementById('hov').classList.add('show');\n  const ok=document.getElementById('h-ok');\n  const fn=()=>{\n    document.getElementById('hov').classList.remove('show');\n    ok.removeEventListener('click',fn);\n    cb();\n  };\n  ok.addEventListener('click',fn);\n}\n\nfunction finish(winner,how){\n  phase='over';busy=false;\n  const t=document.getElementById('g-t');\n  if(mode==='pvp')t.textContent=winner===0?'下側の勝ち':'上側の勝ち';\n  else t.textContent=winner===0?'勝利':'敗北';\n  // 全駒公開\n  viewer=-2;\n  document.getElementById('g-s').textContent=how;\n  msg('対局終了 — 全ての正体を公開');\n  // 公開レンダリング\n  const origVisible=visibleColor;\n  render();\n  ghLayer.innerHTML='';\n  for(const p of pieces){\n    if(p.cap)continue;\n    const g=document.createElementNS(NS,'g');\n    drawGhost(g,PAD+p.c*CELL+CELL/2,PAD+p.r*CELL+CELL/2,CELL,p.col,p.o,false);\n    ghLayer.appendChild(g);\n  }\n  setTimeout(()=>document.getElementById('gov').classList.add('show'),700);\n}\n\n/* =============== CPU(非チート:人間の駒色は捕獲済み以外参照しない) =============== */\nfunction humanBlueProb(){\n  const unknown=pieces.filter(p=>p.o===0&&!p.cap);\n  const capturedHuman=pieces.filter(p=>p.o===0&&p.cap);\n  const bluesTaken=capturedHuman.filter(p=>p.col==='B').length;\n  const bluesLeft=4-bluesTaken;\n  return unknown.length?bluesLeft/unknown.length:0;\n}\n\nfunction cpuTurn(){\n  if(phase!=='play'){busy=false;return;}\n  const mine=pieces.filter(p=>p.o===1&&!p.cap);\n  // 即脱出\n  for(const p of mine){\n    if(canExit(p)){busy=false;finish(1,'CPUの青おばけが脱出');return;}\n  }\n  const cand=[];\n  const pBlue=humanBlueProb();\n  const takenReds=capturedBy(1).filter(p=>p.col==='R').length;\n  const takenBlues=capturedBy(1).filter(p=>p.col==='B').length;\n  for(const p of mine){\n    for(const m of legalMovesOf(p)){\n      let sc=Math.random()*3;\n      const q=at(m.r,m.c);\n      if(q){\n        // 期待値: 青なら+、赤なら−(4個目の赤=即敗北)\n        let capEV=pBlue*30-(1-pBlue)*22;\n        if(takenBlues===3)capEV+=pBlue*200;       // 青4個目なら勝ち\n        if(takenReds===3)capEV-=(1-pBlue)*400;    // 赤4個目なら負け\n        // 自陣出口に迫る駒は色に関係なく排除価値が高い\n        const nearExit=EXITS(1).some(([er,ec])=>Math.abs(q.r-er)+Math.abs(q.c-ec)<=1);\n        if(nearExit)capEV+=45;\n        sc+=capEV;\n      }\n      if(p.col==='B'){\n        // 青は出口へ前進(最寄りの下角)\n        const d0=Math.min(...EXITS(1).map(([er,ec])=>Math.abs(p.r-er)+Math.abs(p.c-ec)));\n        const d1=Math.min(...EXITS(1).map(([er,ec])=>Math.abs(m.r-er)+Math.abs(m.c-ec)));\n        sc+=(d0-d1)*9;\n        // 移動先が人間駒の隣 = 取られるリスク\n        let adj=0;\n        for(const[dr,dc]of[[-1,0],[1,0],[0,-1],[0,1]]){\n          const q2=at(m.r+dr,m.c+dc);\n          if(q2&&q2.o===0)adj++;\n        }\n        sc-=adj*8;\n        if(takenReds===3)sc-=adj*10; // 取られたら相手は躊躇しない状況等は簡略化\n      }else{\n        // 赤は囮: 人間駒に隣接すると取られチャンス(取られたら自分に有利)\n        let adj=0;\n        for(const[dr,dc]of[[-1,0],[1,0],[0,-1],[0,1]]){\n          const q2=at(m.r+dr,m.c+dc);\n          if(q2&&q2.o===0)adj++;\n        }\n        const myRedsTaken=capturedBy(0).filter(x=>x.col==='R').length;\n        sc+=adj*(myRedsTaken===3?60:6); // 赤4個目を取らせれば勝ち\n        sc+=(m.r-p.r)*2; // 前進で青っぽく見せる\n      }\n      // 自陣出口の防衛: 人間駒が角にいるなら最優先で対処\n      for(const[er,ec]of EXITS(1)){\n        const onCorner=at(er,ec);\n        if(onCorner&&onCorner.o===0&&m.r===er&&m.c===ec)sc+=150;\n      }\n      cand.push([sc,p,m]);\n    }\n  }\n  if(!cand.length){busy=false;finish(0,'CPUが動けません');return;}\n  cand.sort((a,b)=>b[0]-a[0]);\n  let pick;\n  if(mode==='cpu1'){\n    const top=cand.slice(0,Math.min(10,cand.length));\n    pick=top[Math.floor(Math.random()*top.length)];\n  }else pick=cand[0];\n  const[,p,m]=pick;\n  busy=false;\n  pushHistory();\n  // execMoveはturn=1のまま処理\n  const q=at(m.r,m.c);\n  let capMsg='';\n  if(q){q.cap=true;capMsg=q.col==='B'?'CPUがあなたの青を捕獲!':'CPUがあなたの赤を捕獲(しめしめ)';}\n  p.r=m.r;p.c=m.c;\n  lastMove={r:m.r,c:m.c};\n  const w=checkWin();\n  if(w){render();finish(w.winner,w.how);return;}\n  turn=0;\n  render();\n  msg((capMsg?capMsg+' — ':'')+'あなたの番です');\n}\n\n/* =============== controls =============== */\ndocument.getElementById('undo').addEventListener('click',()=>{\n  if(!history.length||busy||phase!=='play')return;\n  let h=history.pop();\n  if(mode!=='pvp'){while(history.length&&h.turn!==0)h=history.pop();}\n  pieces=h.pieces.map(p=>({...p}));\n  turn=h.turn;lastMove=h.last;sel=null;\n  document.getElementById('gov').classList.remove('show');\n  phase='play';\n  render();\n  msg('あなたの番です');\n});\ndocument.getElementById('reset').addEventListener('click',init);\ndocument.getElementById('g-again').addEventListener('click',init);\ndocument.getElementById('modes').addEventListener('click',e=>{\n  const b=e.target.closest('button');if(!b)return;\n  mode=b.dataset.m;\n  document.querySelectorAll('#modes button').forEach(x=>x.classList.remove('on'));\n  b.classList.add('on');init();\n});\n\ninit();\n<\/script>\n<\/body>\n<\/html>\n";

SRC.mancala="<!DOCTYPE html>\n<html lang=\"ja\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0, user-scalable=no\">\n<title>マンカラ<\/title>\n<style>\n:root{\n  --bg:#221511;\n  --wood:#8C5A33;\n  --wood-dk:#6E4426;\n  --pit:#3B2415;\n  --pit-edge:#2A1810;\n  --txt:#F0E4D4;\n  --sub:#A8917A;\n  --gold:#D9A84A;\n  --hl:rgba(217,168,74,.5);\n}\n*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}\nbody{\n  background:var(--bg);color:var(--txt);\n  font-family:\"Hiragino Sans\",\"Yu Gothic UI\",\"Noto Sans JP\",sans-serif;\n  min-height:100vh;display:flex;flex-direction:column;align-items:center;\n  padding:16px 8px 32px;\n}\nh1{\n  font-family:\"Hiragino Mincho ProN\",\"Yu Mincho\",serif;\n  font-size:26px;font-weight:600;letter-spacing:.5em;text-indent:.5em;margin:4px 0 2px;\n}\n.sub{font-size:10.5px;color:var(--sub);letter-spacing:.25em;margin-bottom:12px}\n.modes{display:flex;gap:8px;margin-bottom:12px}\n.modes button{\n  background:transparent;border:1px solid #4a3526;color:var(--sub);\n  padding:7px 13px;border-radius:18px;font-size:12.5px;cursor:pointer;font-family:inherit;transition:all .2s;\n}\n.modes button.on{border-color:var(--gold);color:var(--gold)}\n\n.msg{min-height:22px;font-size:14px;color:var(--gold);letter-spacing:.06em;margin:4px 0 10px;text-align:center}\n\n.bwrap{\n  padding:10px;border-radius:18px;\n  background:linear-gradient(160deg,#4a2f1a,#2c1a0c);\n  box-shadow:0 16px 48px rgba(0,0,0,.6);\n}\nsvg{display:block;width:min(96vw,480px);height:auto}\n.pit-c{cursor:default}\n.pit-c.legal{cursor:pointer}\n.pit-bg{fill:var(--pit);stroke:var(--pit-edge);stroke-width:2}\n.pit-c.legal .pit-bg{stroke:var(--gold);stroke-width:2.4}\n.pit-c.sown .pit-bg{fill:#4d2f1c}\n.cnt{\n  text-anchor:middle;fill:var(--txt);font-size:13px;font-weight:600;\n  pointer-events:none;font-variant-numeric:tabular-nums;\n}\n.storecnt{font-size:18px}\n.lab{text-anchor:middle;fill:var(--sub);font-size:9px;letter-spacing:.15em;pointer-events:none}\n.bead{pointer-events:none}\n\n.foot{display:flex;gap:10px;margin-top:14px}\n.foot button{\n  background:transparent;border:1px solid #4a3526;color:var(--txt);\n  padding:8px 18px;border-radius:6px;font-size:13px;cursor:pointer;font-family:inherit;\n}\n.foot button:hover{border-color:var(--gold)}\n.foot button:disabled{opacity:.35}\n\n.rule{\n  width:min(96vw,480px);margin-top:14px;font-size:11.5px;line-height:1.7;color:var(--sub);\n  border-top:1px solid #3a2818;padding-top:10px;\n}\n\n.overlay{\n  position:fixed;inset:0;background:rgba(14,9,5,.84);\n  display:flex;align-items:center;justify-content:center;\n  opacity:0;pointer-events:none;transition:opacity .35s;z-index:20;\n}\n.overlay.show{opacity:1;pointer-events:auto}\n.card{\n  background:#2A1A0E;border:1px solid var(--gold);border-radius:10px;\n  padding:28px 42px;text-align:center;\n}\n.card .t{\n  font-family:\"Hiragino Mincho ProN\",\"Yu Mincho\",serif;\n  font-size:27px;letter-spacing:.22em;text-indent:.22em;color:var(--gold);margin-bottom:8px;\n}\n.card .s{font-size:14px;color:var(--txt);margin-bottom:18px;font-variant-numeric:tabular-nums}\n.card button{\n  background:var(--gold);border:none;color:#2A1A0E;padding:9px 26px;\n  border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;\n}\n@media (prefers-reduced-motion:reduce){*{transition:none!important}}\n<\/style>\n<\/head>\n<body>\n<h1>マンカラ<\/h1>\n<div class=\"sub\">MANCALA — KALAH RULES<\/div>\n\n<div class=\"modes\" id=\"modes\">\n  <button data-m=\"cpu1\" class=\"on\">CPU 弱<\/button>\n  <button data-m=\"cpu2\">CPU 強<\/button>\n  <button data-m=\"pvp\">2人対戦<\/button>\n<\/div>\n\n<div class=\"msg\" id=\"msg\">あなたの番です<\/div>\n\n<div class=\"bwrap\"><svg id=\"bd\"><\/svg><\/div>\n\n<div class=\"foot\">\n  <button id=\"undo\">待った<\/button>\n  <button id=\"reset\">最初から<\/button>\n<\/div>\n\n<div class=\"rule\">\n<b style=\"color:var(--txt)\">ルール(カラハ)<\/b>:自分側(下段)の穴を選び、石を反時計回りに1個ずつまく。最後の1個が<b>自分のゴール<\/b>に入ればもう一度自分の番。最後の1個が<b>自分側の空の穴<\/b>に入れば、その石と向かいの穴の石を全部もらえる。片側の穴が全て空になったら終了、残りは持ち主のゴールへ。多い方の勝ち。\n<\/div>\n\n<div class=\"overlay\" id=\"gov\">\n  <div class=\"card\">\n    <div class=\"t\" id=\"g-t\">勝利<\/div>\n    <div class=\"s\" id=\"g-s\"><\/div>\n    <button id=\"g-again\">もう一度<\/button>\n  <\/div>\n<\/div>\n\n<script>\n/* index: 0-5 あなたの穴(左→右), 6 あなたのゴール(右端), 7-12 相手の穴, 13 相手のゴール(左端) */\nlet pits,turn,mode='cpu1',history=[],over=false,busy=false;\n\nconst NS='http://www.w3.org/2000/svg';\nconst svg=document.getElementById('bd');\nconst W=480,H=230;\nsvg.setAttribute('viewBox',`0 0 ${W} ${H}`);\n\nconst BEADCOL=['#D94F3D','#3E9BD6','#E8C44A','#5BAE6B','#B07ACF','#E08A3C'];\n\n// 配置座標\nconst POS=[];\n(function(){\n  const px0=78,gap=56,rTop=62,rBot=168;\n  for(let i=0;i<6;i++)POS[i]=[px0+i*gap,rBot];        // 自分 下段 左→右\n  POS[6]=[W-36,H/2];                                   // 自分ゴール 右\n  for(let i=0;i<6;i++)POS[7+i]=[px0+(5-i)*gap,rTop];   // 相手 上段 右→左\n  POS[13]=[36,H/2];                                    // 相手ゴール 左\n})();\n\nlet groups=[];\n(function build(){\n  // 盤面ベース\n  const base=document.createElementNS(NS,'rect');\n  base.setAttribute('x',8);base.setAttribute('y',8);\n  base.setAttribute('width',W-16);base.setAttribute('height',H-16);\n  base.setAttribute('rx',26);\n  base.setAttribute('fill','url(#wd)');\n  const defs=document.createElementNS(NS,'defs');\n  defs.innerHTML=`<linearGradient id=\"wd\" x1=\"0\" y1=\"0\" x2=\"1\" y2=\"1\">\n    <stop offset=\"0\" stop-color=\"#9A6638\"/><stop offset=\"1\" stop-color=\"#6E4426\"/>\n  <\/linearGradient>`;\n  svg.appendChild(defs);svg.appendChild(base);\n\n  for(let i=0;i<14;i++){\n    const g=document.createElementNS(NS,'g');\n    g.setAttribute('class','pit-c');\n    const[cx,cy]=POS[i];\n    const isStore=i===6||i===13;\n    if(isStore){\n      const e=document.createElementNS(NS,'rect');\n      e.setAttribute('x',cx-22);e.setAttribute('y',cy-78);\n      e.setAttribute('width',44);e.setAttribute('height',156);e.setAttribute('rx',22);\n      e.setAttribute('class','pit-bg');\n      g.appendChild(e);\n    }else{\n      const e=document.createElementNS(NS,'circle');\n      e.setAttribute('cx',cx);e.setAttribute('cy',cy);e.setAttribute('r',24);\n      e.setAttribute('class','pit-bg');\n      g.appendChild(e);\n    }\n    const beads=document.createElementNS(NS,'g');\n    beads.setAttribute('class','bead');\n    g.appendChild(beads);\n    const t=document.createElementNS(NS,'text');\n    t.setAttribute('x',cx);\n    t.setAttribute('y',isStore?cy+95:(i<6?cy+40:cy-34));\n    t.setAttribute('class','cnt'+(isStore?' storecnt':''));\n    if(isStore){t.setAttribute('y',cy+5);t.setAttribute('opacity',0);}\n    g.appendChild(t);\n    if(i<6){const c=i;g.addEventListener('click',()=>onPit(c));}\n    if(mode==='pvp'&&i>=7&&i<13){/* handled dynamically below */}\n    g.addEventListener('click',()=>{if(i>=7&&i<13)onPit(i);});\n    svg.appendChild(g);\n    groups[i]=g;\n  }\n  // ラベル\n  const l1=document.createElementNS(NS,'text');\n  l1.setAttribute('x',W-36);l1.setAttribute('y',H-12);\n  l1.setAttribute('class','lab');l1.textContent='YOU';\n  svg.appendChild(l1);\n  const l2=document.createElementNS(NS,'text');\n  l2.setAttribute('x',36);l2.setAttribute('y',20);\n  l2.setAttribute('class','lab');l2.textContent='OPP';\n  svg.appendChild(l2);\n})();\n\n// 疑似乱数(座席固定)で石を散らす\nfunction seedXY(pi,k){\n  const h=(pi*73+k*131)%997;\n  const a=(h%360)*Math.PI/180,rr=4+((h>>3)%14);\n  const isStore=pi===6||pi===13;\n  const[cx,cy]=POS[pi];\n  if(isStore){\n    const yy=cy-60+((h*7)%120);\n    const xx=cx-12+((h*13)%24);\n    return[xx,yy];\n  }\n  return[cx+Math.cos(a)*rr*1.0,cy+Math.sin(a)*rr*0.9];\n}\n\nfunction render(sownIdx=-1){\n  const legal=legalPits(turn);\n  for(let i=0;i<14;i++){\n    const g=groups[i];\n    const isStore=i===6||i===13;\n    const clickable=!over&&!busy&&legal.includes(i)&&isHumanSide(i);\n    g.classList.toggle('legal',clickable);\n    g.classList.toggle('sown',i===sownIdx);\n    const beads=g.querySelector('.bead');\n    beads.innerHTML='';\n    const n=pits[i],show=Math.min(n,isStore?24:12);\n    for(let k=0;k<show;k++){\n      const[x,y]=seedXY(i,k);\n      const c=document.createElementNS(NS,'circle');\n      c.setAttribute('cx',x);c.setAttribute('cy',y);c.setAttribute('r',4.4);\n      c.setAttribute('fill',BEADCOL[(i+k)%6]);\n      c.setAttribute('stroke','rgba(0,0,0,.35)');\n      c.setAttribute('stroke-width',.8);\n      beads.appendChild(c);\n    }\n    const t=g.querySelector('.cnt');\n    t.textContent=n;\n    if(isStore)t.setAttribute('opacity',1);\n  }\n  document.getElementById('undo').disabled=!history.length||busy||over;\n}\n\nfunction isHumanSide(i){\n  if(busy||over)return false;\n  if(turn===0)return i>=0&&i<6;\n  return mode==='pvp'&&i>=7&&i<13;\n}\n\nfunction legalPits(p){\n  const s=p===0?0:7,out=[];\n  for(let k=0;k<6;k++)if(pits[s+k]>0)out.push(s+k);\n  return out;\n}\n\nfunction init(){\n  pits=new Array(14).fill(4);\n  pits[6]=0;pits[13]=0;\n  turn=0;history=[];over=false;busy=false;\n  document.getElementById('gov').classList.remove('show');\n  render();\n  msg('あなたの番です');\n}\nfunction msg(s){document.getElementById('msg').textContent=s;}\n\nfunction onPit(i){\n  if(!isHumanSide(i)||pits[i]===0)return;\n  history.push({p:pits.slice(),turn});\n  playAnimated(i);\n}\n\n/* ---- 着手(アニメーション付き) ---- */\nfunction playAnimated(start){\n  busy=true;render();\n  let hand=pits[start];\n  pits[start]=0;\n  let pos=start;\n  const skip=turn===0?13:6;\n  function step(){\n    pos=(pos+1)%14;\n    if(pos===skip){step();return;}\n    pits[pos]++;hand--;\n    render(pos);\n    if(hand>0){setTimeout(step,150);}\n    else setTimeout(()=>finish(pos),200);\n  }\n  setTimeout(step,150);\n}\n\nfunction finish(lastPos){\n  const myStore=turn===0?6:13;\n  const myStart=turn===0?0:7;\n  // 横取り\n  if(lastPos>=myStart&&lastPos<myStart+6&&pits[lastPos]===1){\n    const opp=12-lastPos;\n    if(pits[opp]>0){\n      pits[myStore]+=pits[opp]+1;\n      pits[opp]=0;pits[lastPos]=0;\n    }\n  }\n  // 終了判定\n  const s0=pits.slice(0,6).reduce((a,b)=>a+b,0);\n  const s1=pits.slice(7,13).reduce((a,b)=>a+b,0);\n  if(s0===0||s1===0){\n    pits[6]+=s0;pits[13]+=s1;\n    for(let k=0;k<6;k++){pits[k]=0;pits[7+k]=0;}\n    busy=false;over=true;render();\n    endGame();return;\n  }\n  // 追加手番\n  const extra=lastPos===myStore;\n  if(!extra)turn=1-turn;\n  busy=false;render();\n  if(extra){\n    msg((turn===0?(mode==='pvp'?'下側':'あなた'):(mode==='pvp'?'上側':'CPU'))+'はもう一度!');\n  }else{\n    msg(turn===0?(mode==='pvp'?'下側の番です':'あなたの番です'):(mode==='pvp'?'上側の番です':'CPUの番です'));\n  }\n  if(turn===1&&mode!=='pvp'){\n    busy=true;render();\n    setTimeout(()=>{\n      const m=cpuMove();\n      busy=false;\n      history.push({p:pits.slice(),turn});\n      playAnimated(m);\n    },650);\n  }\n}\n\nfunction endGame(){\n  const a=pits[6],b=pits[13];\n  const t=document.getElementById('g-t');\n  if(mode==='pvp'){\n    t.textContent=a>b?'下側の勝ち':b>a?'上側の勝ち':'引き分け';\n  }else{\n    t.textContent=a>b?'勝利':b>a?'敗北':'引き分け';\n  }\n  document.getElementById('g-s').textContent=`あなた ${a} − 相手 ${b}`;\n  msg('対局終了');\n  setTimeout(()=>document.getElementById('gov').classList.add('show'),500);\n}\n\n/* ---- CPU ---- */\nfunction simulate(bd,p,i){\n  // 戻り値: [newBoard, extraTurn]\n  const nb=bd.slice();\n  let hand=nb[i];nb[i]=0;\n  let pos=i;\n  const skip=p===0?13:6,store=p===0?6:13,start=p===0?0:7;\n  while(hand>0){\n    pos=(pos+1)%14;\n    if(pos===skip)continue;\n    nb[pos]++;hand--;\n  }\n  if(pos>=start&&pos<start+6&&nb[pos]===1){\n    const opp=12-pos;\n    if(nb[opp]>0){nb[store]+=nb[opp]+1;nb[opp]=0;nb[pos]=0;}\n  }\n  const s0=nb.slice(0,6).reduce((a,b)=>a+b,0);\n  const s1=nb.slice(7,13).reduce((a,b)=>a+b,0);\n  if(s0===0||s1===0){\n    nb[6]+=s0;nb[13]+=s1;\n    for(let k=0;k<6;k++){nb[k]=0;nb[7+k]=0;}\n    return[nb,false,true];\n  }\n  return[nb,pos===store,false];\n}\n\nfunction legalOf(bd,p){\n  const s=p===0?0:7,out=[];\n  for(let k=0;k<6;k++)if(bd[s+k]>0)out.push(s+k);\n  return out;\n}\n\nfunction evalBd(bd){return (bd[13]-bd[6])+ (bd.slice(7,13).reduce((a,b)=>a+b,0)-bd.slice(0,6).reduce((a,b)=>a+b,0))*.2;}\n\nfunction minimax(bd,p,depth,a,b){\n  // CPU(p=1)最大化\n  const moves=legalOf(bd,p);\n  if(depth===0||!moves.length)return evalBd(bd);\n  if(p===1){\n    let best=-Infinity;\n    for(const m of moves){\n      const[nb,extra,end]=simulate(bd,p,m);\n      const v=end?evalBd(nb)*10:minimax(nb,extra?1:0,extra?depth:depth-1,a,b);\n      if(v>best)best=v;\n      if(best>a)a=best;\n      if(a>=b)break;\n    }\n    return best;\n  }else{\n    let best=Infinity;\n    for(const m of moves){\n      const[nb,extra,end]=simulate(bd,p,m);\n      const v=end?evalBd(nb)*10:minimax(nb,extra?0:1,extra?depth:depth-1,a,b);\n      if(v<best)best=v;\n      if(best<b)b=best;\n      if(a>=b)break;\n    }\n    return best;\n  }\n}\n\nfunction cpuMove(){\n  const moves=legalOf(pits,1);\n  if(mode==='cpu1'){\n    // 弱: 追加手番だけ少し好む\n    const ext=moves.filter(m=>{const[,e]=simulate(pits,1,m);return e;});\n    if(ext.length&&Math.random()<.6)return ext[Math.floor(Math.random()*ext.length)];\n    return moves[Math.floor(Math.random()*moves.length)];\n  }\n  let best=moves[0],bs=-Infinity;\n  for(const m of moves){\n    const[nb,extra,end]=simulate(pits,1,m);\n    const v=end?evalBd(nb)*10:minimax(nb,extra?1:0,extra?8:7,-Infinity,Infinity);\n    if(v>bs){bs=v;best=m;}\n  }\n  return best;\n}\n\n/* ---- controls ---- */\ndocument.getElementById('undo').addEventListener('click',()=>{\n  if(!history.length||busy)return;\n  let h=history.pop();\n  if(mode!=='pvp'){while(history.length&&h.turn!==0)h=history.pop();}\n  pits=h.p;turn=h.turn;over=false;\n  document.getElementById('gov').classList.remove('show');\n  render();\n  msg(turn===0?'あなたの番です':'CPUの番です');\n});\ndocument.getElementById('reset').addEventListener('click',init);\ndocument.getElementById('g-again').addEventListener('click',init);\ndocument.getElementById('modes').addEventListener('click',e=>{\n  const b=e.target.closest('button');if(!b)return;\n  mode=b.dataset.m;\n  document.querySelectorAll('#modes button').forEach(x=>x.classList.remove('on'));\n  b.classList.add('on');init();\n});\n\ninit();\n<\/script>\n<\/body>\n<\/html>\n";

SRC.hex="<!DOCTYPE html>\n<html lang=\"ja\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0, user-scalable=no\">\n<title>ヘックス<\/title>\n<style>\n:root{\n  --bg:#10131C;\n  --panel:#1A1F2E;\n  --red:#E2543E;\n  --red-dk:#A53322;\n  --blue:#3E9BD6;\n  --blue-dk:#1F6CA0;\n  --cell:#222A3D;\n  --cell-line:#0C0F18;\n  --txt:#DDE3EE;\n  --sub:#7C8499;\n  --gold:#D9B44A;\n}\n*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}\nbody{\n  background:var(--bg);color:var(--txt);\n  font-family:\"Hiragino Sans\",\"Yu Gothic UI\",\"Noto Sans JP\",sans-serif;\n  min-height:100vh;display:flex;flex-direction:column;align-items:center;\n  padding:16px 10px 32px;\n}\nh1{\n  font-family:\"Hiragino Mincho ProN\",\"Yu Mincho\",serif;\n  font-size:26px;font-weight:600;letter-spacing:.5em;text-indent:.5em;margin:4px 0 2px;\n}\n.sub{font-size:11px;color:var(--sub);letter-spacing:.25em;margin-bottom:12px}\n\n.row{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;justify-content:center}\n.row button{\n  background:transparent;border:1px solid #333b52;color:var(--sub);\n  padding:7px 13px;border-radius:18px;font-size:12.5px;cursor:pointer;font-family:inherit;\n  transition:all .2s;\n}\n.row button.on{border-color:var(--gold);color:var(--gold)}\n.row button:focus-visible{outline:2px solid var(--gold);outline-offset:2px}\n\n.status{\n  display:flex;align-items:center;gap:10px;margin:6px 0 10px;font-size:14px;\n  letter-spacing:.06em;min-height:26px;\n}\n.dot{width:16px;height:16px;border-radius:50%;flex:none}\n.dot.r{background:radial-gradient(circle at 35% 30%,#f08a76,var(--red-dk))}\n.dot.b{background:radial-gradient(circle at 35% 30%,#8cc8ec,var(--blue-dk))}\n\n.wrap{\n  background:var(--panel);border-radius:12px;padding:8px;\n  box-shadow:0 14px 44px rgba(0,0,0,.55);\n  width:min(96vw,460px);\n}\nsvg{display:block;width:100%;height:auto}\n.hex{fill:var(--cell);stroke:var(--cell-line);stroke-width:1.4;cursor:pointer;transition:fill .15s}\n.hex:hover{fill:#2C3650}\n.hex.r{fill:var(--red);cursor:default}\n.hex.b{fill:var(--blue);cursor:default}\n.hex.win{stroke:var(--gold);stroke-width:2.6}\n.hex.last{stroke:#fff;stroke-width:2}\n.edge{pointer-events:none;opacity:.85}\n\n.legend{\n  display:flex;gap:18px;margin-top:10px;font-size:12px;color:var(--sub);\n}\n.legend span{display:flex;align-items:center;gap:6px}\n.legend i{width:10px;height:10px;border-radius:2px;display:inline-block}\n\n.foot{display:flex;gap:10px;margin-top:14px}\n.foot button{\n  background:transparent;border:1px solid #333b52;color:var(--txt);\n  padding:8px 18px;border-radius:6px;font-size:13px;cursor:pointer;font-family:inherit;\n  transition:border-color .2s;\n}\n.foot button:hover{border-color:var(--gold)}\n.foot button:disabled{opacity:.35;cursor:default}\n\n.overlay{\n  position:fixed;inset:0;background:rgba(8,10,16,.8);\n  display:flex;align-items:center;justify-content:center;\n  opacity:0;pointer-events:none;transition:opacity .4s;z-index:10;\n}\n.overlay.show{opacity:1;pointer-events:auto}\n.card{\n  background:#161B28;border:1px solid var(--gold);border-radius:10px;\n  padding:30px 44px;text-align:center;\n}\n.card .t{\n  font-family:\"Hiragino Mincho ProN\",\"Yu Mincho\",serif;\n  font-size:28px;letter-spacing:.25em;text-indent:.25em;margin-bottom:8px;\n}\n.card .s{font-size:13px;color:var(--sub);margin-bottom:20px}\n.card button{\n  background:var(--gold);border:none;color:#161B28;padding:10px 28px;\n  border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;\n}\n@media (prefers-reduced-motion:reduce){*{transition:none!important}}\n<\/style>\n<\/head>\n<body>\n<h1>ヘックス<\/h1>\n<div class=\"sub\">HEX — CONNECTION GAME<\/div>\n\n<div class=\"row\" id=\"modes\">\n  <button data-m=\"cpu1\" class=\"on\">CPU 弱<\/button>\n  <button data-m=\"cpu2\">CPU 強<\/button>\n  <button data-m=\"pvp\">2人対戦<\/button>\n<\/div>\n<div class=\"row\" id=\"sizes\">\n  <button data
