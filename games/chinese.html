<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>チャイニーズチェッカー</title>
<style>
:root{--bg:#14110E;--panel:#1F1A14;--txt:#EDE6D6;--sub:#9A8F7B;--gold:#C9A227;--line:#352C20;--hole:#2a2419;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--txt);font-family:"Hiragino Sans","Yu Gothic UI",sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:14px 10px 28px;user-select:none}
h1{font-family:"Hiragino Mincho ProN",serif;font-size:21px;letter-spacing:.08em;margin:2px 0}
.sub{font-size:10px;color:var(--sub);letter-spacing:.18em;margin-bottom:8px}
.row{display:flex;gap:7px;margin-bottom:6px;flex-wrap:wrap;justify-content:center;align-items:center}
.row .lab{font-size:11px;color:var(--sub);margin-right:2px}
.row button{background:transparent;border:1px solid #3a3326;color:var(--sub);padding:6px 12px;border-radius:18px;font-size:12px;cursor:pointer;font-family:inherit;transition:all .2s}
.row button.on{border-color:var(--gold);color:var(--gold)}
.turn{font-size:13px;color:var(--gold);min-height:20px;margin:4px 0 6px}
.bwrap{padding:8px;border-radius:12px;background:var(--panel);box-shadow:0 12px 36px rgba(0,0,0,.5)}
svg{display:block;width:min(92vw,420px);height:auto}
.hole{stroke:#3a3326;stroke-width:1;cursor:pointer}
.peg{cursor:pointer;transition:transform .1s}
.sel{stroke:var(--gold);stroke-width:3}
.dest{fill:rgba(201,162,39,.5);cursor:pointer}
.msg{min-height:20px;font-size:12.5px;color:var(--gold);margin-top:10px;text-align:center}
.foot{margin-top:8px}
.foot button{background:transparent;border:1px solid var(--line);color:var(--txt);padding:8px 18px;border-radius:6px;font-size:13px;cursor:pointer;font-family:inherit}
.over{position:fixed;inset:0;background:rgba(10,8,5,.85);display:none;align-items:center;justify-content:center;z-index:30}
.over.show{display:flex}
.over .c{background:#241c10;border:1px solid var(--gold);border-radius:10px;padding:24px 36px;text-align:center}
.over .t{font-size:23px;color:var(--gold);font-family:"Hiragino Mincho ProN",serif;margin-bottom:8px}
.over button{background:var(--gold);border:none;color:#241c10;font-weight:700;padding:9px 22px;border-radius:7px;cursor:pointer;font-size:14px;font-family:inherit;margin-top:8px}
</style>
</head>
<body>
<a href="../index.html" style="position:fixed;top:10px;left:10px;z-index:99999;background:rgba(0,0,0,0.55);color:#fff;text-decoration:none;font:600 13px/1 'Segoe UI',sans-serif;padding:8px 13px;border-radius:999px;border:1px solid rgba(255,255,255,0.25)">← 一覧に戻る</a>
<h1>チャイニーズチェッカー</h1><div class="sub">CHINESE CHECKERS</div>
<div class="row" id="np"><span class="lab">人数:</span><button data-np="2" class="on">2人</button><button data-np="3">3人</button></div>
<div class="row" id="mode"><span class="lab">対戦:</span><button data-m="cpu" class="on">CPU対戦</button><button data-m="pvp">人対人</button></div>
<div class="row" id="lv"><span class="lab">CPU強さ:</span><button data-lv="1">弱</button><button data-lv="2" class="on">普通</button><button data-lv="3">強</button></div>
<div class="turn" id="turn"></div>
<div class="bwrap"><svg id="bd"></svg></div>
<div class="msg" id="msg">自分の駒をタップ→光った穴へ移動。対面の三角を全部埋めたら勝ち。</div>
<div class="foot" style="display:flex;gap:8px;justify-content:center"><button id="undo" style="background:transparent;border:1px solid #352C20;color:#EDE6D6;font-weight:700;padding:7px 16px;border-radius:6px;font-size:12.5px;cursor:pointer;font-family:inherit">待った</button><button id="new">最初から</button></div>
<div class="over" id="over"><div class="c"><div class="t" id="ov-t">勝利</div><button id="again">もう一度</button></div></div>
<script>
const NS='http://www.w3.org/2000/svg';
const ROWS=[1,2,3,4,13,12,11,10,9,10,11,12,13,4,3,2,1];
// プレイヤー色（最大3人）
const COLORS=[
  {nm:'青',light:'#8cc0f0',dark:'#2a5fa8',tint:'#1c2c3e'},
  {nm:'赤',light:'#f08a80',dark:'#a02a22',tint:'#3a201c'},
  {nm:'緑',light:'#94d99a',dark:'#2e7a3c',tint:'#1c3a23'}
];
// ゾーン: A=上, B=下, UL=上左, UR=上右, LL=下左, LR=下右
// 2人: P0=B→A, P1=A→B  (現状維持の上下)
// 3人: P0=B→A, P1=UL→LR, P2=UR→LL  (互い違いの3角)
const SETUPS={
  2:{start:['B','A'],goal:['A','B']},
  3:{start:['B','UL','UR'],goal:['A','LR','LL']}
};
let np=2,mode='cpu';
let cells=[];      // {id,x,y,r,zone}
let occ;           // id -> playerIdx or -1
let adj;
let svg=document.getElementById('bd');
let sel=null,dests=[],turn=0,over=false,busy=false,winners=[],hist=[];
let ONLINE=false,MYSEAT=0,roomSend=null;
function myTurn(){return !ONLINE||turn===MYSEAT;}

function zoneFor(r,col,rowLen){
  if(r<4)return 'A';
  if(r>12)return 'B';
  if(r>=4&&r<=7){const t=8-r;if(col<t)return 'UL';if(col>=rowLen-t)return 'UR';return 'mid';}
  if(r===8)return 'mid';
  if(r>=9&&r<=12){const t=r-8;if(col<t)return 'LL';if(col>=rowLen-t)return 'LR';return 'mid';}
  return 'mid';
}
function buildCells(){
  cells=[];let id=0;
  for(let r=0;r<ROWS.length;r++){const n=ROWS[r];
    for(let c=0;c<n;c++){const x=(c-(n-1)/2),y=r*(Math.sqrt(3)/2);
      cells.push({id:id++,x,y,r,col:c,zone:zoneFor(r,c,n)});}}
  adj={};for(const a of cells){adj[a.id]=[];for(const b of cells){if(a===b)continue;
    const d=Math.hypot(a.x-b.x,a.y-b.y);if(Math.abs(d-1)<0.12)adj[a.id].push(b.id);}}
}
function cellById(id){return cells[id];}
function jumpTarget(fromId,viaId){
  const f=cellById(fromId),v=cellById(viaId);
  const tx=v.x+(v.x-f.x),ty=v.y+(v.y-f.y);
  return cells.find(c=>Math.hypot(c.x-tx,c.y-ty)<0.12);
}
function init(){
  buildCells();occ={};cells.forEach(c=>occ[c.id]=-1);
  const su=SETUPS[np];
  for(let p=0;p<np;p++){
    cells.filter(c=>c.zone===su.start[p]).forEach(c=>occ[c.id]=p);
  }
  sel=null;dests=[];turn=0;over=false;busy=false;winners=[];
  document.getElementById('over').classList.remove('show');
  render();updateTurn();
  if(!isHuman())setTimeout(cpuMove,520);
}
function myGoalZone(p){return SETUPS[np].goal[p];}
function updateTurn(){
  const t=document.getElementById('turn');
  if(over){t.textContent='対局終了';return;}
  const nm=COLORS[turn].nm;
  if(ONLINE)t.textContent=(turn===MYSEAT?'★ あなた':'相手')+'('+nm+')の番';
  else if(mode==='pvp')t.textContent=nm+'の番';
  else t.textContent=turn===0?'あなた('+nm+')の番':'CPU('+nm+')の番';
}
function isCpuSeat(){return ONLINE&&window.OnlineRoom&&OnlineRoom.isCpu(turn);}
function isHuman(){if(ONLINE){if(isCpuSeat())return false;return turn===MYSEAT;}return mode==='pvp'||turn===0;}
function shouldRunCpu(){if(over)return false;if(ONLINE)return isCpuSeat()&&OnlineRoom.isHost();return !isHuman();}
function rotXY(c){
  if(!ONLINE||MYSEAT===0)return{x:c.x,y:c.y};
  const CY=4*Math.sqrt(3);
  const rad=MYSEAT*(-120)*Math.PI/180;
  const co=Math.cos(rad),si=Math.sin(rad);
  const dx=c.x,dy=c.y-CY;
  return{x:dx*co-dy*si,y:dx*si+dy*co+CY};
}
function render(){
  const rxys=cells.map(c=>rotXY(c));
  const xs=rxys.map(r=>r.x),ys=rxys.map(r=>r.y);
  const minX=Math.min(...xs),maxX=Math.max(...xs),minY=Math.min(...ys),maxY=Math.max(...ys);
  const PAD=1.2,SC=22;
  const W=(maxX-minX+PAD*2)*SC,H=(maxY-minY+PAD*2)*SC;
  svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
  const px=x=>(x-minX+PAD)*SC,py=y=>(y-minY+PAD)*SC;
  let defs='<defs>';
  for(let i=0;i<COLORS.length;i++){
    defs+=`<radialGradient id="pg${i}" cx=".35" cy=".3" r=".9"><stop offset="0" stop-color="${COLORS[i].light}"/><stop offset="1" stop-color="${COLORS[i].dark}"/></radialGradient>`;
  }
  defs+='</defs>';
  svg.innerHTML=defs;
  // ゴール三角の薄い色付け
  const su=SETUPS[np];
  const goalTint={};su.goal.forEach((z,p)=>goalTint[z]=COLORS[p].tint);
  for(let i=0;i<cells.length;i++){const c=cells[i],rxy=rxys[i];
    const hole=document.createElementNS(NS,'circle');
    hole.setAttribute('cx',px(rxy.x));hole.setAttribute('cy',py(rxy.y));hole.setAttribute('r',SC*0.36);
    hole.setAttribute('class','hole');
    hole.setAttribute('fill',goalTint[c.zone]||'#2a2419');
    hole.addEventListener('click',()=>onCell(c.id));svg.appendChild(hole);
  }
  for(const d of dests){const c=cellById(d);const rxy=rotXY(c);const m=document.createElementNS(NS,'circle');
    m.setAttribute('cx',px(rxy.x));m.setAttribute('cy',py(rxy.y));m.setAttribute('r',SC*0.2);m.setAttribute('class','dest');
    m.addEventListener('click',()=>onCell(c.id));svg.appendChild(m);}
  for(let i=0;i<cells.length;i++){const c=cells[i];if(occ[c.id]<0)continue;const rxy=rxys[i];
    const p=document.createElementNS(NS,'circle');
    p.setAttribute('cx',px(rxy.x));p.setAttribute('cy',py(rxy.y));p.setAttribute('r',SC*0.3);
    p.setAttribute('class','peg'+(sel===c.id?' sel':''));
    p.setAttribute('fill',`url(#pg${occ[c.id]})`);
    p.addEventListener('click',()=>onCell(c.id));svg.appendChild(p);}
}
function legalMoves(id){
  const res=new Set();
  for(const n of adj[id])if(occ[n]<0)res.add(n);
  const seen=new Set([id]),stack=[id];
  while(stack.length){const cur=stack.pop();
    for(const via of adj[cur]){if(occ[via]<0)continue;const t=jumpTarget(cur,via);
      if(t&&occ[t.id]<0&&!seen.has(t.id)){seen.add(t.id);res.add(t.id);stack.push(t.id);}}}
  res.delete(id);return[...res];
}
function onCell(id){
  if(over||busy||!isHuman())return;
  if(dests.includes(id)){move(sel,id);return;}
  if(occ[id]===turn){sel=id;dests=legalMoves(id);render();return;}
  sel=null;dests=[];render();
}
function move(from,to){emit({k:'move',from,to});}
function emit(a){if(ONLINE)roomSend(a);else doAction(a);}
function doAction(a){
  if(over)return;
  if(a.k==='move'){
    const from=a.from,to=a.to;
    if(occ[from]!==turn||occ[to]!==-1)return;
    hist.push({occ:{...occ},turn,winners:winners.slice(),over});
    occ[to]=turn;occ[from]=-1;sel=null;dests=[];
    if(checkWin(turn)&&!winners.includes(turn)){
      winners.push(turn);
      if(winners.length>=np-1||np===2){over=true;render();finish();return;}
    }
    nextTurn();
    render();updateTurn();
    if(shouldRunCpu()){busy=true;setTimeout(cpuMove,520);}
  }
}
function nextTurn(){let n=turn;for(let k=0;k<np;k++){n=(n+1)%np;if(!winners.includes(n)){turn=n;return;}}}
function checkWin(p){const goal=myGoalZone(p);
  const goalCells=cells.filter(c=>c.zone===goal);
  return goalCells.every(c=>occ[c.id]===p);}
function zoneCentroid(z){const zc=cells.filter(c=>c.zone===z);
  const x=zc.reduce((s,c)=>s+c.x,0)/zc.length,y=zc.reduce((s,c)=>s+c.y,0)/zc.length;return{x,y};}
function cpuMove(){busy=false;if(over)return;
  if(ONLINE&&(!OnlineRoom.isHost()||!isCpuSeat()))return;
  const p=turn;
  const gc=zoneCentroid(myGoalZone(p));
  const noise=cpuLv===1?30:cpuLv===2?6:2;
  let best=null,bestScore=-1e9;const cands=[];
  for(const c of cells){if(occ[c.id]!==p)continue;
    for(const to of legalMoves(c.id)){
      const t=cellById(to);
      const d0=Math.hypot(c.x-gc.x,c.y-gc.y);
      const d1=Math.hypot(t.x-gc.x,t.y-gc.y);
      let sc=(d0-d1)*10 + (t.zone===myGoalZone(p)?15:0) + Math.random()*noise;
      cands.push([sc,c.id,to]);
      if(sc>bestScore){bestScore=sc;best=[c.id,to];}}}
  if(cpuLv===1&&cands.length){const r=cands[Math.floor(Math.random()*cands.length)];best=[r[1],r[2]];}
  if(!best){nextTurn();render();updateTurn();if(shouldRunCpu())setTimeout(cpuMove,520);return;}
  emit({k:'move',from:best[0],to:best[1]});
}
function finish(){
  if(np===2){winners.push([0,1].find(p=>!winners.includes(p)));}
  else {[0,1,2].forEach(p=>{if(!winners.includes(p))winners.push(p);});}
  const t=document.getElementById('ov-t');
  const top=winners[0];
  const nm=COLORS[top].nm;
  if(mode==='pvp')t.textContent=nm+'の勝ち！';
  else t.textContent=top===0?'あなた('+nm+')の勝ち！🎉':'CPU('+nm+')の勝ち';
  document.getElementById('over').classList.add('show');
}
document.getElementById('new').addEventListener('click',init);
document.getElementById('undo').addEventListener('click',()=>{if(!hist.length||busy||ONLINE)return;let h=hist.pop();if(mode==='cpu'){while(hist.length&&h.turn!==0)h=hist.pop();}occ=h.occ;turn=h.turn;winners=h.winners;over=h.over;sel=null;dests=[];document.getElementById('over').classList.remove('show');render();updateTurn();});
document.getElementById('again').addEventListener('click',init);
document.getElementById('mode').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;mode=b.dataset.m;document.querySelectorAll('#mode button').forEach(x=>x.classList.remove('on'));b.classList.add('on');init();});
document.getElementById('np').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;np=+b.dataset.np;document.querySelectorAll('#np button').forEach(x=>x.classList.remove('on'));b.classList.add('on');init();});
let cpuLv=2;
document.getElementById('lv').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;cpuLv=+b.dataset.lv;document.querySelectorAll('#lv button').forEach(x=>x.classList.remove('on'));b.classList.add('on');});
init();

function startOnline(seat,n,send){ONLINE=true;MYSEAT=seat;roomSend=send;np=n;
  document.getElementById('np').style.display='none';
  document.getElementById('mode').style.display='none';
  init();
  if(shouldRunCpu())setTimeout(cpuMove,520);}
</script>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script src="../shared/lobby.js?v=7"></script>
<script src="../shared/online-room.js?v=8"></script>
<script>
OnlineRoom.init({gameId:'chinese',minPlayers:2,maxPlayers:3,note:'星型盤で対面の三角ゴールを目指す。2〜3人対応。',
  onStart:(seat,n,send)=>startOnline(seat,n,send),
  onMessage:(from,msg)=>doAction(msg)});
</script>
<script src="../shared/firebase-counter.js"></script></body>
</html>
