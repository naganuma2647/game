<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>オートリオ</title>
<style>
:root{--bg:#14110E;--panel:#1F1A14;--txt:#EDE6D6;--sub:#9A8F7B;--gold:#C9A227;--line:#352C20;--empty:#3a3326;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--txt);font-family:"Hiragino Sans","Yu Gothic UI",sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:14px 10px 28px;user-select:none}
h1{font-family:"Hiragino Mincho ProN",serif;font-size:22px;letter-spacing:.15em;margin:2px 0}
.sub{font-size:10px;color:var(--sub);letter-spacing:.2em;margin-bottom:8px}
.row{display:flex;gap:7px;justify-content:center;align-items:center;flex-wrap:wrap;margin-bottom:6px}
.row .lab{font-size:11px;color:var(--sub);margin-right:2px}
.row button{background:transparent;border:1px solid #3a3326;color:var(--sub);padding:5px 12px;border-radius:16px;font-size:12px;cursor:pointer;font-family:inherit}
.row button.on{border-color:var(--gold);color:var(--gold)}
.turn{font-size:13px;color:var(--gold);min-height:20px;margin:4px 0 6px}
.stock{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:4px 0 8px;font-size:12px}
.stock .s{background:rgba(0,0,0,.25);padding:5px 10px;border-radius:6px;display:flex;gap:6px;align-items:center}
.stock .s.active{box-shadow:0 0 0 2px var(--gold)}
.stock .pn{font-weight:700}
.stock .pc{font-size:11px;color:var(--sub)}
.bwrap{padding:10px;border-radius:10px;background:var(--panel);box-shadow:0 8px 24px rgba(0,0,0,.5)}
svg{display:block;width:min(92vw,400px);height:auto}
.ring{cursor:pointer;transition:opacity .1s}
.ring:hover{opacity:.7}
.ring.empty{stroke:var(--empty);fill:none}
.ring.disabled{cursor:default}
.cell-bg{fill:rgba(255,255,255,.02);stroke:var(--line);stroke-width:1}
.winhi{stroke:var(--gold);stroke-width:3;fill:none;animation:pulse 1s infinite alternate}
@keyframes pulse{from{opacity:.6}to{opacity:1}}
.msg{min-height:20px;font-size:12.5px;color:var(--gold);margin:8px 0;text-align:center}
.rule{width:min(94vw,420px);margin-top:10px;font-size:11px;line-height:1.7;color:var(--sub);border-top:1px solid var(--line);padding-top:8px}
.rule b{color:var(--txt)}
.over{position:fixed;inset:0;background:rgba(8,8,5,.86);display:none;align-items:center;justify-content:center;z-index:30}
.over.show{display:flex}
.over .c{background:#241c10;border:1px solid var(--gold);border-radius:10px;padding:24px 36px;text-align:center}
.over .t{font-size:22px;color:var(--gold);font-family:"Hiragino Mincho ProN",serif;margin-bottom:14px}
.over button{background:var(--gold);border:none;color:#241c10;font-weight:700;padding:9px 22px;border-radius:7px;cursor:pointer;font-size:14px;font-family:inherit}
.hidden{display:none!important}
</style></head>
<body>
<a href="../index.html" style="position:fixed;top:10px;left:10px;z-index:99999;background:rgba(0,0,0,0.55);color:#fff;text-decoration:none;font:600 13px/1 'Segoe UI',sans-serif;padding:8px 13px;border-radius:999px;border:1px solid rgba(255,255,255,0.25)">← 一覧に戻る</a>
<h1>オートリオ</h1><div class="sub">OTRIO — 3サイズで揃える3目並べ</div>
<div class="row" id="np"><span class="lab">人数:</span><button data-np="2" class="on">2人</button><button data-np="3">3人</button><button data-np="4">4人</button></div>
<div class="row" id="mode"><span class="lab">対戦:</span><button data-m="cpu" class="on">CPU対戦</button><button data-m="pvp">人対人</button></div>
<div class="row" id="lv"><span class="lab">CPU強さ:</span><button data-lv="1">弱</button><button data-lv="2" class="on">普通</button><button data-lv="3">強</button></div>
<div class="turn" id="turn"></div>
<div class="stock" id="stock"></div>
<div class="bwrap"><svg id="bd"></svg></div>
<div class="msg" id="msg"></div>
<div class="rule">
<b>勝利条件:</b> 自分の色で以下のいずれかを作る ①縦/横/斜めに同じサイズ3つ ②縦/横/斜めに小→中→大の順 ③1マスに小・中・大の同心円<br>
<b>持ち駒:</b> 各サイズ3個ずつ（計9個）。空いているサイズ枠ならどこでも置ける。
</div>
<div style="display:flex;gap:8px;justify-content:center;margin-top:8px"><button id="undo" style="background:transparent;border:1px solid #352C20;color:#EDE6D6;font-weight:700;padding:7px 16px;border-radius:6px;font-size:12.5px;cursor:pointer;font-family:inherit">待った</button><button id="reset" style="background:transparent;border:1px solid #352C20;color:#EDE6D6;font-weight:700;padding:7px 16px;border-radius:6px;font-size:12.5px;cursor:pointer;font-family:inherit">最初から</button></div>
<div class="over" id="over"><div class="c"><div class="t" id="ovt">勝利</div><button id="again">もう一度</button></div></div>
<script>
const NS='http://www.w3.org/2000/svg';
const COLORS=[
  {nm:'赤',c:'#e0473a'},
  {nm:'青',c:'#3e87d6'},
  {nm:'緑',c:'#4ec05e'},
  {nm:'黄',c:'#e0c34a'}
];
const LINES=(()=>{const L=[];
  for(let r=0;r<3;r++)L.push([[r,0],[r,1],[r,2]]);
  for(let c=0;c<3;c++)L.push([[0,c],[1,c],[2,c]]);
  L.push([[0,0],[1,1],[2,2]]);L.push([[0,2],[1,1],[2,0]]);
  return L;})();
let np=2,mode='cpu';
let board,stock,turn,over,winner,winInfo,hist=[];
function snapOtrio(){return JSON.stringify({board,stock,turn,over,winner,winInfo});}
function restoreOtrio(s){const o=JSON.parse(s);board=o.board;stock=o.stock;turn=o.turn;over=o.over;winner=o.winner;winInfo=o.winInfo;}
let ONLINE=false,MYSEAT=0,roomSend=null;
function myTurn(){return !ONLINE||turn===MYSEAT;}
const svg=document.getElementById('bd');

function init(){
  board=Array.from({length:3},()=>Array.from({length:3},()=>[-1,-1,-1]));
  stock=Array.from({length:np},()=>[3,3,3]);
  turn=Math.floor(Math.random()*np);over=false;winner=null;winInfo=null;hist=[]; // 先手ランダム
  document.getElementById('over').classList.remove('show');
  document.getElementById('msg').textContent='';
  render();updateTurn();updateStock();
  if(shouldRunCpu())setTimeout(cpuMove,600);
  else if(!ONLINE&&!isHuman())setTimeout(cpuMove,600);
}
function isCpuSeat(){return ONLINE&&window.OnlineRoom&&OnlineRoom.isAuto(turn);} // CPU席＋退出席をホストが代理
function isHuman(){if(ONLINE){if(isCpuSeat())return false;return turn===MYSEAT;}return mode==='pvp'||turn===0;}
function shouldRunCpu(){if(over)return false;if(ONLINE)return isCpuSeat()&&OnlineRoom.isHost();return !isHuman();}
function updateTurn(){
  const t=document.getElementById('turn');
  if(over){t.textContent='対局終了';return;}
  const nm=COLORS[turn].nm;
  if(ONLINE)t.textContent=(turn===MYSEAT?'★ あなた':'相手')+'('+nm+')の番';
  else t.textContent=mode==='pvp'?(nm+'の番'):(turn===0?'あなた('+nm+')の番':'CPU('+nm+')の番');
  t.style.color=COLORS[turn].c;t.style.fontWeight='800';
  if(ONLINE&&window.OnlineRoom&&OnlineRoom.setTurn)OnlineRoom.setTurn(turn===MYSEAT&&!over);
}
function updateStock(){
  const s=document.getElementById('stock');s.innerHTML='';
  for(let p=0;p<np;p++){
    const e=document.createElement('div');e.className='s'+(p===turn?' active':'');
    e.innerHTML='<span class="pn" style="color:'+COLORS[p].c+'">'+COLORS[p].nm+'</span>'+
      '<span class="pc">小'+stock[p][0]+' 中'+stock[p][1]+' 大'+stock[p][2]+'</span>';
    s.appendChild(e);
  }
}
function placeable(r,c,size,p){
  if(stock[p][size]<=0)return false;
  return board[r][c][size]===-1;
}
function place(r,c,size,p){
  board[r][c][size]=p;stock[p][size]--;
}
function unplace(r,c,size,p){
  board[r][c][size]=-1;stock[p][size]++;
}
function checkWinFor(p){
  for(const L of LINES){
    for(let s=0;s<3;s++){
      if(L.every(([r,c])=>board[r][c][s]===p))return{line:L,kind:'size',s};
    }
  }
  for(const L of LINES){
    for(const order of [[0,1,2],[2,1,0]]){
      if(L.every(([r,c],i)=>board[r][c][order[i]]===p))return{line:L,kind:'progress',order};
    }
  }
  for(let r=0;r<3;r++)for(let c=0;c<3;c++){
    if(board[r][c].every(v=>v===p))return{cell:[r,c],kind:'concentric'};
  }
  return null;
}
function anyEmpty(){
  for(let r=0;r<3;r++)for(let c=0;c<3;c++)for(let s=0;s<3;s++)if(board[r][c][s]===-1)return true;
  return false;
}
function noStock(p){return stock[p].every(v=>v===0);}

function render(){
  const CELL=110,GAP=6,PAD=8;
  const W=3*CELL+2*GAP+2*PAD;
  svg.setAttribute('viewBox',`0 0 ${W} ${W}`);
  let html='';
  const cellXY=(r,c)=>[PAD+c*(CELL+GAP),PAD+r*(CELL+GAP)];
  for(let r=0;r<3;r++)for(let c=0;c<3;c++){
    const[x,y]=cellXY(r,c);
    html+=`<rect x="${x}" y="${y}" width="${CELL}" height="${CELL}" rx="6" class="cell-bg"/>`;
    const cx=x+CELL/2,cy=y+CELL/2;
    // 3 rings: large(2)=46, medium(1)=32, small(0)=18
    // 小=棒(ポスト)状の小さなディスク, 中/大=リング
    const radii=[10,32,46];
    for(let s=2;s>=0;s--){
      const r2=radii[s];
      const owner=board[r][c][s];
      const isEmpty=owner<0;
      const interactive=isHuman()&&!over&&isEmpty&&stock[turn][s]>0;
      if(s===0){
        const fill=isEmpty?'#d7cfba':COLORS[owner].c;
        const stroke=isEmpty?'rgba(0,0,0,.45)':'rgba(0,0,0,.3)';
        html+=`<circle cx="${cx}" cy="${cy}" r="${r2}" fill="${fill}" stroke="${stroke}" stroke-width="1.5" class="ring${interactive?'':' disabled'}" ${interactive?`data-p="${r},${c},${s}"`:''}/>`;
        html+=`<circle cx="${cx}" cy="${cy}" r="${(r2*0.34).toFixed(1)}" fill="rgba(0,0,0,.3)" pointer-events="none"/>`;
        html+=`<circle cx="${(cx-r2*0.3).toFixed(1)}" cy="${(cy-r2*0.3).toFixed(1)}" r="${(r2*0.22).toFixed(1)}" fill="rgba(255,255,255,.45)" pointer-events="none"/>`;
      }else{
        const fill=isEmpty?'none':COLORS[owner].c;
        const stroke=isEmpty?'var(--empty)':COLORS[owner].c;
        const sw=isEmpty?2:5;
        html+=`<circle cx="${cx}" cy="${cy}" r="${r2}" fill="${fill}" fill-opacity="0" stroke="${stroke}" stroke-width="${sw}" class="ring${isEmpty?' empty':''}${interactive?'':' disabled'}" ${interactive?`data-p="${r},${c},${s}"`:''}/>`;
      }
    }
  }
  if(winInfo){
    if(winInfo.kind==='concentric'){
      const[r,c]=winInfo.cell;const[x,y]=cellXY(r,c);
      html+=`<rect x="${x-2}" y="${y-2}" width="${CELL+4}" height="${CELL+4}" rx="8" class="winhi"/>`;
    }else{
      const[a,b,d]=winInfo.line;
      const[ax,ay]=cellXY(a[0],a[1]);const[dx,dy]=cellXY(d[0],d[1]);
      html+=`<line x1="${ax+CELL/2}" y1="${ay+CELL/2}" x2="${dx+CELL/2}" y2="${dy+CELL/2}" class="winhi"/>`;
    }
  }
  svg.innerHTML=html;
  svg.querySelectorAll('[data-p]').forEach(el=>{const[r,c,s]=el.dataset.p.split(',').map(Number);el.addEventListener('click',()=>onPlace(r,c,s));});
}
function onPlace(r,c,s){
  if(over||!isHuman())return;
  if(!placeable(r,c,s,turn))return;
  emit({k:'place',r,c,s});
}
function emit(a){if(ONLINE)roomSend(a);else doAction(a);}
function doAction(a){
  if(over)return;
  if(a.k==='place'){
    if(!placeable(a.r,a.c,a.s,turn))return;
    if(!ONLINE)hist.push(snapOtrio());
    place(a.r,a.c,a.s,turn);
    const w=checkWinFor(turn);
    if(w){winner=turn;winInfo=w;over=true;render();finish();return;}
    if([...Array(np).keys()].every(p=>noStock(p))){over=true;render();finishDraw();return;}
    turn=(turn+1)%np;
    render();updateTurn();updateStock();
    if(shouldRunCpu())setTimeout(cpuMove,600);
    else if(!ONLINE&&!isHuman()&&!over)setTimeout(cpuMove,600);
  }
}

function cpuMove(){
  if(over)return;
  if(ONLINE&&(!OnlineRoom.isHost()||!isCpuSeat()))return;
  const p=turn;
  // 弱: 完全ランダム（勝ち/ブロック手も見ない）
  if(cpuLv===1){
    const all=[];for(let r=0;r<3;r++)for(let c=0;c<3;c++)for(let s=0;s<3;s++)if(placeable(r,c,s,p))all.push([r,c,s]);
    if(all.length){const[r,c,s]=all[Math.floor(Math.random()*all.length)];doCpuPlace(r,c,s);return;}
  }
  // 1. winning move
  for(let r=0;r<3;r++)for(let c=0;c<3;c++)for(let s=0;s<3;s++){
    if(!placeable(r,c,s,p))continue;
    place(r,c,s,p);const w=checkWinFor(p);unplace(r,c,s,p);
    if(w){doCpuPlace(r,c,s);return;}
  }
  // 2. block opponent immediate wins (強のみ厳密ブロック / 普通は半分の確率)
  if(cpuLv===3||(cpuLv===2&&Math.random()<0.7)){
    for(let q=0;q<np;q++){if(q===p)continue;
      for(let r=0;r<3;r++)for(let c=0;c<3;c++)for(let s=0;s<3;s++){
        if(!placeable(r,c,s,q))continue;
        place(r,c,s,q);const w=checkWinFor(q);unplace(r,c,s,q);
        if(w&&placeable(r,c,s,p)){doCpuPlace(r,c,s);return;}
      }
    }
  }
  // 3. heuristic: prefer center, then near my existing pieces; try to extend a 2-in-line
  const cands=[];
  for(let r=0;r<3;r++)for(let c=0;c<3;c++)for(let s=0;s<3;s++){
    if(!placeable(r,c,s,p))continue;
    let score=0;
    if(r===1&&c===1)score+=3;
    // count my pieces in lines through this cell
    for(const L of LINES){if(L.some(([lr,lc])=>lr===r&&lc===c)){
      const mine=L.reduce((a,[lr,lc])=>a+board[lr][lc].filter(v=>v===p).length,0);
      score+=mine*2;
    }}
    score+=Math.random();
    cands.push({r,c,s,score});
  }
  cands.sort((a,b)=>b.score-a.score);
  if(cands.length)doCpuPlace(cands[0].r,cands[0].c,cands[0].s);
  else{over=true;render();finishDraw();}
}
function doCpuPlace(r,c,s){emit({k:'place',r,c,s});}

function finish(){
  const nm=COLORS[winner].nm;
  const kindTxt=winInfo.kind==='size'?'同サイズ3つ':winInfo.kind==='progress'?'小中大の階段':'同心円';
  const t=mode==='pvp'?(nm+'の勝ち！ ('+kindTxt+')'):(winner===0?'あなた('+nm+')の勝ち！🎉 ('+kindTxt+')':'CPU('+nm+')の勝ち ('+kindTxt+')');
  document.getElementById('ovt').textContent=t;
  document.getElementById('over').classList.add('show');
}
function finishDraw(){
  document.getElementById('ovt').textContent='引き分け';
  document.getElementById('over').classList.add('show');
}

document.getElementById('np').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;np=+b.dataset.np;document.querySelectorAll('#np button').forEach(x=>x.classList.remove('on'));b.classList.add('on');init();});
document.getElementById('mode').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;mode=b.dataset.m;document.querySelectorAll('#mode button').forEach(x=>x.classList.remove('on'));b.classList.add('on');init();});
let cpuLv=2;
document.getElementById('lv').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;cpuLv=+b.dataset.lv;document.querySelectorAll('#lv button').forEach(x=>x.classList.remove('on'));b.classList.add('on');});
document.getElementById('again').addEventListener('click',init);
document.getElementById('reset').addEventListener('click',init);
document.getElementById('undo').addEventListener('click',()=>{if(!hist.length||ONLINE)return;let s=hist.pop();if(mode==='cpu'){while(hist.length&&JSON.parse(s).turn!==0)s=hist.pop();}restoreOtrio(s);document.getElementById('over').classList.remove('show');render();updateTurn();updateStock();});
init();

function startOnline(seat,n,send){ONLINE=true;MYSEAT=seat;roomSend=send;np=n;
  document.getElementById('np').classList.add('hidden');
  document.getElementById('mode').classList.add('hidden');
  init();}
  // init() 内で初手がCPU席なら cpuMove を予約済み（ここで再予約すると二重着手の恐れ）
// 再接続: 現在状態の書き出し/復元
function getState(){return {board,stock,turn,over,winner,winInfo};}
function applyState(o){ONLINE=true;MYSEAT=o.seat;roomSend=o.send;np=o.n;
  document.getElementById('np').classList.add('hidden');
  document.getElementById('mode').classList.add('hidden');
  const s=o.state;board=s.board;stock=s.stock;turn=s.turn;over=s.over;winner=s.winner;winInfo=s.winInfo;
  document.getElementById('over').classList.toggle('show',!!over);
  render();updateTurn();updateStock();
  if(shouldRunCpu())setTimeout(cpuMove,600);}
</script>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script src="../shared/lobby.js?v=7"></script>
<script src="../shared/online-room.js?v=8"></script>
<script>
OnlineRoom.init({gameId:'otrio',minPlayers:2,maxPlayers:4,note:'3サイズのリングで揃える3目並べ。',
  onStart:(seat,n,send)=>startOnline(seat,n,send),
  onMessage:(from,msg)=>doAction(msg),
  onLeft:(seat)=>{updateTurn();if(shouldRunCpu())setTimeout(cpuMove,600);},
  getState,applyState});
</script>
</body></html>
