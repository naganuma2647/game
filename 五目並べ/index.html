<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>五目並べ / Gomoku</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <a class="back-link" href="../index.html">← 一覧に戻る</a>
  <div class="app">
    <h1>五目並べ</h1>

    <!-- 対戦設定 -->
    <section id="setup" class="setup">
      <h2>対戦設定</h2>
      <div class="setup-players">
        <div class="player-config">
          <div class="player-head"><span class="stone stone-black"></span> 黒（先手）</div>
          <div class="type-options">
            <label><input type="radio" name="black-type" value="human" checked> 人間</label>
            <label><input type="radio" name="black-type" value="cpu"> CPU</label>
          </div>
          <label class="level-row">強さ:
            <select id="black-level" disabled>
              <option value="1">Lv1 入門</option>
              <option value="2">Lv2 やさしい</option>
              <option value="3" selected>Lv3 ふつう</option>
              <option value="4">Lv4 強い</option>
            </select>
          </label>
        </div>
        <div class="player-config">
          <div class="player-head"><span class="stone stone-white"></span> 白（後手）</div>
          <div class="type-options">
            <label><input type="radio" name="white-type" value="human"> 人間</label>
            <label><input type="radio" name="white-type" value="cpu" checked> CPU</label>
          </div>
          <label class="level-row">強さ:
            <select id="white-level">
              <option value="1">Lv1 入門</option>
              <option value="2">Lv2 やさしい</option>
              <option value="3" selected>Lv3 ふつう</option>
              <option value="4">Lv4 強い</option>
            </select>
          </label>
        </div>
      </div>
      <button id="start" class="btn btn-primary">対戦開始</button>
      <div class="online-entry">
        <button id="online-btn" class="btn btn-online">🌐 オンラインで対戦（部屋番号）</button>
      </div>
    </section>

    <!-- オンライン対戦ロビー -->
    <div id="online-lobby" class="overlay" hidden>
      <div class="lobby-card">
        <button id="lobby-close" class="lobby-close" aria-label="閉じる">×</button>
        <h2>オンライン対戦</h2>
        <p class="lobby-note">2人で同じ部屋番号を共有して対戦します。<br>部屋を作る側は<b>黒（先手）</b>、参加する側は<b>白（後手）</b>です。</p>

        <div class="lobby-section">
          <h3>部屋を作る</h3>
          <button id="create-room" class="btn btn-primary">部屋を作成</button>
          <div id="room-code-box" class="room-code-box" hidden>
            <span class="rc-label">部屋番号</span>
            <span id="room-code" class="room-code">-----</span>
            <button id="copy-code" class="btn btn-small">コピー</button>
          </div>
        </div>

        <div class="lobby-divider">または</div>

        <div class="lobby-section">
          <h3>部屋に参加する</h3>
          <div class="join-row">
            <input id="join-code" class="join-input" maxlength="4" placeholder="4桁の番号" inputmode="numeric" pattern="\d*" autocomplete="off">
            <button id="join-room" class="btn btn-primary">参加</button>
          </div>
        </div>

        <p id="online-status" class="online-status"></p>
      </div>
    </div>

    <!-- ゲーム -->
    <section id="game" class="game" hidden>
      <div class="scoreboard">
        <div class="score" id="score-black">
          <span class="stone stone-black"></span>
          <span class="label" id="label-black">黒</span>
        </div>
        <div class="turn" id="turn-indicator">黒の番</div>
        <div class="score" id="score-white">
          <span class="stone stone-white"></span>
          <span class="label" id="label-white">白</span>
        </div>
      </div>

      <div class="board-wrap">
        <div id="board" class="board"></div>
      </div>

      <div class="controls">
        <button id="undo" class="btn" disabled>一手戻る</button>
        <button id="reset" class="btn">最初から</button>
        <button id="back" class="btn">設定を変える</button>
      </div>

      <label class="assist-toggle">
        <input type="checkbox" id="assist"> AIアシスタント（評価値を表示）
      </label>

      <p id="message" class="message"></p>
    </section>
  </div>

  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <script src="../shared/lobby.js?v=4"></script>
  <script src="js/ai.js"></script>
  <script src="js/game.js"></script>
  <script src="js/online.js"></script>
</body>
</html>
