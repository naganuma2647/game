<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>将棋 / Shogi</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <a href="../index.html" style="position:fixed;top:12px;left:12px;z-index:9999;background:rgba(0,0,0,0.55);color:#fff;text-decoration:none;font:600 14px/1 'Segoe UI',sans-serif;padding:9px 14px;border-radius:999px;border:1px solid rgba(255,255,255,0.25);backdrop-filter:blur(4px);">← 一覧に戻る</a>
  <div class="app">
    <h1>将棋</h1>

    <!-- 対戦設定 -->
    <section id="setup" class="setup">
      <h2>対戦設定</h2>
      <div class="setup-players">
        <div class="player-config">
          <div class="player-head">☗ 先手（下）</div>
          <div class="type-options">
            <label><input type="radio" name="sente-type" value="human" checked> 人間</label>
            <label><input type="radio" name="sente-type" value="cpu"> CPU</label>
          </div>
          <label class="level-row">強さ:
            <select id="sente-level" disabled>
              <option value="1">弱い</option>
              <option value="2" selected>普通</option>
              <option value="3">強い</option>
            </select>
          </label>
        </div>
        <div class="player-config">
          <div class="player-head">☖ 後手（上）</div>
          <div class="type-options">
            <label><input type="radio" name="gote-type" value="human"> 人間</label>
            <label><input type="radio" name="gote-type" value="cpu" checked> CPU</label>
          </div>
          <label class="level-row">強さ:
            <select id="gote-level">
              <option value="1">弱い</option>
              <option value="2" selected>普通</option>
              <option value="3">強い</option>
            </select>
          </label>
        </div>
      </div>
      <button id="start" class="btn btn-primary">対戦開始</button>
      <div class="online-entry">
        <button id="online-btn" class="btn btn-online">🌐 オンラインで対戦（部屋番号）</button>
      </div>
    </section>

    <!-- オンライン対戦ロビー -->
    <div id="online-lobby" class="overlay" hidden>
      <div class="lobby-card">
        <button id="lobby-close" class="lobby-close" aria-label="閉じる">×</button>
        <h2>オンライン対戦</h2>
        <p class="lobby-note">2人で同じ部屋番号を共有して対局します。<br>部屋を作る側は<b>先手</b>、参加する側は<b>後手</b>です。</p>

        <div class="lobby-section">
          <h3>部屋を作る</h3>
          <button id="create-room" class="btn btn-primary">部屋を作成</button>
          <div id="room-code-box" class="room-code-box" hidden>
            <span class="rc-label">部屋番号</span>
            <span id="room-code" class="room-code">----</span>
            <button id="copy-code" class="btn btn-small">コピー</button>
          </div>
        </div>

        <div class="lobby-divider">または</div>

        <div class="lobby-section">
          <h3>部屋に参加する</h3>
          <div class="join-row">
            <input id="join-code" class="join-input" maxlength="4" placeholder="4桁の番号" inputmode="numeric" pattern="\d*" autocomplete="off">
            <button id="join-room" class="btn btn-primary">参加</button>
          </div>
        </div>

        <p id="online-status" class="online-status"></p>
        <a href="../index.html" style="display:inline-block;margin-top:14px;color:#cfd6e4;font-size:13px;text-decoration:none;border:1px solid rgba(255,255,255,.25);border-radius:999px;padding:7px 16px">← 一覧に戻る</a>
      </div>
    </div>

    <!-- ゲーム画面 -->
    <section id="game" class="game" hidden>
      <div class="turn-bar"><span id="turn-indicator">先手番</span></div>

      <!-- 後手の持ち駒 -->
      <div class="komadai" id="hand-gote" data-owner="1">
        <span class="komadai-label">☖ 後手 持ち駒</span>
        <div class="komadai-pieces" id="hand-gote-pieces"></div>
      </div>

      <div class="board-wrap">
        <div id="board" class="board"></div>
      </div>

      <!-- 先手の持ち駒 -->
      <div class="komadai" id="hand-sente" data-owner="0">
        <span class="komadai-label">☗ 先手 持ち駒</span>
        <div class="komadai-pieces" id="hand-sente-pieces"></div>
      </div>

      <div class="controls">
        <button id="undo" class="btn" disabled>一手戻る</button>
        <button id="reset" class="btn">最初から</button>
        <button id="back" class="btn">設定を変える</button>
      </div>

      <label class="assist-toggle">
        <input type="checkbox" id="assist"> AIアシスタント（推奨手と評価値を表示）
      </label>
      <p id="assist-hint" class="assist-hint"></p>

      <p id="message" class="message"></p>
    </section>

    <!-- 成り確認ダイアログ -->
    <div id="promo-overlay" class="overlay" hidden>
      <div class="promo-dialog">
        <p>成りますか？</p>
        <div class="promo-buttons">
          <button id="promo-yes" class="btn btn-primary">成る</button>
          <button id="promo-no" class="btn">成らない</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <script src="../shared/lobby.js?v=6"></script>
  <script src="js/shogi.js"></script>
  <script src="js/ai.js"></script>
  <script src="js/game.js?v=2"></script>
  <script src="js/online.js?v=2"></script>
</body>
</html>
